<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DilAvatar Demo</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0b1120;color:white;font-family:system-ui}.card{width:min(92vw,360px);text-align:center}.btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:14px}button{border:0;background:#2563eb;color:#fff;border-radius:14px;padding:10px 14px;font-weight:900;cursor:pointer}</style></head><body><div class="card"><div id="avatarHost"></div><div class="btns"><button onclick="DilAvatar.speakText('merhaba bugün İngilizce çalışıyoruz',3200)">Konuş</button><button onclick="DilAvatar.thinking(true)">Düşün</button><button onclick="DilAvatar.stop()">Dur</button></div></div><script src="./avatar.js"></script><script>DilAvatar.mount('avatarHost');</script></body></html>
