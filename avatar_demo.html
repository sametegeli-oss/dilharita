<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DilAvatar v18 Demo</title><style>body{margin:0;min-height:100vh;background:#020617;color:#e5e7eb;font-family:system-ui;display:grid;place-items:center}.box{width:min(94vw,430px);background:#0b1120;border:1px solid rgba(148,163,184,.25);border-radius:22px;padding:18px;text-align:center}h1{font-size:20px;margin:0 0 10px}textarea{width:100%;min-height:70px;border-radius:14px;border:1px solid rgba(148,163,184,.3);background:#020617;color:#e5e7eb;padding:10px;box-sizing:border-box;margin-top:12px}.buttons{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:10px}button{border:0;border-radius:12px;padding:8px 10px;background:#2563eb;color:white;font-weight:800;font-size:12px;cursor:pointer}button.secondary{background:#1e293b;color:#dbeafe}</style></head><body><div class="box"><h1>DilAvatar v18</h1><div id="avatarHost"></div><textarea id="txt">Merhaba, bu sürümde gri halkalar kaldırıldı.</textarea><div class="buttons"><button id="speak">Konuş</button><button id="hair" class="secondary">Saç düzelt</button><button id="blink" class="secondary">Göz kırp</button><button id="think" class="secondary">Düşün</button><button id="stop" class="secondary">Dur</button></div></div><script src="./avatar.js"></script><script>DilAvatar.mount('avatarHost',{size:320});DilAvatar.setAutoHair(false);document.getElementById('speak').onclick=function(){const t=document.getElementById('txt').value;DilAvatar.speakText(t,Math.max(1800,t.length*92));};document.getElementById('hair').onclick=function(){DilAvatar.fixHair(true);};document.getElementById('blink').onclick=function(){DilAvatar.blink();};document.getElementById('think').onclick=function(){DilAvatar.thinking(true);};document.getElementById('stop').onclick=function(){DilAvatar.stop();DilAvatar.thinking(false);};</script></body></html>
