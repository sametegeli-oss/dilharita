<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>DilAvatar Demo</title>
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:#020617;
      color:#e5e7eb;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    .box{
      width:min(92vw,360px);
      background:#0b1120;
      border:1px solid rgba(148,163,184,.25);
      border-radius:24px;
      padding:22px;
      text-align:center;
    }
    button{
      border:0;
      border-radius:16px;
      background:#2563eb;
      color:white;
      font-weight:900;
      padding:12px 16px;
      margin:6px;
      cursor:pointer;
    }
    .error{
      display:none;
      margin:10px 0;
      padding:10px;
      border-radius:12px;
      background:#7f1d1d;
      color:#fee2e2;
      text-align:left;
      font-size:14px;
    }
  </style>
</head>
<body>
  <div class="box">
    <div id="loadError" class="error"></div>
    <div id="avatarHost"></div>
    <button id="btnSpeak" type="button">Konuştur</button>
    <button id="btnThink" type="button">Düşün</button>
    <button id="btnStop" type="button">Dur</button>
    <p>Detaylı ayarlama için <b>avatar_ayar.html</b> dosyasını aç.</p>
  </div>

  <script src="./avatar.js"></script>
  <script>
    (function(){
      if (!window.DilAvatar) {
        var box = document.getElementById("loadError");
        box.style.display = "block";
        box.innerHTML = "avatar.js yüklenemedi. avatar_demo.html ile avatar.js aynı klasörde olmalı.";
        return;
      }

      DilAvatar.mount("avatarHost");
      DilAvatar.setGender("erkek");

      document.getElementById("btnSpeak").addEventListener("click", function(){
        DilAvatar.speakText("merhaba bugün İngilizce çalışıyoruz", 3200);
      });

      document.getElementById("btnThink").addEventListener("click", function(){
        DilAvatar.thinking(true);
      });

      document.getElementById("btnStop").addEventListener("click", function(){
        DilAvatar.stop();
        DilAvatar.thinking(false);
      });
    })();
  </script>
</body>
</html>
