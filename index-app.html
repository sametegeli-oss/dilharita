<div id="root"></div>
<script>
window.addEventListener('error', function(e){
  var box=document.getElementById('appErrorBox');
  if(!box){
    box=document.createElement('pre');
    box.id='appErrorBox';
    box.style.cssText='position:fixed;left:10px;right:10px;bottom:10px;z-index:99999;background:#220b0b;color:#fecaca;padding:12px;border:1px solid #ef4444;border-radius:10px;white-space:pre-wrap;font:12px monospace';
    document.body.appendChild(box);
  }
  box.textContent += '\n' + (e.message||'error') + '\n' + (e.filename||'') + ':' + (e.lineno||'');
});
</script>
