function esc(s){ return String(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function authorOf(b){ return (b.authors||[]).map(a=>a.name).filter(Boolean).join(", ") || "Bilinmeyen yazar"; }

function getProgress(){ try{ return JSON.parse(localStorage.getItem(PROGRESS_KEY)||"{}"); }catch{ return {}; } }
function setProgress(bookId, idx){ const p=getProgress(); p[String(bookId)]={idx,at:Date.now()}; try{ localStorage.setItem(PROGRESS_KEY, JSON.stringify(p)); }catch{} }

function qParam(name){ return new URLSearchParams(location.search).get(name)||""; }

async function fetchFirstJson(paths){
  let last = null;
  for(const p of paths){
    try{
      const r = await fetch(p, {headers:{"Accept":"application/json,*/*"}});
      if(!r.ok) throw new Error("http " + r.status);
      return await r.json();
    }catch(e){ last = e; }
  }
  throw last || new Error("json not found");
}
function cleanLookupWord(raw){
  return String(raw||"").toLowerCase().replace(/[’]/g,"'").replace(/^[^a-z]+|[^a-z']+$/g,"").replace(/'s$/i,"").trim();
}
function dictKeysFor(raw){
  const w = cleanLookupWord(raw);
  const out = [w];
  if(/ies$/.test(w) && w.length>4) out.push(w.slice(0,-3)+"y");
  if(/ves$/.test(w) && w.length>4) out.push(w.slice(0,-3)+"f");
  if(/ing$/.test(w) && w.length>5){ out.push(w.slice(0,-3)); out.push(w.slice(0,-3)+"e"); }
  if(/ed$/.test(w) && w.length>4){ out.push(w.slice(0,-2)); out.push(w.slice(0,-1)); }
  if(/es$/.test(w) && w.length>4) out.push(w.slice(0,-2));
  if(/s$/.test(w) && w.length>3) out.push(w.slice(0,-1));
  return [...new Set(out.filter(Boolean))];
}
function splitMeanings(v){
  if(Array.isArray(v)) return v.map(x=>String(x||"").trim()).filter(Boolean);
  if(v == null) return [];
  const text = String(v).trim();
  if(!text) return [];
  return text.split(/\s*[;|]\s*|\n+/).map(x=>x.trim()).filter(Boolean).slice(0,8);
}
function pick(obj, keys){
  for(const k of keys){
    if(obj && obj[k] != null && String(obj[k]).trim() !== "") return obj[k];
  }
  return "";
}
function normalizeDictEntry(value, key){
  if(typeof value === "string") return {word:key, meanings:splitMeanings(value)};
  const o = value || {};
  const word = pick(o, ["word","Word","english","English","EN","en","kelime","Kelime"]) || key;
  const meanings = splitMeanings(pick(o, ["anlamlar","meanings","meaning","Meaning","turkish","Turkish","tr","TR","Turkish meaning","turkishMeaning","Türkçe","turkce","anlam","Anlam"]));
  return {
    word:String(word||key||""),
    meanings,
    level:String(pick(o,["seviye","level","Level","CEFR","cefr","SentenceLevel","sentenceLevel"])||""),
    freq:String(pick(o,["frekans","frequency","Frequency","Zipf","zipf","freq"])||""),
    pron:String(pick(o,["oku","pronunciation","Pronunciation","Turkish pronunciation","turkishPronunciation","trPron","TRPron","okunus","okunuş"])||""),
    ipa:String(pick(o,["ipa","IPA"])||"")
  };
}
function normalizeDictionary(raw){
  const out = {};
  if(Array.isArray(raw)){
    raw.forEach(item=>{
      const e = normalizeDictEntry(item, "");
      const k = cleanLookupWord(e.word);
      if(k) out[k] = e;
    });
    return out;
  }
  Object.entries(raw || {}).forEach(([key,val])=>{
    const e = normalizeDictEntry(val, key);
    const keys = [cleanLookupWord(key), cleanLookupWord(e.word)].filter(Boolean);
    keys.forEach(k=>{ if(k) out[k] = e; });
  });
  return out;
}
async function ensureDictionaryLoaded(){
  if(State.dictionary) return State.dictionary;
  if(State.dictPromise) return State.dictPromise;
  State.dictPromise = fetchFirstJson(DICT_PATHS).then(raw=>{
    State.dictionary = normalizeDictionary(raw);
    return State.dictionary;
  }).catch(e=>{
    console.warn("Kütüphane sözlük yüklenemedi:", e);
    State.dictionary = {};
    return State.dictionary;
  });
  return State.dictPromise;
}
function getDictEntry(rawWord){
  const dict = State.dictionary || {};
  for(const k of dictKeysFor(rawWord)){
    if(dict[k]) return dict[k];
  }
  return null;
}

function fetchWithTimeout(url, opts, ms){
  const ctrl = new AbortController();
  const t = setTimeout(()=>ctrl.abort(), ms || 9000);
  return fetch(url, Object.assign({}, opts || {}, {signal:ctrl.signal})).finally(()=>clearTimeout(t));
}
async function fetchViaProxy(url, asText){
  // JSON katalog isteklerinde önce doğrudan Gutendex denenir.
  // Kitap metninde doğrudan Gutenberg denemiyoruz; Gutenberg CORS engeli konsolda hata üretiyor.
  if(asText) return fetchTextSafely(url);
  try{
    const r = await fetchWithTimeout(url, {headers:{"Accept":"application/json,*/*"}}, 9000);
    if(!r.ok) throw new Error("http " + r.status);
    return await r.json();
  }catch(firstErr){
    const r = await fetchWithTimeout(PROXY + encodeURIComponent(url), {headers:{"Accept":"application/json,*/*"}}, 10000);
    if(!r.ok) throw firstErr;
    return await r.json();
  }
}
async function fetchTextSafely(url){
  let lastErr = null;
  for(const make of TEXT_PROXIES){
    const proxied = make(url);
    try{
      const r = await fetchWithTimeout(proxied, {headers:{"Accept":"text/plain,*/*"}}, 12000);
      if(!r.ok) throw new Error("http " + r.status);
      const text = await r.text();
      if(text && text.length > 1000 && !/^\?\s*\{\s*"error"/i.test(text)) return text;
      lastErr = new Error("short text");
    }catch(e){
      lastErr = e;
    }
  }
  throw lastErr || new Error("text fetch failed");
}

let _cacheDBPromise = null;
function openCacheDB(){
  if(_cacheDBPromise) return _cacheDBPromise;
  _cacheDBPromise = new Promise((resolve, reject)=>{
    if(!window.indexedDB) return reject(new Error("IndexedDB yok"));
    const req = indexedDB.open(CACHE_DB, 1);
    req.onupgradeneeded = ()=>{
      const db = req.result;
      if(!db.objectStoreNames.contains(CACHE_STORE)) db.createObjectStore(CACHE_STORE);
    };
    req.onsuccess = ()=>resolve(req.result);
    req.onerror = ()=>reject(req.error || new Error("IndexedDB açılamadı"));
  });
  return _cacheDBPromise;
}
async function cacheGet(key){
  try{
    const db = await openCacheDB();
    return await new Promise((resolve, reject)=>{
      const tx = db.transaction(CACHE_STORE, "readonly");
      const rq = tx.objectStore(CACHE_STORE).get(key);
      rq.onsuccess = ()=>resolve(rq.result || null);
      rq.onerror = ()=>reject(rq.error || new Error("cache okunamadı"));
    });
  }catch(e){ return null; }
}
async function cacheSet(key, value){
  try{
    const db = await openCacheDB();
    await new Promise((resolve, reject)=>{
      const tx = db.transaction(CACHE_STORE, "readwrite");
      tx.objectStore(CACHE_STORE).put(value, key);
      tx.oncomplete = resolve;
      tx.onerror = ()=>reject(tx.error || new Error("cache yazılamadı"));
    });
    return true;
  }catch(e){
    console.warn("Kütüphane cache yazılamadı:", e);
    return false;
  }
}
function bookCacheKey(book){ return "bookText:" + String(book && book.id || ""); }
async function getCachedBookText(book){
  const rec = await cacheGet(bookCacheKey(book));
  if(rec && rec.text && rec.text.length > 1000) return rec;
  return null;
}
async function saveCachedBookText(book, text, source){
  if(!book || !book.id || !text || text.length < 1000) return false;
  return cacheSet(bookCacheKey(book), {

}

function normalizeBooks(arr){
  const seen = new Set();
  return (arr||[]).filter(b=>{
    if(!b || !b.id || seen.has(b.id)) return false;
    seen.add(b.id);
    const hasText = Object.keys(b.formats||{}).some(k=>k.toLowerCase().startsWith("text/plain"));
    return hasText || b.id;
  });
}

function textCandidates(book){
  const formats = book.formats || {};
  const direct = Object.entries(formats)
    .filter(([k,v])=>/^text\/plain/i.test(k) && !/\.zip($|\?)/i.test(v||""))
    .map(([,v])=>v);
  const id = book.id;
  return [...direct,
    `https://www.gutenberg.org/cache/epub/${id}/pg${id}.txt`,
    `https://www.gutenberg.org/files/${id}/${id}-0.txt`,
    `https://www.gutenberg.org/files/${id}/${id}.txt`
  ].filter(Boolean).filter((v,i,a)=>a.indexOf(v)===i);
}
async function fetchBookText(book){
  const cached = await getCachedBookText(book);
  if(cached){
    State.source = "cache";
    return cached.text;
  }
  let last=null;
  for(const url of textCandidates(book)){
    try{
      const text = await fetchViaProxy(url, true);
      if(text && text.length>1000){
        State.source = "internet";
        await saveCachedBookText(book, text, url);
        return text;
      }
    }catch(e){ last=e; }
  }
  throw last || new Error("text not found");
}
function cleanBookText(text){
  let t = String(text||"").replace(/\r/g,"");
  const startPatterns = [/\*\*\*\s*START OF (?:THE|THIS) PROJECT GUTENBERG EBOOK[^\n]*\*\*\*/i,/START OF (?:THE|THIS) PROJECT GUTENBERG EBOOK/i];
  for(const re of startPatterns){ const m=t.search(re); if(m>=0){ t=t.slice(m); t=t.replace(re,""); break; } }
  const endPatterns = [/\*\*\*\s*END OF (?:THE|THIS) PROJECT GUTENBERG EBOOK[\s\S]*$/i,/END OF (?:THE|THIS) PROJECT GUTENBERG EBOOK[\s\S]*$/i];
  for(const re of endPatterns){ if(re.test(t)){ t=t.replace(re,""); break; } }
  t = t.replace(/\n[ \t]+/g,"\n").replace(/[ \t]{2,}/g," ").replace(/\n{3,}/g,"\n\n").trim();
  return t;
}
function splitText(text){
  const max = PRESETS[State.level].max || 760;
  const raw = cleanBookText(text).split(/\n\s*\n+/).map(p=>p.replace(/\s*\n\s*/g," ").trim()).filter(Boolean);
  const out=[];
  for(const p of raw){
    if(/^chapter\s+[ivxlcdm\d]+\.?$/i.test(p)) continue;
    if(/^(contents|index|preface|bibliography)$/i.test(p.trim())) continue;
    if(p.length < 45) continue;
    if(p.length <= max){ out.push(p); continue; }
    const sentences = splitSentencesPlain(p);
    let buf="";
    for(const s of sentences){
      if((buf + " " + s).trim().length > max && buf.length>60){ out.push(buf.trim()); buf=s; }
      else buf=(buf + " " + s).trim();
    }
    if(buf.length>45) out.push(buf.trim());
  }
  return out.filter((p,i)=>i<900);
}
function splitSentencesPlain(t){ return String(t||"").match(/[^.!?]+[.!?]+[”’'"]*|[^.!?]+$/g)?.map(s=>s.trim()).filter(Boolean) || [String(t||"")]; }

function stats(text){
  const words = String(text||"").match(/[A-Za-z']+/g)||[];

  const long = words.filter(w=>w.length>7).length / Math.max(1,words.length);
  const score = Math.round(avg*2.3 + long*65);
  const lv = score<32?"A1":score<42?"A2":score<54?"B1":score<66?"B2":"C1";
  return {words:words.length,sents:sents.length,avg:Math.round(avg),score,lv};
}

  const clean = String(text||"").replace(/\s+/g," ").trim();
  if(!clean) return [];
  const sentences = clean.match(/[^.!?]+[.!?]*/g) || [clean];
  const chunks = [];
  let current = "";
  sentences.forEach(part=>{
    const s = part.trim();
    if(!s) return;
    if((current + " " + s).trim().length > 220 && current){ chunks.push(current.trim()); current = s; }
    else current = (current + " " + s).trim();
  });
  if(current) chunks.push(current.trim());
  return chunks;
}
function updateSpeechButtons(isSpeaking){
  try{
    document.querySelectorAll("#listenBtn,#listenBottomBtn").forEach(btn=>{
      if(!btn) return;
      btn.textContent = isSpeaking ? "🔇 Sus" : (btn.id === "listenBtn" ? "🔊 Metni sesli oku" : "🔊 Oku");
      btn.classList.toggle("stop", !!isSpeaking);
    });
  }catch{}
}
function speakNextChunk(token){
  if(token !== SpeechState.token) return;
  const chunk = SpeechState.chunks[SpeechState.index++];
  if(!chunk){
    SpeechState.speaking = false;
    updateSpeechButtons(false);
    return;
  }
  try{
    const u = new SpeechSynthesisUtterance(chunk);
    u.lang = "en-US";
    u.rate = 0.86;
    u.pitch = 1;
    u.onend = ()=>speakNextChunk(token);
    u.onerror = ()=>speakNextChunk(token);
    window.speechSynthesis.speak(u);
  }catch{
    SpeechState.speaking = false;
    updateSpeechButtons(false);
  }
}
function toggleSpeech(text){
  if(SpeechState.speaking){ stopSpeech(); return; }
  speakText(text);
}
function speakText(text){
  if(!("speechSynthesis" in window) || !("SpeechSynthesisUtterance" in window)) return;
  stopSpeech(false);
  SpeechState.chunks = splitSpeechChunks(text);
  SpeechState.index = 0;
  SpeechState.token++;
  if(!SpeechState.chunks.length) return;
  SpeechState.speaking = true;
  updateSpeechButtons(true);
  speakNextChunk(SpeechState.token);
}
function stopSpeech(update){
  SpeechState.token++;
  SpeechState.chunks = [];
  SpeechState.index = 0;
  SpeechState.speaking = false;
  try{ if("speechSynthesis" in window) window.speechSynthesis.cancel(); }catch{}
  if(update !== false) updateSpeechButtons(false);
}

function init(){
  ensureDictionaryLoaded();
  const saved = loadSaved();
  if(saved && saved.level) State.level=saved.level;
  if(qParam("fromTeacher") && saved && saved.book){
    State.level=saved.level||State.level;
    loadBook(saved.book, Number(saved.idx||0));
    try{ history.replaceState(null,"","./library.html"); }catch{}
    return;
  }
  renderHome();
}
init();
})();
</script>
