<!doctype html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PWA Temizle</title>
<style>
body{margin:0;background:#0b1120;color:#e8eef7;font-family:system-ui,sans-serif;display:grid;place-items:center;min-height:100vh}
.box{max-width:520px;padding:22px;background:#111827;border:1px solid #ffffff22;border-radius:16px;line-height:1.6}
button,a{display:inline-block;margin-top:12px;background:#2563eb;color:#fff;border:0;border-radius:10px;padding:11px 14px;text-decoration:none;font-weight:800}
</style>
</head>
<body>
<div class="box">
<h2>Önbellek temizleniyor...</h2>
<p id="msg">Lütfen bekle.</p>
<a id="go" href="./index.html">Ana sayfaya dön</a>
</div>
<script>
(async function(){
  const msg=document.getElementById('msg');
  try{
    if('serviceWorker' in navigator){
      const regs=await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r=>r.unregister()));
    }
    if(window.caches){
      const keys=await caches.keys();
      await Promise.all(keys.map(k=>caches.delete(k)));
    }
    localStorage.removeItem('pwaInstallDismissed');
    msg.textContent='Temizlendi. Ana sayfaya dönüp Ctrl+F5 yap.';
  }catch(e){
    msg.textContent='Temizleme sırasında hata oldu: '+e;
  }
})();
</script>
</body>
</html>
