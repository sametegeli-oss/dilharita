<!doctype html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Günlük Takip · Dil Harita</title>
<script src="./study-tracker.js"></script>
<style>
:root{--bg:#f7fafc;--text:#0f172a;--muted:#526071;--line:#d9e2ee;--blue:#1673f9;--green:#12b76a;--card:#fff;--soft:#f1f6fb}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:Nunito,system-ui,-apple-system,Segoe UI,Arial,sans-serif}
.wrap{max-width:980px;margin:0 auto;padding:28px}
.top{display:flex;align-items:center;gap:14px;margin-bottom:22px}
.back{width:52px;height:52px;border-radius:16px;border:1px solid var(--line);background:#fff;text-decoration:none;color:#111827;font-size:30px;display:flex;align-items:center;justify-content:center}
h1{font-size:42px;margin:0;font-weight:950;letter-spacing:-.8px}
.sub{color:var(--muted);margin-top:4px}
.hero{background:#fff;border:1px solid var(--line);border-radius:28px;padding:28px;margin-bottom:20px;box-shadow:0 18px 44px #0000000b;text-align:center}
.flame{font-size:84px;opacity:.22;margin-bottom:10px}
.week{display:flex;justify-content:center;gap:20px;border:2px solid var(--line);border-radius:22px;padding:16px;margin:18px auto 26px;max-width:620px}
.day{text-align:center;color:#172033}.circle{width:48px;height:48px;border:3px solid var(--line);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 7px;font-weight:950;color:#fff;background:#fff}
.day.done .circle{background:var(--green);border-color:var(--green)}
.day.today .circle{border-style:dashed;border-color:#cbd5e1;color:#cbd5e1}
.hero-title{font-size:34px;line-height:1.2;font-weight:950;margin:0 0 12px}.hero-title b{color:#1673f9}
.hero p{font-size:18px;color:#475569}
.btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:20px}.btn{border:1px solid var(--line);border-radius:999px;padding:14px 22px;font-weight:950;text-decoration:none;color:#111827;background:#fff;cursor:pointer}.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}.btn.green{background:var(--green);color:#fff;border-color:var(--green)}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat{background:#fff;border:1px solid var(--line);border-radius:20px;padding:18px}.num{font-size:30px;font-weight:950}.lab{color:var(--muted);font-size:13px}
.card{background:#fff;border:1px solid var(--line);border-radius:24px;padding:20px;margin-bottom:18px}
.card h2{margin:0 0 14px;font-size:22px}
.progress{height:14px;background:#e5edf7;border-radius:999px;overflow:hidden}.progress span{display:block;height:100%;background:var(--green);width:0%}
.goal-row{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;margin:12px 0;color:#334155}
.mini-week{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.mini{background:var(--soft);border-radius:14px;padding:10px;text-align:center}.mini b{display:block;font-size:20px}.mini span{font-size:11px;color:var(--muted)}
@media(max-width:760px){.wrap{padding:16px}h1{font-size:30px}.week{gap:8px}.circle{width:38px;height:38px}.grid{grid-template-columns:repeat(2,1fr)}.hero-title{font-size:25px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <a class="back" href="./index.html">←</a>
    <div><h1>Günlük Çalışma Takibi</h1><div class="sub">Seri, hedef ve haftalık ilerleme takibi</div></div>
  </div>
  <section class="hero">
    <div class="flame">🔥</div>
    <div class="week" id="week"></div>
    <h2 class="hero-title"><b id="streak">0 günlük</b> öğrenme çizgisi</h2>
    <p id="heroText">Öğrenme çizgine devam etmek için bugün bir ders yap.</p>
    <div class="btns">
      <a class="btn primary" href="./index-app.html">Derse başla</a>
      <button class="btn green" id="markToday">Bugünü tamamla</button>
      <button class="btn" id="demoBtn">Demo takip oluştur</button>
    </div>
  </section>
  <div class="grid">
    <div class="stat"><div class="num" id="lessons">0</div><div class="lab">bugün ders</div></div>
    <div class="stat"><div class="num" id="sentences">0</div><div class="lab">bugün cümle</div></div>
    <div class="stat"><div class="num" id="reviews">0</div><div class="lab">bugün tekrar</div></div>
    <div class="stat"><div class="num" id="minutes">0</div><div class="lab">bugün dakika</div></div>
  </div>
  <section class="card">
    <h2>Günlük hedef</h2>
    <div class="goal-row"><span>Ders hedefi</span><b id="lessonGoalText"></b></div><div class="progress"><span id="lessonProg"></span></div>
    <div class="goal-row"><span>Cümle hedefi</span><b id="sentenceGoalText"></b></div><div class="progress"><span id="sentenceProg"></span></div>
  </section>
  <section class="card">
    <h2>Son 7 gün</h2>
    <div class="mini-week" id="miniWeek"></div>
  </section>
</div>
<script>
function dayName(date){return ["Paz","Pts","Sal","Çar","Per","Cum","Cts"][date.getDay()]}
function pct(a,b){return Math.max(0,Math.min(100,Math.round((a/(b||1))*100)))}
function render(){
  const s=StudyTracker.summary();
  const today=s.today, goals=s.goals;
  document.getElementById("streak").textContent=s.streak+" günlük";
  document.getElementById("heroText").textContent=s.doneToday?"Bugünkü hedef tamamlandı. Çizgiyi korudun!":"Öğrenme çizgine devam etmek için bugün bir ders yap.";
  document.getElementById("lessons").textContent=today.lessons||0;
  document.getElementById("sentences").textContent=today.sentences||0;
  document.getElementById("reviews").textContent=today.reviews||0;
  document.getElementById("minutes").textContent=today.minutes||0;
  document.getElementById("lessonGoalText").textContent=(today.lessons||0)+" / "+goals.dailyLessons;
  document.getElementById("sentenceGoalText").textContent=(today.sentences||0)+" / "+goals.dailySentences;
  document.getElementById("lessonProg").style.width=pct(today.lessons,goals.dailyLessons)+"%";
  document.getElementById("sentenceProg").style.width=pct(today.sentences,goals.dailySentences)+"%";
  const week=s.week;
  document.getElementById("week").innerHTML=week.map(d=>`<div class="day ${(d.lessons||d.sentences||d.videos||d.reviews||d.minutes)?'done':''}"><div class="circle">${(d.lessons||d.sentences||d.videos||d.reviews||d.minutes)?'✓':''}</div><div>${dayName(new Date(d.date))}</div></div>`).join("");
  document.getElementById("miniWeek").innerHTML=week.map(d=>`<div class="mini"><b>${d.lessons||0}</b><span>${dayName(new Date(d.date))}</span></div>`).join("");
}
document.getElementById("markToday").onclick=()=>{StudyTracker.recordActivity("lesson",1);StudyTracker.recordActivity("minute",10);StudyTracker.recordActivity("sentence",20);render();}
document.getElementById("demoBtn").onclick=()=>{StudyTracker.resetDemo();render();}
render();
</script>
</body>
</html>
