<!doctype html>
<html lang="tr">
<head>
<script src="./auth-guard.js?v=1"></script>
<script src="./storage-bridge.js?v=2"></script>
<script src="./progress-engine.js?v=2"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0b1120">
<title>🎯 Phrasal Verb Pratiği — Dil Harita</title>
<style>
:root{
  --bg:#0b1120; --surface:#131c30; --surface-2:#1a2540; --border:#ffffff14;
  --text:#e8eef7; --muted:#93a4bd; --accent:#60a5fa; --accent-strong:#3b82f6;
  --ok:#34d399; --ok-soft:#34d39922; --warn:#fbbf24; --bad:#f87171; --bad-soft:#ef444422;
  --en:#34d399; --radius:16px;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  background:radial-gradient(1200px 600px at 50% -10%,#1a2540 0%,transparent 60%),var(--bg);
  color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;-webkit-font-smoothing:antialiased;
}
.wrap{max-width:680px;margin:0 auto;min-height:100%;padding:16px;display:flex;flex-direction:column}
.top{display:flex;align-items:center;gap:12px;padding:6px 0 14px}
.back{background:var(--surface);border:1px solid var(--border);color:var(--text);width:40px;height:40px;border-radius:11px;cursor:pointer;font-size:18px;flex-shrink:0;text-decoration:none;display:grid;place-items:center}
.back:hover{background:var(--surface-2)}
.top-title h1{margin:0;font-size:19px;font-weight:900}
.top-title p{margin:1px 0 0;font-size:12px;color:var(--muted)}
.queue-pill{margin-left:auto;background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:6px 12px;font-size:12px;font-weight:800;color:var(--muted)}
.queue-pill b{color:var(--accent)}
.prog{height:6px;background:var(--surface);border-radius:99px;overflow:hidden;margin-bottom:18px}
.prog>span{display:block;height:100%;width:0;background:linear-gradient(90deg,#60a5fa,#34d399);transition:width .3s}

/* mod seçimi */
.modes{display:flex;flex-direction:column;gap:14px;margin-top:10px}
.mode-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:18px;cursor:pointer;transition:.15s;text-align:left;color:var(--text);font:inherit}
.mode-card:hover{border-color:var(--accent)}
.mode-card b{display:block;font-size:18px;margin-bottom:5px}
.mode-card span{display:block;color:var(--muted);font-size:13px;line-height:1.45}
.settings{margin-top:18px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px}
.settings h3{margin:0 0 10px;font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.row label{font-size:13px;color:var(--text);font-weight:800;min-width:110px}
select,input[type=number]{background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:9px 12px;font:800 14px system-ui}

/* alıştırma kartı */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;display:flex;flex-direction:column}
.qtype{font-size:12px;color:var(--muted);font-weight:800;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}
.q-tr{font-size:24px;font-weight:800;line-height:1.4;margin-bottom:4px}
.q-hint{font-size:13px;color:var(--muted);margin-bottom:18px}
.q-sentence{font-size:19px;line-height:1.6;margin-bottom:18px}
.blank{display:inline-block;min-width:90px;border-bottom:2px dashed var(--accent);color:var(--accent);font-weight:900;text-align:center}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:14px 16px;font:800 16px system-ui;cursor:pointer;text-align:left;transition:.12s}
.opt:hover{border-color:var(--accent)}
.opt.correct{background:var(--ok-soft);border-color:var(--ok);color:var(--ok)}
.opt.wrong{background:var(--bad-soft);border-color:var(--bad);color:var(--bad)}
.opt:disabled{cursor:default}
.answer-box{display:flex;gap:10px;margin-top:4px}
.answer-box input{flex:1;background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:14px 16px;font:800 16px system-ui}
.btn{border:0;border-radius:12px;padding:13px 18px;font:900 15px system-ui;cursor:pointer}
.b-blue{background:var(--accent-strong);color:#fff}
.b-green{background:linear-gradient(135deg,#27ce6d,#14aa55);color:#fff}
.b-ghost{background:var(--surface-2);color:var(--text);border:1px solid var(--border)}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
.feedback{margin-top:16px;padding:14px 16px;border-radius:12px;font-size:15px;line-height:1.5}
.fb-ok{background:var(--ok-soft);color:var(--ok)}
.fb-bad{background:var(--bad-soft);color:var(--bad)}
.fb-ok b,.fb-bad b{color:var(--text)}
.reveal{margin-top:8px;font-size:14px;color:var(--muted)}
.reveal b{color:var(--en)}
.done{text-align:center;padding:40px 20px}
.done .big{font-size:48px;margin-bottom:10px}
.done h2{margin:0 0 6px;font-size:24px}
.done p{color:var(--muted);margin:0 0 20px}
.score-line{display:flex;justify-content:center;gap:24px;margin:18px 0}
.score-box{text-align:center}
.score-box .num{font-size:32px;font-weight:900}
.score-box .lbl{font-size:12px;color:var(--muted);margin-top:2px}
.spk{background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:12px 16px;font:800 15px system-ui;cursor:pointer;margin-bottom:18px}
.hidden{display:none}
.loading{text-align:center;color:var(--muted);padding:50px}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <a class="back" href="./index.html" title="Ana menü">←</a>
    <div class="top-title">
      <h1>🎯 Phrasal Verb Pratiği</h1>
      <p>Öbek fiilleri alıştırmayla pekiştir</p>
    </div>
    <div class="queue-pill hidden" id="queuePill"><b id="qDone">0</b>/<span id="qTotal">0</span></div>
  </div>

  <div class="prog hidden" id="progWrap"><span id="progBar"></span></div>

  <!-- MOD SEÇİMİ -->
  <div id="menu">
    <div class="modes">
      <button class="mode-card" data-mode="choice">
        <b>🔤 Çoktan Seçmeli</b>
        <span>Türkçe anlamı verilir, 4 İngilizce öbekten doğrusunu seç. Yeni öbek tanımak için ideal.</span>
      </button>
      <button class="mode-card" data-mode="fill">
        <b>✍️ Boşluk Doldurma</b>
        <span>Örnek cümlede öbek gizlenir, sen yazarsın. Kullanım kalıbını öğrenir.</span>
      </button>
      <button class="mode-card" data-mode="listen">
        <b>🎧 Dinle & Yaz</b>
        <span>Örnek cümle seslendirilir, içindeki öbeği yazarsın. Dinleme + yazma birlikte.</span>
      </button>
    </div>

    <div class="settings">
      <h3>Ayarlar</h3>
      <div class="row">
        <label>Soru sayısı</label>
        <select id="setCount">
          <option value="10">10 soru</option>
          <option value="20" selected>20 soru</option>
          <option value="30">30 soru</option>
          <option value="50">50 soru</option>
        </select>
      </div>
      <div class="row">
        <label>Zorluk / sıklık</label>
        <select id="setFreq">
          <option value="3">Önce çok yaygın (★★★+)</option>
          <option value="2" selected>Yaygın öbekler (★★+)</option>
          <option value="1">Geniş havuz (★+)</option>
          <option value="0">Tümü (rastgele)</option>
        </select>
      </div>
    </div>
  </div>

  <!-- ALIŞTIRMA SAHNESİ -->
  <div id="stage" class="hidden"></div>
</div>

<script>
(function(){
  "use strict";
  function $(id){ return document.getElementById(id); }
  function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];}); }
  function shuffle(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t; } return a; }
  function norm(s){ return String(s||"").toLowerCase().replace(/[’]/g,"'").replace(/[^a-z0-9'\s]/g," ").replace(/\s+/g," ").trim(); }

  var DATA=[];
  var session=null; // {mode, items, idx, correct, wrong}

  // ---- TTS ----
  var _voices=[];
  function refreshVoices(){ try{ _voices=speechSynthesis.getVoices()||[]; }catch(e){ _voices=[]; } }
  refreshVoices();
  try{ speechSynthesis.onvoiceschanged=refreshVoices; }catch(e){}
  function pickEn(){
    if(!_voices.length) refreshVoices();
    return _voices.find(function(v){return /^en[-_]US/i.test(v.lang);})
        || _voices.find(function(v){return /^en[-_]/i.test(v.lang);}) || null;
  }
  function speak(text){
    try{ speechSynthesis.cancel(); }catch(e){}
    try{ var u=new SpeechSynthesisUtterance(text); u.lang="en-US"; var v=pickEn(); if(v){u.voice=v;u.lang=v.lang;} u.rate=.92; speechSynthesis.speak(u); }catch(e){}
  }

  // ---- StudyTracker / Hata defteri entegrasyonu ----
  function recordStudy(){
    try{ if(window.StudyTracker && StudyTracker.recordActivity) StudyTracker.recordActivity("review",1,{source:"pv-practice"}); }catch(e){}
  }
  function logError(item, mode, answer){
    try{
      if(window.LearningErrorDB && LearningErrorDB.add){
        LearningErrorDB.add({
          source:"pv-practice",
          mode:mode,
          sentenceId:"pv:"+item.pv,
          target:item.pv,
          answer:answer||"",
          sentenceTR:item.tr||"",
          module:"phrasal-verbs",
          grade:"hard",
          score:0
        });
      }
    }catch(e){}
  }

  // ---- Soru havuzu hazırla ----
  function buildPool(minFreq){
    var pool = DATA.filter(function(d){ return d.pv && d.tr; });
    if(minFreq>0){
      var f = pool.filter(function(d){ return (d.freq||0)>=minFreq; });
      if(f.length>=20) pool=f; // yeterli varsa filtrele, yoksa tümünü kullan
    }
    return pool;
  }

  // Boşluk/dinle için örneği olan öbekler gerekir
  function withExamples(pool){
    return pool.filter(function(d){ return d.examples && d.examples.length; });
  }

  function makeSession(mode, count, minFreq){
    var pool = buildPool(minFreq);
    if(mode==="fill" || mode==="listen") pool = withExamples(pool);
    if(!pool.length) return null;
    // sıklığa hafif ağırlık: yüksek freq daha olası ama hepsi seçilebilir
    var weighted = shuffle(pool);
    weighted.sort(function(a,b){ return (b.freq||0)*Math.random() - (a.freq||0)*Math.random(); });
    var items = weighted.slice(0, Math.min(count, weighted.length));
    return { mode:mode, items:items, idx:0, correct:0, wrong:0, pool:pool };
  }

  // ---- Render: ilerleme ----
  function updateProgress(){
    $("qDone").textContent = session.idx;
    $("qTotal").textContent = session.items.length;
    $("progBar").style.width = (100*session.idx/session.items.length)+"%";
  }

  // ---- Soru üret ----
  function renderQuestion(){
    if(session.idx >= session.items.length){ return renderDone(); }
    updateProgress();
    var item = session.items[session.idx];
    // kayan öğretmene bu öbeği bildir
    try{ if(window.dhSetTopic) dhSetTopic({ baslik:item.pv, soru:item.pv+(item.examples&&item.examples[0]?" — "+item.examples[0]:""), ceviri:item.tr||"", baglam:"Phrasal verb pratiği" }); }catch(e){}
    if(session.mode==="choice") return renderChoice(item);
    if(session.mode==="fill") return renderFill(item);
    if(session.mode==="listen") return renderListen(item);
  }

  // 1) Çoktan seçmeli
  function renderChoice(item){
    var distractors = shuffle(session.pool.filter(function(d){ return d.pv!==item.pv; })).slice(0,3);
    var opts = shuffle([item].concat(distractors));
    var stage=$("stage");
    stage.innerHTML =
      '<div class="card">'
      +'<div class="qtype">Hangi öbek bu anlama gelir?</div>'
      +'<div class="q-tr">'+esc(item.tr)+'</div>'
      +((item.meanings&&item.meanings[0])?'<div class="q-hint">'+esc(item.meanings[0])+'</div>':'')
      +'<div class="opts" id="opts">'
      + opts.map(function(o){ return '<button class="opt" data-pv="'+esc(o.pv)+'">'+esc(o.pv)+'</button>'; }).join("")
      +'</div>'
      +'<div id="fb"></div>'
      +'</div>';
    stage.querySelectorAll(".opt").forEach(function(btn){
      btn.onclick=function(){
        var picked=btn.getAttribute("data-pv");
        var correct = picked===item.pv;
        stage.querySelectorAll(".opt").forEach(function(b){
          b.disabled=true;
          if(b.getAttribute("data-pv")===item.pv) b.classList.add("correct");
          else if(b===btn) b.classList.add("wrong");
        });
        afterAnswer(correct, item, picked, "choice");
      };
    });
  }

  // 2) Boşluk doldurma
  function renderFill(item){
    var ex = item.examples[Math.floor(Math.random()*item.examples.length)];
    var exTr = (item.examples_tr && item.examples_tr[item.examples.indexOf(ex)]) || "";
    // örnekteki öbeği boşlukla değiştir (kelime kelime kabaca)
    var blanked = blankOut(ex, item);
    var stage=$("stage");
    stage.innerHTML =
      '<div class="card">'
      +'<div class="qtype">Boşluğa uygun öbeği yaz</div>'
      +'<div class="q-sentence">'+blanked+'</div>'
      +(exTr?'<div class="q-hint">'+esc(exTr)+'</div>':'')
      +'<div class="answer-box"><input id="ans" type="text" placeholder="öbek fiili yaz..." autocomplete="off" autocapitalize="off" spellcheck="false"></div>'
      +'<div class="actions"><button class="btn b-blue" id="checkBtn">Kontrol et</button>'
      +'<button class="btn b-ghost" id="skipBtn">Bilmiyorum</button></div>'
      +'<div id="fb"></div>'
      +'</div>';
    var input=$("ans");
    input.focus();
    function submit(){
      var ans=input.value;
      var correct = norm(ans)===norm(item.pv) || norm(ans).indexOf(norm(item.pv))!==-1;
      input.disabled=true; $("checkBtn").disabled=true; $("skipBtn").disabled=true;
      afterAnswer(correct, item, ans, "fill");
    }
    $("checkBtn").onclick=submit;
    $("skipBtn").onclick=function(){ input.disabled=true; afterAnswer(false,item,"","fill"); };
    input.addEventListener("keydown",function(e){ if(e.key==="Enter") submit(); });
  }

  // 3) Dinle & yaz
  function renderListen(item){
    var ex = item.examples[Math.floor(Math.random()*item.examples.length)];
    var stage=$("stage");
    stage.innerHTML =
      '<div class="card">'
      +'<div class="qtype">Cümleyi dinle, içindeki öbeği yaz</div>'
      +'<button class="spk" id="spkBtn">🔊 Tekrar dinle</button>'
      +'<div class="answer-box"><input id="ans" type="text" placeholder="duyduğun öbeği yaz..." autocomplete="off" autocapitalize="off" spellcheck="false"></div>'
      +'<div class="actions"><button class="btn b-blue" id="checkBtn">Kontrol et</button>'
      +'<button class="btn b-ghost" id="skipBtn">Bilmiyorum</button></div>'
      +'<div id="fb"></div>'
      +'</div>';
    setTimeout(function(){ speak(ex); }, 300);
    $("spkBtn").onclick=function(){ speak(ex); };
    var input=$("ans"); input.focus();
    function submit(){
      var ans=input.value;
      var correct = norm(ans)===norm(item.pv) || norm(ans).indexOf(norm(item.pv))!==-1;
      input.disabled=true; $("checkBtn").disabled=true; $("skipBtn").disabled=true;
      afterAnswer(correct, item, ans, "listen", ex);
    }
    $("checkBtn").onclick=submit;
    $("skipBtn").onclick=function(){ input.disabled=true; afterAnswer(false,item,"","listen",ex); };
    input.addEventListener("keydown",function(e){ if(e.key==="Enter") submit(); });
  }

  // örnek cümlede öbeği boşlukla değiştir
  function blankOut(sentence, item){
    var forms = [item.pv].concat(item.forms||[]);
    // en uzun formdan başla (eşleşme önceliği)
    forms.sort(function(a,b){ return b.length-a.length; });
    var html = esc(sentence);
    for(var i=0;i<forms.length;i++){
      var f = forms[i]; if(!f) continue;
      var re = new RegExp("\\b"+f.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"\\b","i");
      if(re.test(sentence)){
        html = esc(sentence).replace(re, '<span class="blank">______</span>');
        return html;
      }
    }
    // form bulunamazsa pv'yi kaba ara
    var re2 = new RegExp(item.pv.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"i");
    if(re2.test(sentence)) html = esc(sentence).replace(re2,'<span class="blank">______</span>');
    return html;
  }

  // ---- Cevap sonrası ----
  function afterAnswer(correct, item, answer, mode, exForListen){
    var fb=$("fb");
    if(correct){ session.correct++; }
    else{ session.wrong++; logError(item, mode, answer); }
    // ortak ilerleme motoruna kaydet
    try{ if(window.DHProgress) DHProgress.recordResult("pv:"+item.pv, correct); }catch(e){}
    var reveal = '<div class="reveal">Öbek: <b>'+esc(item.pv)+'</b> — '+esc(item.tr)+'</div>';
    if(mode==="listen" && exForListen){ reveal += '<div class="reveal">Cümle: '+esc(exForListen)+'</div>'; }
    fb.innerHTML =
      '<div class="feedback '+(correct?"fb-ok":"fb-bad")+'">'
      + (correct? "✓ Doğru!" : "✗ Olmadı.")
      + reveal
      +'</div>'
      +'<div class="actions">'
      +'<button class="btn b-green" id="nextBtn">'+(session.idx+1>=session.items.length?"Bitir":"Sonraki →")+'</button>'
      +'<button class="btn b-ghost" id="hearBtn">🔊 Dinle</button>'
      +'</div>';
    $("nextBtn").onclick=function(){ session.idx++; renderQuestion(); };
    $("hearBtn").onclick=function(){ speak((item.examples&&item.examples[0])||item.pv); };
  }

  // ---- Bitiş ----
  function renderDone(){
    updateProgress();
    recordStudy();
    var total=session.correct+session.wrong;
    var pct = total? Math.round(100*session.correct/total) : 0;
    var emoji = pct>=80?"🏆":pct>=50?"👍":"💪";
    var stage=$("stage");
    stage.innerHTML =
      '<div class="done">'
      +'<div class="big">'+emoji+'</div>'
      +'<h2>Tamamlandı!</h2>'
      +'<p>'+session.items.length+' soru çözdün</p>'
      +'<div class="score-line">'
      +'<div class="score-box"><div class="num" style="color:var(--ok)">'+session.correct+'</div><div class="lbl">Doğru</div></div>'
      +'<div class="score-box"><div class="num" style="color:var(--bad)">'+session.wrong+'</div><div class="lbl">Yanlış</div></div>'
      +'<div class="score-box"><div class="num" style="color:var(--accent)">%'+pct+'</div><div class="lbl">Başarı</div></div>'
      +'</div>'
      +'<div class="actions" style="justify-content:center">'
      +'<button class="btn b-green" id="againBtn">🔁 Tekrar</button>'
      +'<button class="btn b-blue" id="menuBtn">📋 Mod seç</button>'
      +'</div>'
      + (session.wrong? '<p style="margin-top:18px;font-size:13px">Yanlışların <a href="./hata-defteri.html" style="color:var(--accent)">Hata Defteri</a>\'ne eklendi.</p>':'')
      +'</div>';
    $("againBtn").onclick=function(){ startSession(session.mode); };
    $("menuBtn").onclick=function(){ showMenu(); };
  }

  // ---- Akış kontrolü ----
  function startSession(mode){
    var count=parseInt($("setCount").value,10)||20;
    var minFreq=parseInt($("setFreq").value,10)||0;
    var s=makeSession(mode, count, minFreq);
    if(!s){ alert("Bu mod için yeterli veri yok."); return; }
    session=s;
    $("menu").classList.add("hidden");
    $("stage").classList.remove("hidden");
    $("progWrap").classList.remove("hidden");
    $("queuePill").classList.remove("hidden");
    renderQuestion();
  }
  function showMenu(){
    $("menu").classList.remove("hidden");
    $("stage").classList.add("hidden");
    $("progWrap").classList.add("hidden");
    $("queuePill").classList.add("hidden");
  }

  // ---- Başlat ----
  document.querySelectorAll(".mode-card").forEach(function(card){
    card.onclick=function(){ startSession(card.getAttribute("data-mode")); };
  });

  $("stage").innerHTML='<div class="loading">Yükleniyor…</div>';
  fetch("./data/phrasal-verbs.json").then(function(r){ return r.ok?r.json():[]; }).then(function(arr){
    DATA=Array.isArray(arr)?arr:[];
    $("stage").innerHTML="";
  }).catch(function(){
    $("menu").innerHTML='<div class="loading">Veri yüklenemedi. Bağlantını kontrol et.</div>';
  });
})();
</script>
<script src="./ai-status.js?v=1"></script>
<script src="./teacher-bubble.js?v=3"></script>
<script src="./cloud-sync.js?v=3"></script>
</body>
</html>
