<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0b1020">
  <title>Dil Haritası Clean v2</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="css/style.css">
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script defer src="js/app.js"></script>
</head>
<body>
<div id="app">
  <header class="top">
    <button id="toolsBtn" class="icon-btn" title="Araçlar">☰</button>
    <div class="titlebox">
      <div id="activeListTitle" class="list-title">Cümle Listesi</div>
      <div id="statusText" class="status">Yükleniyor…</div>
    </div>
    <button id="backupBtn" class="icon-btn" title="Yedek">💾</button>
  </header>

  <main class="learn-card" id="learnCard">
    <div class="hero-img" id="heroImg"><span>📘</span></div>
    <div class="learn-state" id="learnState">Henüz çalışılmadı</div>
    <h1 id="sentenceText">Cümleler yükleniyor…</h1>
    <p id="sentenceTr">Lütfen bekle.</p>
    <div class="meta-row">
      <span id="levelBadge">-</span>
      <span id="grammarBadge">-</span>
    </div>
    <div id="highlights" class="chips"></div>
    <div id="wordInfo" class="word-info"></div>
    <div class="actions">
      <button id="prevBtn" class="btn ghost">← Geri</button>
      <button id="speakBtn" class="btn blue">🔊 Oku</button>
      <button id="learnBtn" class="btn green">Öğrenmeye Başladım</button>
      <button id="nextBtn" class="btn ghost">İleri →</button>
    </div>
  </main>

  <section class="bottom-panel">
    <input id="searchInput" placeholder="Cümle, kelime veya Türkçe ara…">
    <div id="quickStats" class="stats"></div>
  </section>
</div>

<aside id="drawer" class="drawer" aria-hidden="true">
  <div class="drawer-head">
    <strong>Araçlar</strong>
    <button id="closeDrawer" class="icon-btn">×</button>
  </div>
  <nav class="tabs">
    <button data-tab="list" class="active">📋 Liste</button>
    <button data-tab="review">🧠 Tekrar</button>
    <button data-tab="mining">⛏️ Mining</button>
    <button data-tab="dict">📚 Sözlük</button>
    <button data-tab="pron">🎙️ Telaffuz</button>
  </nav>
  <div id="tab-list" class="tab active">
    <div class="row"><button id="allListBtn" class="btn small blue">Tüm Cümleler</button><button id="todayListBtn" class="btn small green">Bugün Çalış</button></div>
    <div id="sentenceList" class="sentence-list"></div>
  </div>
  <div id="tab-review" class="tab">
    <h3>Akıllı Tekrar</h3>
    <p class="muted">Öğrenmeye başladığın cümleler tekrar zamanı gelince burada görünür.</p>
    <div id="reviewList" class="sentence-list"></div>
  </div>
  <div id="tab-mining" class="tab">
    <h3>Cümleleri Çıkar</h3>
    <textarea id="miningText" placeholder="İngilizce metni buraya yapıştır…"></textarea>
    <button id="extractBtn" class="btn blue full">Cümleleri Çıkar</button>
    <div id="miningResults" class="sentence-list"></div>
  </div>
  <div id="tab-dict" class="tab">
    <h3>Sözlük</h3>
    <input id="dictSearch" placeholder="Kelime ara…">
    <div id="dictResults" class="dict-results"></div>
  </div>
  <div id="tab-pron" class="tab">
    <h3>Telaffuz</h3>
    <input id="pronInput" placeholder="Kelime veya cümle yaz…">
    <button id="pronSpeak" class="btn blue full">🔊 Seslendir</button>
    <p class="muted">Bu temiz sürümde mikrofonu sürekli açık tutan eski kayıt zinciri kaldırıldı.</p>
  </div>
</aside>
<div id="shade" class="shade"></div>
<div id="toast" class="toast"></div>
</body>
</html>
