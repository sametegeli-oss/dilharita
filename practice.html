<!doctype html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0b1120" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet" />
<title>Üretim · Sentence Mode</title>
<style>
:root{
  --bg:#0b1120; --bg-soft:#0f172a; --surface:#131c30; --surface-2:#1a2540;
  --border:#ffffff14; --text:#e8eef7; --muted:#93a4bd;
  --accent:#60a5fa; --accent-strong:#3b82f6;
  --ok:#34d399; --ok-soft:#34d39922; --warn:#fbbf24; --bad:#f87171; --bad-soft:#ef444422;
  --radius:16px;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{
  background:
    radial-gradient(1200px 600px at 50% -10%, #1a2540 0%, transparent 60%),
    var(--bg);
  color:var(--text);-webkit-font-smoothing:antialiased;
  font-family:Nunito,system-ui,-apple-system,sans-serif;
}
.wrap{max-width:680px;margin:0 auto;min-height:100%;padding:16px;display:flex;flex-direction:column}

/* ---- header ---- */
.top{display:flex;align-items:center;gap:12px;padding:6px 0 14px}
.back{background:var(--surface);border:1px solid var(--border);color:var(--text);
  width:40px;height:40px;border-radius:11px;cursor:pointer;font-size:18px;flex-shrink:0}
.back:hover{background:var(--surface-2)}
.top-title{flex:1;min-width:0}
.top-title h1{margin:0;font-family:Fraunces,serif;font-weight:600;font-size:19px;letter-spacing:-.3px}
.top-title p{margin:1px 0 0;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.queue-pill{background:var(--surface);border:1px solid var(--border);border-radius:99px;
  padding:6px 12px;font-size:12px;font-weight:800;color:var(--muted);flex-shrink:0}
.queue-pill b{color:var(--accent)}

/* ---- progress ---- */
.prog{height:6px;background:var(--surface);border-radius:99px;overflow:hidden;margin-bottom:18px}
.prog>span{display:block;height:100%;background:linear-gradient(90deg,#60a5fa,#34d399);transition:width .3s}

/* ---- the stage / card ---- */
.stage{flex:1;display:flex;flex-direction:column}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:22px;display:flex;flex-direction:column}

.meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
.chip{background:var(--surface-2);color:var(--muted);border-radius:7px;padding:3px 9px;font-size:11px;font-weight:700}
.chip-lv{background:var(--accent-strong);color:#fff}
.chip-mode{background:#a78bfa22;color:#c4b5fd}

/* the Turkish prompt is the hero of production mode */
.tr-prompt{font-size:13px;color:var(--muted);font-weight:800;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px}
.tr-text{font-family:Fraunces,serif;font-size:25px;font-weight:600;line-height:1.4;letter-spacing:-.2px;margin-bottom:6px}
.pron-hint{color:var(--warn);opacity:.85;font-style:italic;font-size:14px;margin-bottom:4px;display:none}
.pron-hint.show{display:block}

.layer-label{margin:20px 0 12px;font-size:12px;color:var(--muted);font-weight:700;display:flex;align-items:center;gap:8px}
.layer-label .dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}

/* ---- LAYER 1: word ordering ---- */
.build-line{min-height:54px;border:1.5px dashed var(--border);border-radius:12px;
  padding:10px;display:flex;flex-wrap:wrap;gap:7px;align-content:flex-start;margin-bottom:14px;
  background:var(--bg-soft);transition:border-color .15s}
.build-line.filled{border-style:solid;border-color:#60a5fa55}
.bank{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:6px}
.tok-btn{background:var(--surface-2);border:1px solid var(--border);color:var(--text);
  border-radius:10px;padding:8px 13px;font:700 15px Nunito,sans-serif;cursor:pointer;
  transition:transform .1s,background .12s,opacity .15s}
.tok-btn:hover{background:#22304f}
.tok-btn:active{transform:scale(.94)}
.tok-btn.placed{opacity:.32;pointer-events:none}
.tok-chip{background:var(--accent-strong);border:1px solid transparent;color:#fff;
  border-radius:10px;padding:8px 13px;font:700 15px Nunito,sans-serif;cursor:pointer}
.tok-chip:active{transform:scale(.94)}

/* ---- LAYER 2: cloze ---- */
.cloze-sentence{font-size:21px;line-height:1.9;font-weight:600;margin-bottom:14px}
.cloze-word{color:var(--text)}
.cloze-gap{display:inline-block;min-width:90px;border-bottom:2px solid var(--accent);
  margin:0 3px;text-align:center;color:var(--accent);font-weight:800}
.cloze-input{background:var(--bg-soft);border:1.5px solid var(--border);border-radius:12px;
  color:var(--text);font:700 17px Nunito,sans-serif;padding:12px 14px;width:100%;margin-bottom:6px}
.cloze-input:focus{outline:none;border-color:var(--accent)}

/* ---- LAYER 3: full production ---- */
.full-input{background:var(--bg-soft);border:1.5px solid var(--border);border-radius:12px;
  color:var(--text);font:600 17px Nunito,sans-serif;padding:14px;width:100%;min-height:80px;
  resize:vertical;line-height:1.5;margin-bottom:6px}
.full-input:focus{outline:none;border-color:var(--accent)}
.mic-row{display:flex;gap:8px;margin-bottom:6px}
.mic-btn{flex:1;background:linear-gradient(135deg,#ef4444,#b91c1c);color:#fff;border:none;
  border-radius:12px;padding:13px;font:800 15px Nunito,sans-serif;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px}
.mic-btn:active{transform:scale(.98)}
.mic-btn.listening{background:linear-gradient(135deg,#f59e0b,#d97706)}
.mic-btn:disabled{opacity:.4;cursor:default}
.mic-pulse{width:9px;height:9px;border-radius:50%;background:#fff;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.mic-note{font-size:11px;color:var(--muted);text-align:center}

/* ---- action buttons ---- */
.actions{display:flex;gap:8px;margin-top:8px}
.btn{flex:1;border:1px solid var(--border);background:var(--surface-2);color:var(--text);
  border-radius:12px;padding:13px;font:800 15px Nunito,sans-serif;cursor:pointer;
  transition:transform .1s,background .12s,opacity .15s}
.btn:hover{background:#22304f}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.35;cursor:default}
.btn-primary{background:var(--accent-strong);color:#fff;border-color:transparent;flex:2}
.btn-primary:hover{background:#2f6fe0}
.btn-ghost{background:transparent}

/* ---- feedback ---- */
.feedback{margin-top:20px;border-top:1px solid var(--border);padding-top:18px;
  animation:rise .25s ease}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.verdict{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.verdict-emoji{font-size:34px;line-height:1}
.verdict-text{font-size:20px;font-weight:900}
.verdict-ok .verdict-text{color:var(--ok)}
.verdict-close .verdict-text{color:var(--warn)}
.verdict-miss .verdict-text{color:var(--bad)}

/* diff view */
.diff{font-size:20px;line-height:1.7;font-weight:700;margin-bottom:14px;
  background:var(--bg-soft);border:1px solid var(--border);border-radius:12px;padding:14px}
.diff .w-ok{color:var(--ok)}
.diff .w-bad{color:var(--bad);text-decoration:underline wavy var(--bad);text-decoration-thickness:1.5px}
.diff .w-missing{color:var(--bad);opacity:.55;text-decoration:line-through}
.diff .w-extra{color:var(--warn);font-style:italic;opacity:.7}
.answer-reveal{font-size:13px;color:var(--muted);margin-bottom:14px}
.answer-reveal b{color:var(--text);font-weight:800}
.answer-ipa{font-family:'Courier New',monospace;color:var(--muted);font-size:13px;margin-top:2px}

/* mistake / explain boxes shown on error */
.learn-box{background:var(--bg-soft);border:1px solid var(--border);border-radius:12px;
  padding:13px;margin-bottom:12px}
.learn-box.mistake{border-color:#ef444455;background:#ef44440d}
.learn-label{font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;
  color:var(--muted);margin-bottom:6px}
.learn-box.mistake .learn-label{color:var(--bad)}
.learn-text{font-size:14px;line-height:1.6}

/* grade override row */
.grade-row{margin-top:6px}
.grade-q{font-size:12px;color:var(--muted);text-align:center;margin-bottom:8px}
.grade-btns{display:flex;gap:8px}
.gbtn{flex:1;border:none;color:#fff;border-radius:11px;padding:12px;
  font:800 14px Nunito,sans-serif;cursor:pointer}
.gbtn:active{transform:scale(.96)}
.g-hard{background:#ef4444}.g-good{background:#3b82f6}.g-easy{background:#22c55e}
.gbtn.sel{outline:2px solid #fff;outline-offset:2px}

.next-btn{margin-top:14px;width:100%;background:linear-gradient(135deg,#16a34a,#15803d);
  color:#fff;border:none;border-radius:12px;padding:15px;font:800 16px Nunito,sans-serif;cursor:pointer}
.next-btn:active{transform:scale(.98)}

/* ---- audio replay ---- */
.audio-btn{background:var(--surface-2);border:1px solid var(--border);color:var(--accent);
  border-radius:9px;padding:6px 12px;font:700 12px Nunito,sans-serif;cursor:pointer;
  display:inline-flex;align-items:center;gap:6px;margin-top:6px}
.audio-btn:hover{background:var(--accent-strong);color:#fff}

/* ---- states ---- */
.state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;min-height:55vh;color:var(--muted);text-align:center;padding:0 20px}
.state h2{font-family:Fraunces,serif;color:var(--text);font-weight:600;margin:0;font-size:24px}
.state p{margin:0;font-size:15px;line-height:1.6;max-width:380px}
.spinner{width:34px;height:34px;border:3px solid var(--surface-2);border-top-color:var(--accent);
  border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.state .btn{flex:none;padding:13px 26px}

/* ---- picker (level/module selection) ---- */
.picker{display:flex;flex-direction:column;gap:22px;padding-top:8px}
.pick-intro{text-align:center;padding:10px 0 4px}
.pick-intro h1{font-family:Fraunces,serif;font-weight:600;font-size:30px;margin:0;letter-spacing:-.5px;
  background:linear-gradient(120deg,#60a5fa,#a78bfa,#34d399);-webkit-background-clip:text;
  background-clip:text;-webkit-text-fill-color:transparent}
.pick-intro p{color:var(--muted);font-size:14px;margin:8px auto 0;max-width:420px;line-height:1.6}
.due-cta{width:100%;background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;border:none;
  border-radius:14px;padding:16px;font:800 16px Nunito,sans-serif;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px}
.due-cta:active{transform:scale(.98)}
.due-cta:disabled{opacity:.5;cursor:default;background:var(--surface-2);color:var(--muted)}
.lv-group{margin-bottom:4px}
.lv-head{display:flex;align-items:center;gap:10px;margin:0 0 10px;font-size:14px;color:var(--muted)}
.lv-badge{background:var(--accent-strong);color:#fff;border-radius:8px;padding:3px 10px;font-size:13px;font-weight:800}
.mod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.mod-tile{text-align:left;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  cursor:pointer;color:var(--text);padding:14px;display:flex;flex-direction:column;gap:7px;
  transition:transform .12s,border-color .12s,background .12s}
.mod-tile:hover{background:var(--surface-2);border-color:#60a5fa80;transform:translateY(-2px)}
.mod-name{font-size:14px;font-weight:700;line-height:1.3}
.mod-count{font-size:12px;color:var(--muted)}
.mod-prog{display:flex;align-items:center;gap:6px;margin-top:2px}
.mod-prog-bar{flex:1;height:5px;background:var(--surface-2);border-radius:99px;overflow:hidden}
.mod-prog-bar>span{display:block;height:100%;background:linear-gradient(90deg,#60a5fa,#34d399)}
.mod-prog-txt{font-size:10px;color:var(--muted);font-weight:700}

.legend{display:flex;flex-wrap:wrap;gap:10px 16px;justify-content:center;padding:18px 0 6px;margin-top:auto}
.legend-item{font-size:11px;color:var(--muted);display:inline-flex;align-items:center;gap:6px}
.legend-dot{width:10px;height:10px;border-radius:3px;display:inline-block}

@media (max-width:520px){
  .tr-text{font-size:22px}
  .actions{flex-wrap:wrap}
}

/* ---- resume badge (modül tile) ---- */
.resume-badge{display:inline-block;align-self:flex-start;background:#f59e0b22;color:#fbbf24;
  border:1px solid #f59e0b44;border-radius:7px;padding:2px 8px;font-size:10px;font-weight:800;margin-top:2px}
.mod-tile.has-resume{border-color:#f59e0b55}

/* ---- backup link ---- */
.backup-link{display:block;width:100%;margin:6px 0 18px;background:transparent;border:1px solid var(--border);
  color:var(--muted);border-radius:12px;padding:12px;font:700 13px Nunito,sans-serif;cursor:pointer;
  transition:background .12s,color .12s}
.backup-link:hover{background:var(--surface);color:var(--text)}

/* ---- bottom sheet (resume / backup) ---- */
.sheet-overlay{position:fixed;inset:0;z-index:1000;background:#000000a6;
  -webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);
  display:flex;align-items:flex-end;justify-content:center;animation:shFade .15s}
@keyframes shFade{from{opacity:0}to{opacity:1}}
.sheet{background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;
  width:100%;max-width:520px;padding:22px 20px calc(22px + env(safe-area-inset-bottom));
  animation:shUp .2s}
@keyframes shUp{from{transform:translateY(30px)}to{transform:translateY(0)}}
@media (min-width:560px){.sheet-overlay{align-items:center}.sheet{border-radius:20px}}
.sheet-title{font-family:Fraunces,serif;font-weight:600;font-size:21px;margin:0 0 6px}
.sheet-desc{color:var(--muted);font-size:14px;line-height:1.6;margin:0 0 16px}
.sheet-desc b{color:var(--text)}
.sheet-btn{width:100%;margin-bottom:9px}
.sheet-note{font-size:13px;margin:4px 0 10px;min-height:18px}
.sheet-note.ok{color:var(--ok)}
.sheet-note.bad{color:var(--bad)}

/* ---- yedekleme paneli ---- */
.bk-status{display:block;font-size:12px;font-weight:700;margin:0 0 14px;padding:8px 11px;
  border-radius:9px;border:1px solid var(--border)}
.bk-status.ok{color:var(--ok);background:var(--ok-soft);border-color:#34d39944}
.bk-status.warn{color:var(--warn);background:#fbbf2414;border-color:#fbbf2444}
.bk-block{border-top:1px solid var(--border);padding-top:14px;margin-top:6px}
.bk-block-title{font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;
  color:var(--accent);margin-bottom:9px}
.bk-file-label{display:block;text-align:center;cursor:pointer}
.bk-hint{font-size:12px;color:var(--muted);line-height:1.5;margin-top:2px}
.bk-hint b{color:var(--text)}
.bk-preview{background:var(--bg-soft);border:1px solid var(--accent);border-radius:12px;
  padding:14px;margin:6px 0 10px;animation:rise .2s ease}
.bk-preview-head{font-size:14px;font-weight:800;margin-bottom:10px}
.bk-preview-row{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);
  padding:3px 0}
.bk-preview-row b{color:var(--text)}
.bk-preview-actions{display:flex;gap:8px;margin-top:12px}
.bk-preview-actions .btn{flex:1}
</style>
</head>
<body>
<div class="wrap" id="root"></div>
<script>/* ============================================================
   Üretim Çalışması — Sentence Mode
   Bağımsız modül. Ana app.js'e dokunmaz, aynı veriyi ve aynı
   IndexedDB SRS deposunu (sentence-mode/kv, "srs:" anahtarları)
   paylaşır. SM-2 grade fonksiyonu ana uygulamayla birebir aynıdır.
   ============================================================ */
(function(){
"use strict";

/* ---------- veri yolları (repo: data/ altında) ---------- */
const DATA_PATHS = {
  sentences: ["data/sentences.json", "sentences.json", "./data/sentences.json"],
  dictionary: ["data/dictionary.json", "dictionary.json", "./data/dictionary.json"],
};

/* ---------- SRS: IndexedDB (ana uygulamayla paylaşımlı) ---------- */
const DB_NAME = "sentence-mode", STORE = "kv", PREFIX = "srs:";
const DAY = 1440 * 60 * 1000;

let _db = null;
function openDB(){
  if (_db) return Promise.resolve(_db);
  return new Promise((res, rej) => {
    if (!("indexedDB" in window)) return rej("no-idb");
    const r = indexedDB.open(DB_NAME, 1);
    r.onupgradeneeded = () => {
      const db = r.result;
      if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE);
    };
    r.onsuccess = () => { _db = r.result; res(_db); };
    r.onerror = () => rej(r.error);
  });
}
async function srsGet(id){
  const key = PREFIX + id;
  try{
    const db = await openDB();
    return await new Promise((res, rej) => {
      const rq = db.transaction(STORE,"readonly").objectStore(STORE).get(key);
      rq.onsuccess = () => res(rq.result || null);
      rq.onerror = () => rej(rq.error);
    });
  }catch{
    try{ return JSON.parse(localStorage.getItem(key) || "null"); }catch{ return null; }
  }
}
async function srsSet(id, val){
  const key = PREFIX + id;
  try{
    const db = await openDB();
    await new Promise((res, rej) => {
      const rq = db.transaction(STORE,"readwrite").objectStore(STORE).put(val, key);
      rq.onsuccess = () => res();
      rq.onerror = () => rej(rq.error);
    });
  }catch{
    try{ localStorage.setItem(key, JSON.stringify(val)); }catch{}
  }
}
async function srsAll(){
  try{
    const db = await openDB();
    return await new Promise((res, rej) => {
      const store = db.transaction(STORE,"readonly").objectStore(STORE);
      const out = {};
      const rq = store.openCursor();
      rq.onsuccess = () => {
        const c = rq.result;
        if (c){
          if (typeof c.key === "string" && c.key.startsWith(PREFIX))
            out[c.key.slice(PREFIX.length)] = c.value;
          c.continue();
        } else res(out);
      };
      rq.onerror = () => rej(rq.error);
    });
  }catch{
    const out = {};
    for (let i=0;i<localStorage.length;i++){
      const k = localStorage.key(i);
      if (k && k.startsWith(PREFIX)){
        try{ out[k.slice(PREFIX.length)] = JSON.parse(localStorage.getItem(k)); }catch{}
      }
    }
    return out;
  }
}

/* default SRS kaydı — ana uygulamayla aynı şekil */
function srsDefault(){ return { rep:0, ef:2.5, interval:0, due:0, last:0 }; }

/* ---------- modül pozisyon kaydı (sadece bu sayfaya ait, localStorage) ---------- */
const POS_PREFIX = "pmode:pos:";   // SRS verisine karışmaz, ayrı isim alanı
function savePos(mod, idx, total){
  try{
    if (idx <= 0 || idx >= total) localStorage.removeItem(POS_PREFIX + mod);
    else localStorage.setItem(POS_PREFIX + mod, JSON.stringify({ idx, total, at: Date.now() }));
  }catch{}
}
function loadPos(mod){
  try{ return JSON.parse(localStorage.getItem(POS_PREFIX + mod) || "null"); }catch{ return null; }
}
function clearPos(mod){
  try{ localStorage.removeItem(POS_PREFIX + mod); }catch{}
}

/* SM-2 grade — ana app.js'teki E() fonksiyonunun BİREBİR kopyası */
function srsGrade(prev, grade){
  const n = Object.assign(srsDefault(), prev || {});
  const r = Date.now();
  if (grade === "hard"){
    n.rep = 0; n.interval = 0; n.ef = Math.max(1.3, n.ef - 0.2);
  } else {
    const q = grade === "easy" ? 5 : 4;
    n.ef = Math.max(1.3, n.ef + (0.1 - (5 - q) * (0.08 + (5 - q) * 0.02)));
    n.rep += 1;
    if (n.rep === 1)      n.interval = grade === "easy" ? 3 : 1;
    else if (n.rep === 2) n.interval = grade === "easy" ? 7 : 4;
    else                  n.interval = Math.round(n.interval * n.ef * (grade === "easy" ? 1.3 : 1));
  }
  n.last = r;
  n.due  = r + n.interval * DAY;
  return n;
}
async function applyGrade(id, grade){
  const next = srsGrade(await srsGet(id), grade);
  await srsSet(id, next);
  return next;
}

/* ---------- metin yardımcıları ---------- */
// kasıllaşmalar: "I'm" ile "I am" eşit sayılmalı. Token dizisini açılmış forma indirger.
const CONTRACTIONS = {
  "i'm":["i","am"], "you're":["you","are"], "we're":["we","are"], "they're":["they","are"],
  "he's":["he","is"], "she's":["she","is"], "it's":["it","is"], "that's":["that","is"],
  "there's":["there","is"], "here's":["here","is"], "what's":["what","is"], "who's":["who","is"],
  "i've":["i","have"], "you've":["you","have"], "we've":["we","have"], "they've":["they","have"],
  "i'll":["i","will"], "you'll":["you","will"], "we'll":["we","will"], "they'll":["they","will"],
  "he'll":["he","will"], "she'll":["she","will"], "it'll":["it","will"],
  "i'd":["i","would"], "you'd":["you","would"], "we'd":["we","would"], "they'd":["they","would"],
  "isn't":["is","not"], "aren't":["are","not"], "wasn't":["was","not"], "weren't":["were","not"],
  "don't":["do","not"], "doesn't":["does","not"], "didn't":["did","not"],
  "haven't":["have","not"], "hasn't":["has","not"], "hadn't":["had","not"],
  "won't":["will","not"], "wouldn't":["would","not"], "can't":["can","not"], "cannot":["can","not"],
  "couldn't":["could","not"], "shouldn't":["should","not"], "mustn't":["must","not"],
  "let's":["let","us"],
};
// "I'm a teacher." -> ["I'm","a","teacher"]
function tokenize(s){
  return (s.match(/[A-Za-z']+(?:-[A-Za-z']+)*|\d+/g) || []);
}
function norm(w){
  return w.toLowerCase()
    .replace(/[\u2019\u2018]/g, "'")          // akıllı tırnak -> düz
    .replace(/[.,!?;:"()]/g, "")
    .trim();
}
// normalize edilmiş token dizisi; kasıllaşmaları açar (karşılaştırma için)
function normSeq(text){
  const out = [];
  for (const raw of tokenize(text)){
    const n = norm(raw);
    if (CONTRACTIONS[n]) out.push(...CONTRACTIONS[n].map(x => ({n:x, raw})));
    else out.push({n, raw});
  }
  return out;
}
// iki cümleyi kelime kelime karşılaştır (LCS tabanlı diff, kasıllaşma-duyarlı)
function diffWords(answer, target){
  const a = normSeq(answer);
  const b = normSeq(target);
  // LCS matrisi
  const m = a.length, k = b.length;
  const dp = Array.from({length:m+1}, () => new Int32Array(k+1));
  for (let i=m-1;i>=0;i--)
    for (let j=k-1;j>=0;j--)
      dp[i][j] = a[i].n === b[j].n ? dp[i+1][j+1]+1 : Math.max(dp[i+1][j], dp[i][j+1]);
  // geri izleme -> hizalanmış diff
  const out = []; let i=0,j=0;
  while (i<m && j<k){
    if (a[i].n === b[j].n){ out.push({type:"ok", word:b[j].raw}); i++; j++; }
    else if (dp[i+1][j] >= dp[i][j+1]){ out.push({type:"extra", word:a[i].raw}); i++; }
    else { out.push({type:"missing", word:b[j].raw}); j++; }
  }
  while (i<m){ out.push({type:"extra", word:a[i++].raw}); }
  while (j<k){ out.push({type:"missing", word:b[j++].raw}); }
  // aynı raw'ın açılmış parçaları yan yana tekrar etmesin (görsel temizlik)
  const seen = [], dedup = [];
  for (const p of out){
    const last = dedup[dedup.length-1];
    if (last && last.type === p.type && last.word === p.word && p.word.includes("'")) continue;
    dedup.push(p);
  }
  const correct = out.filter(o=>o.type==="ok").length;
  const total = k;
  return { parts: dedup, correct, total, ratio: total ? correct/total : 0 };
}

/* doğruluk -> otomatik not.  tam=easy, küçük hata=good, kötü=hard */
function autoGrade(ratio, hadExtra){
  if (ratio >= 0.999 && !hadExtra) return "easy";
  if (ratio >= 0.999 && hadExtra)  return "good";   // doğru ama fazladan kelime
  if (ratio >= 0.75)               return "good";
  return "hard";
}

/* ---------- cloze: gizlenecek kelime(leri) akıllı seç ---------- */
const FUNCTION_WORDS = new Set(("am is are was were be been being have has had do does did " +
  "will would can could shall should may might must to of in on at for from by with " +
  "about into over under than as not no a an the").split(" "));
function pickClozeIndices(target, tags){
  const toks = tokenize(target);
  if (toks.length <= 2) return [Math.max(0, toks.length-1)];
  const tagStr = (tags || "").toLowerCase();
  const score = toks.map((w,i) => {
    const n = norm(w);
    let s = 0;
    if (FUNCTION_WORDS.has(n)) s += 3;                  // gramer çekirdeği
    if (tagStr.includes("be") && /^(am|is|are|was|were|been)$/.test(n)) s += 4;
    if (tagStr.includes("preposition") && /^(in|on|at|for|to|of|with|from|by|about)$/.test(n)) s += 4;
    if (tagStr.includes("present-perfect") && /^(have|has|had)$/.test(n)) s += 4;
    if (tagStr.includes("modal") && /^(can|could|may|might|must|should|would|will)$/.test(n)) s += 4;
    if (tagStr.includes("passive") && /^(been|by)$/.test(n)) s += 3;
    if (i>0 && i<toks.length-1) s += 1;                 // ortadakileri biraz tercih et
    return s;
  });
  // en yüksek skorlu 1 (uzun cümlede 2) kelimeyi seç
  const order = toks.map((_,i)=>i).sort((x,y)=>score[y]-score[x]);
  const k = toks.length >= 9 ? 2 : 1;
  return order.slice(0, k).sort((a,b)=>a-b);
}

/* ---------- katman kararı: SRS rep'e göre ---------- */
// 0 -> sıralama, 1-2 -> cloze, 3+ -> tam üretim
function chooseLayer(srs){
  const rep = (srs && srs.rep) || 0;
  if (rep <= 0) return "order";
  if (rep <= 2) return "cloze";
  return "full";
}
const LAYER_LABEL = { order:"Kelimeleri sırala", cloze:"Boşluğu doldur", full:"Cümleyi kur" };

/* ---------- TTS / STT ---------- */
function speak(text){
  try{
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "en-US"; u.rate = 0.95;
    speechSynthesis.cancel(); speechSynthesis.speak(u);
  }catch{}
}
const STT = window.SpeechRecognition || window.webkitSpeechRecognition;

/* ---------- shuffle ---------- */
function shuffle(arr){
  const a = arr.slice();
  for (let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function esc(s){ return String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

   ============================================================ */
async function fetchFirst(paths){
  for (const p of paths){
    try{ const r = await fetch(p); if (r.ok) return await r.json(); }catch{}
  }
  throw new Error("Veri dosyaları bulunamadı: " + paths[0]);
}
async function loadData(){
  const sentences = await fetchFirst(DATA_PATHS.sentences);
  State.sentences = sentences;
  // indeksle
  const byModule = new Map(), byLevel = new Map();
  for (const s of sentences){
    if (!byModule.has(s.module)) byModule.set(s.module, []);
    byModule.get(s.module).push(s);
  }
  for (const [mod, arr] of byModule){
    arr.sort((a,b)=>(a.order||0)-(b.order||0));
    const lv = arr[0].level;
    if (!byLevel.has(lv)) byLevel.set(lv, []);
    byLevel.get(lv).push(mod);
  }
  State.byModule = byModule;
  State.byLevel = byLevel;
  State.srs = await srsAll();
}

const LAST_BACKUP_KEY = "pmode:lastBackup";
function getLastBackup(){
  try{ return JSON.parse(localStorage.getItem(LAST_BACKUP_KEY) || "null"); }catch{ return null; }
}
function setLastBackup(info){
  try{ localStorage.setItem(LAST_BACKUP_KEY, JSON.stringify(info)); }catch{}
}
function fmtDate(iso){
  try{
    const d = new Date(iso);
    return d.toLocaleDateString("tr-TR", { day:"numeric", month:"long", year:"numeric" }) +
      " " + d.toLocaleTimeString("tr-TR", { hour:"2-digit", minute:"2-digit" });
  }catch{ return iso; }
}
function daysSince(iso){
  if (!iso) return Infinity;
  return Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
}

          <input type="file" id="bkFile" accept="application/json,.json" hidden />
        </label>
        <div class="bk-hint">Drive’dan indirdiğin <b>.json</b> dosyasını seç. İlerlemen birleştirilir; daha yeni olan kayıt korunur.</div>

  // --- indir ---

      srs: all,

    const a = document.createElement("a");
    a.href = url;
    a.download = `sentence-mode-ilerleme-${at.slice(0,10)}.json`;

    setTimeout(() => URL.revokeObjectURL(url), 1000);
    setLastBackup({ at, count });
    msg.textContent = "✓ Yedek indirildi. Şimdi Drive’a yükleyebilirsin.";

  };

  // --- dosya seç → önce ÖNİZLE, sonra onayla ---
  sheet.querySelector("#bkFile").onchange = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();

      try{
        data = JSON.parse(reader.result);
        if (!data || typeof data.srs !== "object" || !data.srs) throw new Error("biçim");
      }catch{
        preview.hidden = true;
        msg.textContent = "Bu dosya okunamadı. Uygulamadan indirdiğin .json yedeğini seçtiğinden emin ol.";
        msg.className = "sheet-note bad";
        return;
      }
      const incomingCount = Object.keys(data.srs).length;
      const when = data.exportedAt ? fmtDate(data.exportedAt) : "tarih bilinmiyor";
      msg.textContent = "";

      preview.innerHTML = `

        preview.hidden = true; e.target.value = "";

      preview.querySelector("#bkConfirmRestore").onclick = async () => {
        let written = 0, skipped = 0;
        for (const id of Object.keys(data.srs)){

          if (!incoming || typeof incoming.rep !== "number") { skipped++; continue; }
          const existing = State.srs[id];
          if (!existing || (incoming.last||0) >= (existing.last||0)){
            await srsSet(id, incoming);
            State.srs[id] = incoming;
            written++;
          } else skipped++;
        }
        preview.hidden = true;
        msg.textContent = `✓ Geri yüklendi: ${written} kayıt güncellendi${skipped ? `, ${skipped} kayıt zaten güncel/atlandı` : ""}.`;
        msg.className = "sheet-note ok";
        setTimeout(() => { close(); renderPicker(); }, 1100);
      };
    };
    reader.readAsText(file);
  };
}

/* ============================================================
   OTURUM BAŞLATMA
   ============================================================ */
function startModuleSession(mod, resumeIdx){
  const arr = (State.byModule.get(mod) || []).slice();
  const now = Date.now();
  // Öncelik: (1) vadesi gelmiş tekrarlar [en geciken önce], (2) hiç çalışılmamış yeni
  // cümleler [modül sırasıyla], (3) ileride vadesi gelecek olgunlar [en yakın önce].
  function bucket(s){
    const r = State.srs[s.id];
    if (!r || (r.rep||0) === 0) return 1;                 // yeni
    if ((r.due||0) <= now) return 0;                      // vadesi gelmiş tekrar
    return 2;                                             // beklemede
  }
  arr.sort((a,b) => {
    const ba = bucket(a), bb = bucket(b);
    if (ba !== bb) return ba - bb;
    if (ba === 0) return (State.srs[a.id].due||0) - (State.srs[b.id].due||0); // en geciken
    if (ba === 1) return (a.order||0) - (b.order||0);                          // modül sırası
    return (State.srs[a.id].due||0) - (State.srs[b.id].due||0);                // en yakın vade
  });
  State.queue = arr;
  // kaldığın yerden devam: kuyruk yeniden kurulduğu için idx'i sınırla
  State.idx = resumeIdx ? Math.min(Math.max(0, resumeIdx), arr.length - 1) : 0;
  State.activeModule = mod;            // pozisyon kaydı için
  State.sessionTitle = mod.replace(/^[A-C]\d-M\d+\s*/, "");
  renderCard();
}
function startDueSession(){
  const now = Date.now();
  const due = State.sentences
    .filter(s => { const r = State.srs[s.id]; return r && (r.due||0) <= now && r.rep > 0; })
    .sort((a,b) => (State.srs[a.id].due||0) - (State.srs[b.id].due||0));
  // interleaving: farklı modüllerden karışsın
  State.queue = due;
  State.idx = 0;
  State.activeModule = null;           // due oturumu pozisyon kaydı tutmaz
  State.sessionTitle = "Tekrar oturumu";
  renderCard();
}

/* ============================================================
   EKRAN: kart (katmana göre)
   ============================================================ */
function currentSentence(){ return State.queue[State.idx]; }

function renderCard(){
  if (State.idx >= State.queue.length) return renderSessionDone();
  const s = currentSentence();
  const srs = State.srs[s.id] || srsDefault();
  const layer = chooseLayer(srs);
  State.answered = false;
  State.layer = layer;

  const pct = Math.round(State.idx / State.queue.length * 100);
  const name = (s.module || "").replace(/^[A-C]\d-M\d+\s*/, "");

  root.innerHTML = `
  <div class="top">
    <button class="back" id="backBtn" title="Geri">←</button>
    <div class="top-title">
      <h1>${esc(State.sessionTitle)}</h1>
      <p>${esc(name)} · ${esc(s.topic || "")}</p>
    </div>
    <div class="queue-pill"><b>${State.idx+1}</b>/${State.queue.length}</div>
  </div>
  <div class="prog"><span style="width:${pct}%"></span></div>
  <div class="stage">
    <div class="card">
      <div class="meta">
        <span class="chip chip-lv">${esc(s.level)}</span>
        <span class="chip chip-mode">${LAYER_LABEL[layer]}</span>
        ${s.tense ? `<span class="chip">${esc(s.tense)}</span>` : ""}
      </div>
      <div class="tr-prompt">Türkçesi</div>
      <div class="tr-text">${esc(s.tr)}</div>
      <button class="audio-btn" id="hintAudio" style="display:none">🔊 Dinle</button>
      <div class="pron-hint" id="pronHint">${esc(s.trPron || "")}</div>

}

/* ---- LAYER 1: kelime sıralama ---- */
function renderOrderLayer(s){
  const target = s.en;
  const toks = tokenize(target);
  const bank = shuffle(toks.map((w,i) => ({w, i})));
  const placed = []; // {w, i}

  const area = document.getElementById("answerArea");
  area.innerHTML = `
    <div class="layer-label"><span class="dot"></span>Kelimeleri doğru sıraya diz</div>
    <div class="build-line" id="buildLine"></div>
    <div class="bank" id="bank"></div>
    <div class="actions">
      <button class="btn btn-ghost" id="clearBtn">Temizle</button>
      <button class="btn btn-primary" id="checkBtn" disabled>Kontrol et</button>
    </div>`;

  const bankEl = document.getElementById("bank");
  const lineEl = document.getElementById("buildLine");
  const checkBtn = document.getElementById("checkBtn");

  function draw(){
    bankEl.innerHTML = bank.map((t,bi) => {
      const used = placed.some(p => p.bi === bi);
      return `<button class="tok-btn ${used?"placed":""}" data-bi="${bi}">${esc(t.w)}</button>`;
    }).join("");
    lineEl.innerHTML = placed.map((p,pi) =>
      `<button class="tok-chip" data-pi="${pi}">${esc(bank[p.bi].w)}</button>`).join("");
    lineEl.classList.toggle("filled", placed.length>0);
    checkBtn.disabled = placed.length !== toks.length;
    bankEl.querySelectorAll(".tok-btn").forEach(b => b.onclick = () => {
      const bi = +b.dataset.bi;
      if (placed.some(p=>p.bi===bi)) return;
      placed.push({bi}); draw();
    });
    lineEl.querySelectorAll(".tok-chip").forEach(c => c.onclick = () => {
      placed.splice(+c.dataset.pi, 1); draw();
    });
  }
  draw();

  document.getElementById("clearBtn").onclick = () => { placed.length = 0; draw(); };
  checkBtn.onclick = () => {
    const answer = placed.map(p => bank[p.bi].w).join(" ");
    evaluate(s, answer, "order");
  };
}

/* ---- LAYER 2: cloze ---- */
function renderClozeLayer(s){
  const target = s.en;
  const toks = tokenize(target);
  const gapIdx = new Set(pickClozeIndices(target, s.grammarTags));
  // cümleyi parçalara böl: gizli olanlar input olur
  let html = `<div class="layer-label"><span class="dot"></span>Eksik kelimeyi yaz</div><div class="cloze-sentence">`;
  let inputN = 0;
  // token'ları orijinal metindeki sırayla yeniden kur (basit join, noktalama kabası)
  toks.forEach((w,i) => {
    if (gapIdx.has(i)){
      html += `<input class="cloze-input-inline" data-gi="${i}" autocomplete="off" autocapitalize="off" spellcheck="false" style="display:inline-block;width:${Math.max(70, w.length*16)}px;min-width:70px;background:var(--bg-soft);border:none;border-bottom:2px solid var(--accent);color:var(--accent);font:800 19px Nunito,sans-serif;text-align:center;margin:0 3px;padding:2px 4px" /> `;
      inputN++;
    } else {
      html += `<span class="cloze-word">${esc(w)}</span> `;
    }
  });
  html += `</div>
    <div class="actions">
      <button class="btn btn-ghost" id="hearBtn">🔊 Dinle</button>
      <button class="btn btn-primary" id="checkBtn">Kontrol et</button>
    </div>`;
  const area = document.getElementById("answerArea");
  area.innerHTML = html;

  const inputs = [...area.querySelectorAll(".cloze-input-inline")];
  if (inputs[0]) inputs[0].focus();
  inputs.forEach((inp, k) => {
    inp.onkeydown = e => {
      if (e.key === "Enter"){
        if (k < inputs.length-1) inputs[k+1].focus();
        else document.getElementById("checkBtn").click();
      }
    };
  });
  document.getElementById("hearBtn").onclick = () => speak(s.en);
  document.getElementById("checkBtn").onclick = () => {
    // cevabı tam cümle olarak yeniden kur (gizli yerlere kullanıcının yazdığını koy)
    const answerToks = toks.map((w,i) => {
      if (gapIdx.has(i)){
        const inp = inputs.find(x => +x.dataset.gi === i);
        return (inp && inp.value.trim()) || "___";
      }
      return w;
    });
    evaluate(s, answerToks.join(" "), "cloze");
  };
}

/* ---- LAYER 3: tam üretim (yazma + konuşma) ---- */
function renderFullLayer(s){
  const sttOK = !!STT;
  const area = document.getElementById("answerArea");
  area.innerHTML = `
    <div class="layer-label"><span class="dot"></span>İngilizce cümlenin tamamını kur</div>
    <textarea class="full-input" id="fullInput" placeholder="İngilizce cümleyi yaz ya da mikrofonla söyle…" autocomplete="off" autocapitalize="sentences" spellcheck="false"></textarea>
    <div class="mic-row">
      ${sttOK ? `<button class="mic-btn" id="micBtn">🎙️ Söyle</button>` : ""}
    </div>
    ${sttOK ? `<div class="mic-note">Mikrofonla söyleyebilir ya da yazabilirsin</div>` : ""}
    <div class="actions">
      <button class="btn btn-ghost" id="hearBtn">🔊 İpucu sesi</button>
      <button class="btn btn-primary" id="checkBtn">Kontrol et</button>
    </div>`;

  const input = document.getElementById("fullInput");
  input.focus();
  input.onkeydown = e => {
    if (e.key === "Enter" && (e.metaKey || e.ctrlKey)){ document.getElementById("checkBtn").click(); }
  };
  document.getElementById("hearBtn").onclick = () => speak(s.en);
  document.getElementById("checkBtn").onclick = () => {
    const answer = input.value.trim();
    if (!answer) { input.focus(); return; }
    evaluate(s, answer, "full");
  };

  if (sttOK){
    const micBtn = document.getElementById("micBtn");
    let rec = null, listening = false;
    micBtn.onclick = () => {
      if (listening){ rec && rec.stop(); return; }
      rec = new STT();
      rec.lang = "en-US"; rec.interimResults = false; rec.maxAlternatives = 1;
      rec.onstart = () => { listening = true; micBtn.classList.add("listening"); micBtn.innerHTML = `<span class="mic-pulse"></span> Dinleniyor…`; };
      rec.onresult = e => { input.value = e.results[0][0].transcript; };
      rec.onerror = () => {};
      rec.onend = () => { listening = false; micBtn.classList.remove("listening"); micBtn.innerHTML = "🎙️ Söyle"; };
      try{ rec.start(); }catch{}
    };
  }
}

/* ============================================================
   DEĞERLENDİRME + GERİ BİLDİRİM
   ============================================================ */
async function evaluate(s, answer, layer){
  if (State.answered) return;
  State.answered = true;
  // grade-override doğru hesaplansın diye notlamadan ÖNCEKİ durumu sakla
  State._gradeBase = State._gradeBase || {};
  State._gradeBase[s.id] = await srsGet(s.id);   // null olabilir (ilk kez)
  const d = diffWords(answer, s.en);
  const hadExtra = d.parts.some(p => p.type === "extra");
  const grade = autoGrade(d.ratio, hadExtra);
  const next = srsGrade(State._gradeBase[s.id], grade);
  await srsSet(s.id, next);
  State.srs[s.id] = next;   // yereli güncelle
  renderFeedback(s, d, grade, layer);
}

function verdictMeta(grade){
  if (grade === "easy") return { cls:"verdict-ok", emoji:"🎯", text:"Tam isabet!" };
  if (grade === "good") return { cls:"verdict-close", emoji:"👍", text:"Neredeyse!" };
  return { cls:"verdict-miss", emoji:"📌", text:"Birlikte bakalım" };
}

function renderFeedback(s, d, grade, layer){
  const v = verdictMeta(grade);
  const diffHtml = d.parts.map(p => {
    if (p.type === "ok")      return `<span class="w-ok">${esc(p.word)}</span>`;
    if (p.type === "extra")   return `<span class="w-extra">${esc(p.word)}</span>`;
    if (p.type === "missing") return `<span class="w-missing">${esc(p.word)}</span>`;
    return esc(p.word);
  }).join(" ");

  const showLearn = grade === "hard" || grade === "good";
  let learnHtml = "";
  if (showLearn && s.commonMistake){
    learnHtml += `<div class="learn-box mistake">
      <div class="learn-label">Sık yapılan hata</div>
      <div class="learn-text">${esc(s.commonMistake)}</div></div>`;
  }
  if (showLearn && s.aiExplain){
    learnHtml += `<div class="learn-box">
      <div class="learn-label">Neden böyle?</div>
      <div class="learn-text">${esc(s.aiExplain)}</div></div>`;
  }

  const fb = document.getElementById("feedbackArea");
  fb.innerHTML = `
    <div class="feedback">
      <div class="verdict ${v.cls}">
        <span class="verdict-emoji">${v.emoji}</span>
        <span class="verdict-text">${v.text}</span>
      </div>
      <div class="diff">${diffHtml}</div>
      <div class="answer-reveal">
        Doğrusu: <b>${esc(s.en)}</b>
        ${s.ipa ? `<div class="answer-ipa">${esc(s.ipa)}</div>` : ""}
      </div>
      <button class="audio-btn" id="fbAudio">🔊 Doğru telaffuzu dinle</button>
      ${learnHtml}
      <div class="grade-row">
        <div class="grade-q">Sistem bunu <b>${gradeTR(grade)}</b> olarak kaydetti — istersen değiştir:</div>
        <div class="grade-btns">
          <button class="gbtn g-hard ${grade==="hard"?"sel":""}" data-g="hard">Zor</button>
          <button class="gbtn g-good ${grade==="good"?"sel":""}" data-g="good">Normal</button>
          <button class="gbtn g-easy ${grade==="easy"?"sel":""}" data-g="easy">Kolay</button>
        </div>
      </div>
      <button class="next-btn" id="nextBtn">Sıradaki →</button>
    </div>`;

  document.getElementById("fbAudio").onclick = () => speak(s.en);
  // otomatik telaffuz (özellikle tam üretim katmanında pekiştirir)
  if (layer !== "order") setTimeout(() => speak(s.en), 250);

  fb.querySelectorAll(".gbtn").forEach(b => b.onclick = async () => {
    const g = b.dataset.g;
    // önceki kaydı geri al: en güvenlisi, bir önceki srs durumundan yeniden hesapla
    // (basit yaklaşım: mevcut kaydı baz almadan, kullanıcı seçimini uygula)
    const prevBase = State._gradeBase && State._gradeBase[s.id];
    const base = prevBase !== undefined ? prevBase : null;
    const next = srsGrade(base, g);
    await srsSet(s.id, next);
    State.srs[s.id] = next;
    fb.querySelectorAll(".gbtn").forEach(x => x.classList.remove("sel"));
    b.classList.add("sel");
    fb.querySelector(".grade-q").innerHTML = `Güncellendi: <b>${gradeTR(g)}</b>`;
  });

  document.getElementById("nextBtn").onclick = () => {
    State.idx++;
    // modül oturumundaysa pozisyonu kaydet (due oturumu kaydetmez)
    if (State.activeModule) savePos(State.activeModule, State.idx, State.queue.length);
    renderCard();
  };
}
function gradeTR(g){ return g==="hard"?"Zor":g==="easy"?"Kolay":"Normal"; }

/* ============================================================
   EKRAN: oturum bitti
   ============================================================ */
function renderSessionDone(){
  // oturum tamamlandı: bu modülün "devam et" pozisyonunu sil
  if (State.activeModule) clearPos(State.activeModule);
  root.innerHTML = `
  <div class="state">
    <div style="font-size:48px">✅</div>
    <h2>Oturum tamam</h2>
    <p>${State.queue.length} cümleyi çalıştın. İlerlemen kaydedildi — tekrar zamanı geldiğinde bu cümleler yeniden karşına çıkacak.</p>
    <button class="btn btn-primary" id="homeBtn">Ana sayfaya dön</button>
  </div>`;
  document.getElementById("homeBtn").onclick = () => renderPicker();
}

/* ============================================================
   BAŞLAT
   ============================================================ */
async function boot(){
  renderLoading();
  try{
    await loadData();
    renderPicker();
  }catch(e){
    renderError(e.message || String(e));
  }
}
boot();

})();
