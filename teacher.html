<head>

<title>Öğretmen · Sentence Mode</title>
<style>
:root{
  --bg:#0b1120; --bg-soft:#0f172a; --surface:#131c30; --surface-2:#1a2540;
  --border:#ffffff14; --text:#e8eef7; --muted:#93a4bd;
  --accent:#60a5fa; --accent-strong:#3b82f6; --teacher:#34d399;
  --green-strong:#16a34a; --ok:#34d399; --bad:#f87171; --radius:16px;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{
  background:radial-gradient(1200px 600px at 50% -10%, #14302a 0%, transparent 60%), var(--bg);
  color:var(--text);-webkit-font-smoothing:antialiased;
  font-family:Nunito,system-ui,-apple-system,sans-serif;
}
.wrap{max-width:680px;margin:0 auto;min-height:100%;display:flex;flex-direction:column}

.top{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg-soft);z-index:10}
.back{background:var(--surface);border:1px solid var(--border);color:var(--text);width:38px;height:38px;border-radius:10px;cursor:pointer;font-size:17px;flex-shrink:0;text-decoration:none;display:flex;align-items:center;justify-content:center}
.back:hover{background:var(--surface-2)}
.ava{
  width:44px;height:44px;border-radius:12px;background:#071226;
  border:1px solid #34d39999;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:0 8px 22px #0006
}
.ava img{width:100%;height:100%;object-fit:cover;display:block}
.teacher-hero{display:flex;align-items:center;justify-content:center;padding:18px 0 14px}
.teacher-photo{
  width:min(58vw,230px);height:min(58vw,230px);max-width:230px;max-height:230px;
  border-radius:22px;border:2px solid #34d399aa;background:#050b16;object-fit:contain;
  box-shadow:0 18px 45px #0008
}
@media(max-width:520px){
  .teacher-hero{padding:14px 0 10px}
  .teacher-photo{width:170px;height:170px;border-radius:18px}
}
.tinfo{flex:1;min-width:0}
.tinfo h1{margin:0;font-family:Fraunces,serif;font-weight:600;font-size:17px}
.tinfo p{margin:1px 0 0;font-size:12px;color:var(--muted)}
.prompt-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);border-radius:9px;padding:7px 11px;font:800 12px Nunito,sans-serif;cursor:pointer;flex-shrink:0}
.prompt-btn:hover{background:var(--surface-2);color:var(--text)}

.body{flex:1;overflow-y:auto;padding:16px}

/* incelenen cümle kutusu */
.subject{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:16px}
.subject-en{font-size:20px;font-weight:700;line-height:1.4;margin-bottom:6px}
.subject-tr{font-size:14px;color:var(--muted)}
.subject-play{margin-top:10px;background:var(--surface-2);border:1px solid var(--border);color:var(--accent);border-radius:9px;padding:7px 13px;font:700 12px Nunito,sans-serif;cursor:pointer}

/* açıklama */
.explain{background:var(--bg-soft);border:1px solid var(--border);border-radius:14px;padding:16px;font-size:15px;line-height:1.7;white-space:pre-wrap;word-wrap:break-word}
.explain .en{color:var(--green-strong);font-weight:800}
.explain strong{color:var(--text);font-weight:900}

.explain-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.explain-play{background:var(--surface-2);border:1px solid var(--border);color:var(--accent);border-radius:9px;padding:8px 13px;font:800 12px Nunito,sans-serif;cursor:pointer}

/* takip sorusu */
.followup{margin-top:14px;display:flex;gap:8px}
.followup input{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:11px;padding:11px 13px;font:600 14px Nunito,sans-serif}

.followup button{background:var(--green-strong);color:#fff;border:none;border-radius:11px;padding:0 16px;font:800 14px Nunito,sans-serif;cursor:pointer}
.qa-q{margin-top:14px;font-weight:800;color:var(--accent);font-size:14px}

.loading{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:14px;padding:10px 0}
.spinner{width:22px;height:22px;border:3px solid var(--surface-2);border-top-color:var(--teacher);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.regen{margin-top:14px;width:100%;background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:11px;padding:11px;font:800 14px Nunito,sans-serif;cursor:pointer}
.regen:hover{background:#22304f}

.state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:0 24px;text-align:center;color:var(--muted)}
.state h2{font-family:Fraunces,serif;color:var(--text);font-weight:600;margin:0;font-size:22px}
.state p{margin:0;font-size:14px;line-height:1.6;max-width:380px}
.btn{border:1px solid var(--border);background:var(--surface-2);color:var(--text);border-radius:12px;padding:13px 22px;font:800 15px Nunito,sans-serif;cursor:pointer;text-decoration:none}
.btn-primary{background:var(--green-strong);color:#fff;border-color:transparent}

/* sheet */
.sheet-overlay{position:fixed;inset:0;z-index:1000;background:#000000a6;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center}
.sheet{background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:22px 20px calc(22px + env(safe-area-inset-bottom))}
@media(min-width:560px){.sheet-overlay{align-items:center}.sheet{border-radius:20px}}
.sheet h3{font-family:Fraunces,serif;font-weight:600;font-size:20px;margin:0 0 6px}
.sheet p{color:var(--muted);font-size:13px;line-height:1.6;margin:0 0 12px}
.sheet textarea{width:100%;min-height:240px;background:var(--bg-soft);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:13px;font:500 13px ui-monospace,monospace;line-height:1.6;resize:vertical}
.sheet textarea:focus{outline:none;border-color:var(--teacher)}
.sheet input{width:100%;background:var(--bg-soft);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:12px;font:600 14px monospace;margin-bottom:12px}
.sheet input:focus{outline:none;border-color:var(--accent)}
.sheet .btn{width:100%;margin-bottom:9px;display:block;text-align:center}
.sheet a{color:#93c5fd}
.row2{display:flex;gap:8px}.row2 .btn{flex:1}
.note{font-size:13px;min-height:16px;margin:4px 0 8px}.note.bad{color:var(--bad)}.note.ok{color:var(--ok)}
</style>

<body>
<div class="wrap" id="root"></div>
<script>/* ============================================================
   teacher.html — Türkçe konuşan İngilizce öğretmeni paneli
   Cümleyi URL'den (?s=...&t=...) alır, Groq'a düzenlenebilir
   system prompt ile gönderir, açıklamadaki tırnak-içi İngilizceyi
   koyu yeşil gösterir. Groq anahtarı chat.html ile ortaktır.
   ============================================================ */
(function(){
"use strict";

/* ---------- Groq (chat.html ile ortak) ---------- */
const GROQ_URL = "https://api.groq.com/openai/v1/chat/completions";
const GROQ_MODEL = "llama-3.3-70b-versatile";
const KEYS_LS = "groqApiKeys";
function getKeys(){ try{ return (JSON.parse(localStorage.getItem(KEYS_LS)||"[]")||[]).filter(Boolean); }catch{ return []; } }
function saveKey(k){ const ks=getKeys(); if(!ks.includes(k)) ks.push(k); try{ localStorage.setItem(KEYS_LS, JSON.stringify(ks)); }catch{} }
let _ki=0;
async function groqChat(messages){
  const keys=getKeys();
  if(!keys.length) throw {code:"no-key"};
  let last=null;
  for(let n=0;n<keys.length;n++){
    const key=keys[(_ki+n)%keys.length];
    try{
      const res=await fetch(GROQ_URL,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},body:JSON.stringify({model:GROQ_MODEL,messages,temperature:0.5,max_tokens:1100})});
      if(res.status===401){ last={code:"bad-key"}; continue; }
      if(res.status===429){ last={code:"rate"}; continue; }
      if(!res.ok){ last={code:"http"}; continue; }
      const data=await res.json(); _ki=(_ki+n)%keys.length;
      return data.choices?.[0]?.message?.content?.trim()||"";
    }catch(e){ last={code:"network"}; }
  }
  throw last||{code:"unknown"};
}

/* ---------- varsayılan prompt (kullanıcı düzenleyebilir) ---------- */
const DEFAULT_PROMPT = `Sen Türkçe konuşan, deneyimli ve sabırlı bir İngilizce öğretmenisin. Sana bir İngilizce cümle ve Türkçe çevirisi verilecek. Görevin, bu cümleyi Türk bir öğrenciye derinlemesine öğretmek.

Açıklamanı şu başlıklarla, sade ve anlaşılır Türkçe ile yap:

1. Genel anlam: Cümlenin ne anlattığını ve hangi durumda kullanıldığını 1-2 cümleyle açıkla.
2. Cümle yapısı / gramer / kalıplar: Cümledeki dilbilgisi yapısını adım adım çöz (zaman, kip, cümle dizilişi). Neden böyle kurulduğunu açıkla.
3. Kelime kelime: Önemli kelimeleri tek tek ele al — anlamı, türü (isim/fiil/sıfat), varsa okunuşu ve dikkat edilmesi gereken noktalar.
4. Alternatifler: Aynı anlamı veren başka nasıl söylenebilir? Eş anlamlı kelimeler, alternatif kalıplar ya da daha resmi/günlük versiyonlar ver.
5. Sık yapılan hata: Türk öğrencilerin bu tür cümlede yaptığı yaygın bir hatayı ve doğrusunu belirt.

Kurallar:
- Tamamen Türkçe yaz (örnek İngilizce cümleler hariç).
- İngilizce kelime ve cümleleri çift tırnak içinde ver (örn. "I am happy"). Türkçe açıklamaları tırnaksız yaz.
- Başlıkları koru ama gereksiz uzatma; öğrenci sıkılmasın.
- Örnekleri bol ve günlük hayattan ver.
- Cesaretlendirici ve net bir dil kullan.`;

const PROMPT_LS = "teacherPrompt";
function getPrompt(){ try{ return localStorage.getItem(PROMPT_LS) || DEFAULT_PROMPT; }catch{ return DEFAULT_PROMPT; } }
function setPrompt(p){ try{ localStorage.setItem(PROMPT_LS, p); }catch{} }

/* ---------- TTS ---------- */
/* ---------- fotoğraflı teacher avatar + TTS ---------- */
const TEACHER_FRAMES = {
  idle:"idle.webp", blink:"blink.webp", listen:"listen.webp",
  a:"mouth-a.webp", e:"mouth-e.webp", i:"mouth-i.webp",
  o:"mouth-o.webp", u:"mouth-u.webp", mbp:"mouth-mbp.webp",
  fv:"mouth-fv.webp", l:"mouth-l.webp", th:"mouth-th.webp"
};
function getSelectedTeacher(){
  const p = new URLSearchParams(location.search);
  const fromUrl = (p.get("teacher") || p.get("avatar") || "").trim();
  if (fromUrl === "teacher1" || fromUrl === "teacher2") {
    try { localStorage.setItem("selectedTeacherAvatar", fromUrl); } catch {}
    return fromUrl;
  }
  return localStorage.getItem("selectedTeacherAvatar") || "teacher1";
}
function teacherDir(){
  return "./assets/avatars_v3/" + getSelectedTeacher() + "/";
}
let TeacherAvatar = null;
class PhotoTeacherAvatar{
  constructor(){
    this.imgs=[];
    this.frames={};
    this.blinkTimer=null;
    this.talkTimer=null;
    this.endTimer=null;
    this.seq=[];
    this.idx=0;
    this.speaking=false;
  }
  mount(){
    this.imgs = ["teacherAvaImg","teacherHeroImg"].map(id=>document.getElementById(id)).filter(Boolean);
    const dir=teacherDir();
    for(const [k,v] of Object.entries(TEACHER_FRAMES)) this.frames[k]=dir+v;
    this.preload();
    this.show(this.frames.idle);
    this.scheduleBlink(1200);
  }
  preload(){ Object.values(this.frames).forEach(src=>{ const im=new Image(); im.src=src; }); }
  show(src){ this.imgs.forEach(img=>{ img.src=src; }); }
  scheduleBlink(delay){
    clearTimeout(this.blinkTimer);
    this.blinkTimer=setTimeout(()=>this.blink(), delay || (2400 + Math.random()*2200));
  }
  blink(){
    if(this.speaking){ this.scheduleBlink(1400); return; }
    this.show(this.frames.blink);
    setTimeout(()=>{ if(!this.speaking) this.show(this.frames.idle); this.scheduleBlink(); }, 330);
  }
  frameForChar(ch,next){
    ch=(ch||"").toLowerCase(); next=(next||"").toLowerCase();
    if(ch==="t" && next==="h") return this.frames.th;
    if(/[oö0]/.test(ch)) return this.frames.o;
    if(/[uüwq]/.test(ch)) return this.frames.u;
    if(/[a]/.test(ch)) return this.frames.a;
    if(/[e]/.test(ch)) return this.frames.e;
    if(/[iııy]/.test(ch)) return this.frames.i;
    if(/[mnbp]/.test(ch)) return this.frames.mbp;
    if(/[fv]/.test(ch)) return this.frames.fv;
    if(/[l]/.test(ch)) return this.frames.l;
    if(/[.,!?;:\s]/.test(ch)) return this.frames.idle;
    return this.frames.i;
  }
  buildSeq(text){
    const s=String(text||"");
    const seq=[];
    for(let i=0;i<s.length;i++){
      const ch=s[i], next=s[i+1]||"";
      seq.push(this.frameForChar(ch,next));
      if(ch.toLowerCase()==="t" && next.toLowerCase()==="h") i++;
    }
    return seq.filter(Boolean);
  }
  speakText(text,duration){
    clearInterval(this.talkTimer); clearTimeout(this.endTimer);
    this.speaking=true;
    this.seq=this.buildSeq(text);
    if(!this.seq.length) this.seq=[this.frames.i,this.frames.e,this.frames.a,this.frames.o,this.frames.u,this.frames.mbp,this.frames.idle];
    this.idx=0;
    this.talkTimer=setInterval(()=>{ this.show(this.seq[this.idx % this.seq.length]); this.idx++; },105);
    this.endTimer=setTimeout(()=>this.stop(), Math.max(900,duration||1800));
  }
  stop(){
    clearInterval(this.talkTimer); clearTimeout(this.endTimer);
    this.speaking=false;
    this.show(this.frames.listen);
    setTimeout(()=>{ if(!this.speaking) this.show(this.frames.idle); },260);
    this.scheduleBlink(1200);
  }
}
function mountTeacherAvatar(){
  TeacherAvatar = new PhotoTeacherAvatar();
  TeacherAvatar.mount();
}
function estimateSpeechDuration(text){
  return Math.max(900, Math.min(18000, Array.from(String(text||"")).length * 92));
}
let _voiceCache=[];
function refreshVoices(){ try{ _voiceCache = speechSynthesis.getVoices ? speechSynthesis.getVoices() : []; }catch{ _voiceCache=[]; } }
try{ refreshVoices(); speechSynthesis.onvoiceschanged = refreshVoices; }catch{}
function pickVoiceForLang(lang){
  refreshVoices();
  const voices = _voiceCache || [];
  const wantTr = /^tr/i.test(lang || "");
  if(wantTr){
    return voices.find(v=>/^tr/i.test(v.lang||"")) || voices.find(v=>/turkish|türk|turk/i.test(v.name||"")) || null;
  }
  const en = voices.filter(v=>/^en/i.test(v.lang||""));
  if(!en.length) return null;
  const male = /(male|david|mark|george|daniel|james|john|alex|fred|thomas|guy|brian|ryan|matthew|arthur|oliver)/i;
  const pref = en.filter(v=>/en-US|en_GB|en-GB|en_US/i.test(v.lang||""));
  return pref.find(v=>male.test(v.name||"")) || pref[0] || en[0];
}
function speak(text, lang){
  try{
    text=String(text||"").trim();
    if(!text) return;
    lang = lang || "tr-TR";
    const u=new SpeechSynthesisUtterance(text);
    const voice=pickVoiceForLang(lang);
    if(voice) u.voice=voice;
    u.lang = voice ? voice.lang : lang;
    u.rate = /^tr/i.test(lang) ? 0.92 : 0.95;
    u.pitch = 0.86;
    speechSynthesis.cancel();
    if(TeacherAvatar) TeacherAvatar.speakText(text, estimateSpeechDuration(text));
    u.onend=()=>{ if(TeacherAvatar) TeacherAvatar.stop(); };
    u.onerror=()=>{ if(TeacherAvatar) TeacherAvatar.stop(); };
    speechSynthesis.speak(u);
  }catch{
    if(TeacherAvatar) TeacherAvatar.stop();
  }
}
function speakEnglish(text){ speak(text, "en-US"); }
function speakTurkish(text){ speak(text, "tr-TR"); }

/* ---------- yardımcılar ---------- */
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
// açıklamadaki tırnak-içi İngilizce -> koyu yeşil; **kalın** -> strong
function renderRich(text){
  let html = esc(text);
  // [[....]] -> koyu yeşil (çift köşeli parantez içi İngilizce). Parantezler kaldırılır.
  html = html.replace(/\[\[([\s\S]*?)\]\]/g, '<span class="en">$1</span>');
  // "....." -> yeşil (çift tırnak ya da düz/eğik tırnak)
  html = html.replace(/&quot;([^&]*?)&quot;/g, '<span class="en">$1</span>');
  html = html.replace(/[“”]([^“”]*?)[“”]/g, '<span class="en">$1</span>');
  // **kalın**
  html = html.replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
  return html;
}

const root = document.getElementById("root");
const State = { en:"", tr:"", history:[], explanation:"" };

/* ---------- URL parametreleri ---------- */
function parseParams(){
  const p = new URLSearchParams(location.search);
  State.en = (p.get("s")||"").trim();
  State.tr = (p.get("t")||"").trim();
}

/* ============================================================
   EKRAN
   ============================================================ */
function render(){
  root.innerHTML = `
  <div class="top">
    <a href="./index.html" class="back" id="teacherBack" title="Geri">←</a>
    <div class="ava" title="Fotoğraflı öğretmen"><img id="teacherAvaImg" alt="Öğretmen avatarı"></div>
    <div class="tinfo"><h1>İngilizce Öğretmeni</h1><p>Türkçe anlatımlı İngilizce öğretmeni</p></div>
  </div>
  <div class="body">
    <div class="teacher-hero"><img class="teacher-photo" id="teacherHeroImg" alt="Fotoğraflı öğretmen avatarı"></div>
    <div class="subject">
      <div class="subject-en" id="subEn">${renderRich('"'+esc(State.en)+'"')}</div>
      ${State.tr ? `<div class="subject-tr">${esc(State.tr)}</div>` : ""}
      <button class="subject-play" id="playBtn">🔊 Cümleyi dinle</button>
    </div>
    <div id="out"></div>
  </div>`;
  mountTeacherAvatar();
  // Geri düğmesi davranışı
  var backEl = document.getElementById("teacherBack");
  if (backEl){
    var p2 = new URLSearchParams(location.search);
    var isEmbed = p2.get("embed") === "1";
    if (isEmbed){
      // iframe katmanı içinde: üst pencereye "kapat" sinyali gönder.
      // Çalışma sayfası arkada açık kaldığı için aynı cümleden devam edilir.
      backEl.setAttribute("href", "#");
      backEl.textContent = "←";
      backEl.title = "Çalışmaya dön";
      backEl.onclick = function(ev){
        ev.preventDefault();
        try{ parent.postMessage("dh-teacher-close", "*"); }catch(e){}
      };
    } else {
      // Ayrı sayfa olarak açıldıysa: kayıtlı dönüş sayfasına git (yoksa ana menü)
      var ret = "";
      try{ ret = localStorage.getItem("teacherReturnURL") || ""; }catch(e){}
      if (!ret){ ret = p2.get("return") || ""; }
      if (ret){
        backEl.setAttribute("href", ret);
        backEl.onclick = function(ev){
          ev.preventDefault();
          try{ localStorage.removeItem("teacherReturnURL"); }catch(e){}
          location.href = ret;
        };
      }
    }
  }
  document.getElementById("playBtn").onclick = () => speakEnglish(State.en);
  explain();
}

function setOut(html){ document.getElementById("out").innerHTML = html; }

async function explain(){
  if (!State.en){ setOut(`<div class="state"><h2>Cümle yok</h2><p>Bu panel bir cümleyle açılır. Çalışma ekranındaki 🎓 Öğretmen düğmesini kullan.</p></div>`); return; }
  // storage-bridge (IndexedDB) henüz belleğe yüklenmediyse, hazır olmasını bekle.
  // Böylece anahtarlar IndexedDB'deyken yanlışlıkla "anahtar yok" kutusu açılmaz.
  if (typeof window.__dhStorageReady !== "undefined" && !window.__dhStorageReady && !getKeys().length){
    setOut(`<div class="loading"><div class="spinner"></div> Hazırlanıyor…</div>`);
    await new Promise(function(resolve){
      var done=false;
      function go(){ if(done) return; done=true; resolve(); }
      window.addEventListener("dh-storage-ready", go, {once:true});
      setTimeout(go, 1500); // güvenlik: en fazla 1.5 sn bekle
    });
  }
  if (!getKeys().length){ openKeySheet(); setOut(""); return; }
  setOut(`<div class="loading"><div class="spinner"></div> Öğretmen cümleyi inceliyor…</div>`);
  const userMsg = `İngilizce cümle: "${State.en}"` + (State.tr ? `\nTürkçe çevirisi: ${State.tr}` : "");
  State.history = [{ role:"system", content:"" }, { role:"user", content:userMsg }];
  try{
    const reply = await groqChat(State.history);
    State.history.push({ role:"assistant", content:reply });
    renderExplanation(reply);
  }catch(e){ handleError(e); }
}

function renderExplanation(reply){
  State.explanation = reply || "";
  setOut(`
    <div class="explain">${renderRich(reply)}</div>
    <div class="explain-actions">
      <button class="explain-play" id="explainListenBtn">🔊 Detaylı açıklamayı dinle</button>
      <button class="explain-play" id="sentenceListenBtn">🔊 Cümleyi dinle</button>
    </div>
    <div class="followup">
      <input id="fuInput" type="text" placeholder="Bir sorun mu var? Öğretmene sor…" />
      <button id="fuSend">Sor</button>
    </div>
    <button class="regen" id="regenBtn">↻ Yeniden açıkla</button>`);
  const fu = document.getElementById("fuInput");
  fu.onkeydown = e => { if (e.key==="Enter") askFollowup(fu.value); };
  document.getElementById("fuSend").onclick = () => askFollowup(fu.value);
  document.getElementById("regenBtn").onclick = () => explain();
  document.getElementById("explainListenBtn").onclick = () => {
    // Açıklamada [[...]] içi İngilizce, gerisi Türkçe okunsun (dil ayrımlı).
    if (window.DH_speakMixed) window.DH_speakMixed(State.explanation);
    else if (window.DH_LongTTSAvatarSync && window.DH_LongTTSAvatarSync.speak) window.DH_LongTTSAvatarSync.speak(State.explanation);
    else speakTurkish(State.explanation);
  };
  document.getElementById("sentenceListenBtn").onclick = () => speakEnglish(State.en);
}

async function askFollowup(q){
  q = (q||"").trim();
  if (!q) return;
  const out = document.getElementById("out");
  // mevcut açıklamanın altına soru + cevap alanı
  const qa = document.createElement("div");
  qa.innerHTML = `<div class="qa-q">❓ ${esc(q)}</div><div class="loading"><div class="spinner"></div> Yanıtlanıyor…</div>`;
  out.appendChild(qa);
  State.history.push({ role:"user", content:q });
  try{
    const reply = await groqChat(State.history);
    State.history.push({ role:"assistant", content:reply });
    qa.innerHTML = `<div class="qa-q">❓ ${esc(q)}</div><div class="explain">${renderRich(reply)}</div><div class="explain-actions"><button class="explain-play qaListen">🔊 Yanıtı dinle</button></div>`;
    const btn = qa.querySelector(".qaListen");
    if(btn) btn.onclick = () => speakTurkish(reply);
  }catch(e){
    qa.querySelector(".loading").outerHTML = `<div class="note bad">Yanıt alınamadı.</div>`;
    handleError(e, true);
  }
}

function handleError(e, silent){
  const code = e && e.code;
  if (code==="no-key" || code==="bad-key"){ openKeySheet(code==="bad-key"); if(!silent) setOut(""); return; }
  let msg="Bir sorun oluştu, tekrar dene.";
  if (code==="rate") msg="API limiti doldu. Biraz bekle.";
  else if (code==="network") msg="İnternet bağlantısı yok gibi görünüyor.";
  if (!silent) setOut(`<div class="state"><h2>Olmadı</h2><p>${msg}</p><button class="btn btn-primary" onclick="location.reload()">Tekrar dene</button></div>`);
}

/* ---------- prompt editörü ---------- */
function openPromptSheet(){
  const sheet=document.createElement("div"); sheet.className="sheet-overlay";
  sheet.innerHTML=`
    <div class="sheet">
      <h3>Öğretmen promptu</h3>
      <p>Yapay zekanın nasıl öğreteceğini buradan değiştirebilirsin. Değişiklik cihazında saklanır. İstediğinde varsayılana dönebilirsin.</p>
      <textarea id="promptArea">${esc(getPrompt())}</textarea>
      <div class="note" id="promptNote"></div>
      <button class="btn btn-primary" id="promptSave">Kaydet ve yeniden açıkla</button>
      <div class="row2">
        <button class="btn" id="promptReset">Varsayılana dön</button>
        <button class="btn" id="promptCancel">Kapat</button>
      </div>
    </div>`;
  document.body.appendChild(sheet);
  const close=()=>sheet.remove();
  sheet.onclick=e=>{ if(e.target===sheet) close(); };
  sheet.querySelector("#promptCancel").onclick=close;
  sheet.querySelector("#promptSave").onclick=()=>{
    const v=sheet.querySelector("#promptArea").value.trim();
    if(!v){ sheet.querySelector("#promptNote").textContent="Prompt boş olamaz."; sheet.querySelector("#promptNote").className="note bad"; return; }
    setPrompt(v); close(); explain();
  };
  sheet.querySelector("#promptReset").onclick=()=>{
    sheet.querySelector("#promptArea").value=DEFAULT_PROMPT;
  };
}

/* ---------- API anahtarı ---------- */
function openKeySheet(invalid){
  const sheet=document.createElement("div"); sheet.className="sheet-overlay";
  sheet.innerHTML=`
    <div class="sheet">
      <h3>Öğretmen için API anahtarı</h3>
      <p>Öğretmen, ücretsiz <b>Groq</b> yapay zekasını kullanır. Kendi anahtarını bir kez gir; cihazında saklanır. <a href="https://console.groq.com/keys" target="_blank" rel="noopener">console.groq.com/keys</a> adresinden ücretsiz alabilirsin.</p>
      <input id="keyInput" type="text" placeholder="gsk_..." autocomplete="off" spellcheck="false" />
      <div class="note ${invalid?"bad":""}" id="keyNote">${invalid?"Önceki anahtar geçersizdi.":""}</div>
      <button class="btn btn-primary" id="keySave">Kaydet ve başla</button>
      <button class="btn" id="keyCancel">Vazgeç</button>
    </div>`;
  document.body.appendChild(sheet);
  const close=()=>sheet.remove();
  sheet.onclick=e=>{ if(e.target===sheet) close(); };
  sheet.querySelector("#keyCancel").onclick=close;
  sheet.querySelector("#keyInput").focus();
  sheet.querySelector("#keySave").onclick=()=>{
    const k=sheet.querySelector("#keyInput").value.trim();
    if(!k||!k.startsWith("gsk_")){ sheet.querySelector("#keyNote").textContent="Anahtar 'gsk_' ile başlamalı."; sheet.querySelector("#keyNote").className="note bad"; return; }
    saveKey(k); close(); explain();
  };
}

parseParams();
render();
