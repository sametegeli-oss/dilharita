<script>/* ============================================================
   teacher.html — Türkçe konuşan İngilizce öğretmeni paneli
   Cümleyi URL'den (?s=...&t=...) alır, Groq'a düzenlenebilir
   system prompt ile gönderir, açıklamadaki tırnak-içi İngilizceyi
   koyu yeşil gösterir. Groq anahtarı chat.html ile ortaktır.
   ============================================================ */
(function(){
"use strict";

/* ---------- Groq (chat.html ile ortak) ---------- */
const GROQ_URL = "https://api.groq.com/openai/v1/chat/completions";
const GROQ_MODEL = "llama-3.3-70b-versatile";
const KEYS_LS = "groqApiKeys";
function getKeys(){ try{ return (JSON.parse(localStorage.getItem(KEYS_LS)||"[]")||[]).filter(Boolean); }catch{ return []; } }
function saveKey(k){ const ks=getKeys(); if(!ks.includes(k)) ks.push(k); try{ localStorage.setItem(KEYS_LS, JSON.stringify(ks)); }catch{} }
let _ki=0;
// word'deki sağlam sistem: rate limit yiyen anahtarı geçici "yasakla",
// bu sürede diğer anahtarları kullan, süre dolunca geri al.
let _keyBan={};        // { keyIndex: serbestKalmaZamanı(ms) }
function nextUsableKey(keys){
  const now=Date.now();
  // süresi dolan yasakları kaldır
  Object.keys(_keyBan).forEach(k=>{ if(_keyBan[k]<now) delete _keyBan[k]; });
  // yasaklı olmayan ilk anahtarı bul
  for(let e=0;e<keys.length;e++){
    const idx=(_ki+e)%keys.length;
    if(!_keyBan[idx]){ _ki=idx; return {idx, key:keys[idx]}; }
  }
  // hepsi yasaklı → en erken serbest kalacakı döndür (bekleme bilgisiyle)
  const soonest=Object.entries(_keyBan).sort((a,b)=>a[1]-b[1])[0];
  return { idx:-1, key:null, waitMs: soonest ? Math.max(0, soonest[1]-now) : 0 };
}
async function groqChat(messages){
  const keys=getKeys();
  if(!keys.length) throw {code:"no-key"};
  let last=null;
  // her anahtarı en fazla 1 kez dene; rate limit yiyeni 60sn yasakla
  for(let attempt=0; attempt<keys.length; attempt++){
    const pick=nextUsableKey(keys);
    if(pick.idx===-1){
      // tüm anahtarlar yasaklı
      throw { code:"rate", tried:keys.length, waitMs:pick.waitMs };
    }
    try{
      const res=await fetch(GROQ_URL,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+pick.key},body:JSON.stringify({model:GROQ_MODEL,messages,temperature:0.3,max_tokens:2500})});
      if(res.status===401){ last={code:"bad-key"}; _keyBan[pick.idx]=Date.now()+5*60*1000; continue; }  // geçersiz anahtar: uzun yasak
      if(res.status===429){ last={code:"rate", tried:keys.length}; _keyBan[pick.idx]=Date.now()+60*1000; continue; }  // rate limit: 60sn yasak
      if(!res.ok){ last={code:"http"}; _keyBan[pick.idx]=Date.now()+10*1000; continue; }
      const data=await res.json();
      return data.choices?.[0]?.message?.content?.trim()||"";
    }catch(e){ last={code:"network"}; }
  }
  throw last||{code:"unknown"};
}

/* ---------- varsayılan prompt (kullanıcı düzenleyebilir) ---------- */
const DEFAULT_PROMPT = `Sen, Türk öğrencilere İngilizce öğreten, çok deneyimli ve pedagojik olarak güçlü bir İngilizce öğretmenisin. Amacın sadece çeviri değil, cümledeki ASIL dilbilgisi yapısını öğrenciye doğru öğretmektir.

EN ÖNEMLİ KURAL: Analiz kategorilerini ASLA uydurma. Sadece aşağıdaki listede adı geçen yapıları kullanabilirsin. "Reason Clause", "Habitual Action" gibi listede olmayan adlar KESİNLİKLE yasaktır.

====================================================
ADIM 1 — GİZLİ YAPI TARAMASI (kullanıcıya gösterme)
====================================================
Cevabı yazmadan önce, cümleyi şu kontrol listesiyle YUKARIDAN AŞAĞIYA tara. Her madde için "var/yok" diye kendine sor. İlk "var" dediğin yapı, analiz edeceğin ANA yapıdır.

1. Embedded / Noun Clause — Cümlede şunlardan biri var mı: "how/what/that/why/where/who/whether + ... + özne + fiil"?
   ÖRNEK: "I know how noisy cities are", "I don't know what he wants", "Tell me where you live".
   UYARI: "how + sıfat + özne + are/is/was" KESİNLİKLE buraya girer. "so", "usually" gibi kelimeler seni yanıltmasın.
2. Relative Clause — "who/which/that/where" ile bir ismi niteleyen yan cümle var mı? (the man who called)
3. Conditional — "if / unless" ile koşul var mı?
4. Passive Voice — "be + V3" (was made, is written) var mı?
5. Perfect / Perfect Continuous — "have/has/had + V3" veya "have been + V-ing" var mı?
6. Modal — can, could, must, should, have to, be supposed to, used to var mı?
7. Infinitive / Gerund — "to + V1" veya "V-ing" özne/nesne olarak var mı?
8. Reported Speech — aktarılan söz var mı?
9. Comparison — "more/-er/as...as/the most" var mı?
10. Phrasal Verb — fiil + edat öbeği (give up, look for) var mı?
11. Idiom / Collocation — kalıplaşmış ifade var mı?
12. Temel zaman/yapı — yukarıdakilerin hiçbiri yoksa, cümlenin temel zamanını seç.

ÜST SIRADAKİ "var" ise, alt sıradakileri ANA yapı olarak ASLA seçme. "so/because/usually" gibi yüzey kelimeleri asla ana yapı olamaz.

====================================================
ÇIKTI (kullanıcıya bunları, bu sırayla göster)
====================================================

1. SEVİYE
Cümlenin CEFR seviyesini (A1–C2) tek satırda belirt. A1–A2 ise kısa analiz yap; B1+ ise tam analiz yap.

2. TÜRKÇE ÇEVİRİ
Doğal, akıcı Türkçe karşılık. Kelime kelime çevirme. (Tüm açıklamalar baştan sona %100 Türkçe olmalı; başka dilden tek kelime karışmamalı.)

3. ANA DİLBİLGİSİ YAPISI
- Yapının adı (yalnızca ADIM 1 listesindeki adlardan biri)
- Bu cümlede neden kullanılmış
- Türkçeye kattığı anlam/nüans
- Günlük kullanımda ne kadar yaygın
- Türk öğrencilerin yaptığı en yaygın hata

4. FORMÜL + EŞLEŞTİRME
Önce yapının formülünü EKSİKSİZ yaz (özne ve fiili atlama).
Örnek: how + adjective + subject + verb
Sonra cümleyi satır satır eşleştir:
how → how
adjective → noisy
subject → cities
verb → are

5. KELİME VE ÖBEKLER (en fazla 4)
Öncelik: Phrasal verb > Idiom > Collocation > Sabit ifade > Önemli kelime.
KURAL: "very, usually, so, good, go" gibi basit/yüzeysel kelimeleri SEÇME.
Her biri için: Türkçe anlamı, türü (isim/fiil/sıfat/zarf), CEFR seviyesi, ve [[ ]] içinde 3 günlük örnek cümle. Bu örneklerin de HER BİRİ mutlaka [[ ]] içinde olmalı.

6. ALTERNATİF CÜMLELER (5 adet)
Hepsi ANA yapıyla AYNI dilbilgisini kullanmalı (örn. ana yapı embedded clause ise, 5 cümlenin hepsinde "how/what/that + özne + fiil" olmalı).
Sırasıyla şu senaryolardan: Ev, Okul, İş, Alışveriş, Seyahat.
Her cümle [[ ]] içinde, hemen altında Türkçe çevirisi.

7. ÖĞRENME İPUCU
En fazla 2 cümle, akılda kalıcı bir ipucu.

8. SIK YAPILAN HATA
Tablo halinde, SADECE ana yapıya dair:
| Hatalı | Doğru |
| --- | --- |
| ... | ... |

9. MİNİ TEST
Sadece ANA yapıyı ölçen 1 boşluk doldurma sorusu, 4 seçenek (A/B/C/D). En altta "Cevap" başlığıyla doğru şıkkı ve kısa açıklamasını ver.

====================================================
SON KONTROL (gizli, gösterme)
====================================================
Göndermeden önce sessizce doğrula:
- Seçtiğim yapı ADIM 1 listesinde gerçekten VAR mı? Uydurma ad kullandım mı?
- "how + sıfat + özne + are/is" gördüm ama embedded clause demedim mi? Öyleyse düzelt, embedded clause seç.
- 5 alternatif cümlenin HEPSİ ana yapıyı içeriyor mu?
- Mini test ana yapıyı mı ölçüyor?
- Tüm İngilizce cümleler (örnekler dahil) [[ ]] içinde mi?
- Türkçe metinde yabancı kelime kaldı mı?

BİÇİM: Net başlıklar, bold vurgular, kısa paragraflar. Duvar yazısı yazma. Gereksiz uzatma — özellikle kolay cümlelerde kısa tut.`;

const PROMPT_LS = "dh_ai_prompt_teacher";
function getPrompt(){ try{ return localStorage.getItem(PROMPT_LS) || DEFAULT_PROMPT; }catch{ return DEFAULT_PROMPT; } }
function setPrompt(p){ try{ localStorage.setItem(PROMPT_LS, p); }catch{} }

/* ---------- TTS ---------- */
/* ---------- fotoğraflı teacher avatar + TTS ---------- */
const TEACHER_FRAMES = {
  idle:"idle.webp", blink:"blink.webp", listen:"listen.webp",
  a:"mouth-a.webp", e:"mouth-e.webp", i:"mouth-i.webp",
  o:"mouth-o.webp", u:"mouth-u.webp", mbp:"mouth-mbp.webp",
  fv:"mouth-fv.webp", l:"mouth-l.webp", th:"mouth-th.webp"
};
function getSelectedTeacher(){
  const p = new URLSearchParams(location.search);
  const fromUrl = (p.get("teacher") || p.get("avatar") || "").trim();
  if (fromUrl === "teacher1" || fromUrl === "teacher2") {
    try { localStorage.setItem("selectedTeacherAvatar", fromUrl); } catch {}
    return fromUrl;
  }
  return localStorage.getItem("selectedTeacherAvatar") || "teacher1";
}
function teacherDir(){
  return "./assets/avatars_v3/" + getSelectedTeacher() + "/";
}
let TeacherAvatar = null;
class PhotoTeacherAvatar{
  constructor(){
    this.imgs=[];
    this.frames={};
    this.blinkTimer=null;
    this.talkTimer=null;
    this.endTimer=null;
    this.seq=[];
    this.idx=0;
    this.speaking=false;
  }
  mount(){
    this.imgs = ["teacherAvaImg","teacherHeroImg"].map(id=>document.getElementById(id)).filter(Boolean);
    const dir=teacherDir();
    for(const [k,v] of Object.entries(TEACHER_FRAMES)) this.frames[k]=dir+v;
    this.preload();
    this.show(this.frames.idle);
    this.scheduleBlink(1200);
  }
  preload(){ Object.values(this.frames).forEach(src=>{ const im=new Image(); im.src=src; }); }
  show(src){ this.imgs.forEach(img=>{ img.src=src; }); }
  scheduleBlink(delay){
    clearTimeout(this.blinkTimer);
    this.blinkTimer=setTimeout(()=>this.blink(), delay || (2400 + Math.random()*2200));
  }
  blink(){
    if(this.speaking){ this.scheduleBlink(1400); return; }
    this.show(this.frames.blink);
    setTimeout(()=>{ if(!this.speaking) this.show(this.frames.idle); this.scheduleBlink(); }, 330);
  }
  frameForChar(ch,next){
    ch=(ch||"").toLowerCase(); next=(next||"").toLowerCase();
    if(ch==="t" && next==="h") return this.frames.th;
    if(/[oö0]/.test(ch)) return this.frames.o;
    if(/[uüwq]/.test(ch)) return this.frames.u;
    if(/[a]/.test(ch)) return this.frames.a;
    if(/[e]/.test(ch)) return this.frames.e;
    if(/[iııy]/.test(ch)) return this.frames.i;
    if(/[mnbp]/.test(ch)) return this.frames.mbp;
    if(/[fv]/.test(ch)) return this.frames.fv;
    if(/[l]/.test(ch)) return this.frames.l;
    if(/[.,!?;:\s]/.test(ch)) return this.frames.idle;
    return this.frames.i;
  }
  buildSeq(text){
    const s=String(text||"");
    const seq=[];
    for(let i=0;i<s.length;i++){
      const ch=s[i], next=s[i+1]||"";
      seq.push(this.frameForChar(ch,next));
      if(ch.toLowerCase()==="t" && next.toLowerCase()==="h") i++;
    }
    return seq.filter(Boolean);
  }
  speakText(text,duration){
    clearInterval(this.talkTimer); clearTimeout(this.endTimer);
    this.speaking=true;
    this.seq=this.buildSeq(text);
    if(!this.seq.length) this.seq=[this.frames.i,this.frames.e,this.frames.a,this.frames.o,this.frames.u,this.frames.mbp,this.frames.idle];
    this.idx=0;
    this.talkTimer=setInterval(()=>{ this.show(this.seq[this.idx % this.seq.length]); this.idx++; },105);
    this.endTimer=setTimeout(()=>this.stop(), Math.max(900,duration||1800));
  }
  stop(){
    clearInterval(this.talkTimer); clearTimeout(this.endTimer);
    this.speaking=false;
    this.show(this.frames.listen);
    setTimeout(()=>{ if(!this.speaking) this.show(this.frames.idle); },260);
    this.scheduleBlink(1200);
  }
}
function mountTeacherAvatar(){
  TeacherAvatar = new PhotoTeacherAvatar();
  TeacherAvatar.mount();
}
function estimateSpeechDuration(text){
  return Math.max(900, Math.min(18000, Array.from(String(text||"")).length * 92));
}
let _voiceCache=[];
function refreshVoices(){ try{ _voiceCache = speechSynthesis.getVoices ? speechSynthesis.getVoices() : []; }catch{ _voiceCache=[]; } }
try{ refreshVoices(); speechSynthesis.onvoiceschanged = refreshVoices; }catch{}
function pickVoiceForLang(lang){
  refreshVoices();
  const voices = _voiceCache || [];
  const wantTr = /^tr/i.test(lang || "");
  if(wantTr){
    return voices.find(v=>/^tr/i.test(v.lang||"")) || voices.find(v=>/turkish|türk|turk/i.test(v.name||"")) || null;
  }
  const en = voices.filter(v=>/^en/i.test(v.lang||""));
  if(!en.length) return null;
  const male = /(male|david|mark|george|daniel|james|john|alex|fred|thomas|guy|brian|ryan|matthew|arthur|oliver)/i;
  const pref = en.filter(v=>/en-US|en_GB|en-GB|en_US/i.test(v.lang||""));
  return pref.find(v=>male.test(v.name||"")) || pref[0] || en[0];
}
function speak(text, lang){
  try{
    text=String(text||"").trim();
    if(!text) return;
    lang = lang || "tr-TR";
    const u=new SpeechSynthesisUtterance(text);
    const voice=pickVoiceForLang(lang);
    if(voice) u.voice=voice;
    u.lang = voice ? voice.lang : lang;
    u.rate = /^tr/i.test(lang) ? 0.92 : 0.95;
    u.pitch = 0.86;
    speechSynthesis.cancel();
    if(TeacherAvatar) TeacherAvatar.speakText(text, estimateSpeechDuration(text));
    u.onend=()=>{ if(TeacherAvatar) TeacherAvatar.stop(); };
    u.onerror=()=>{ if(TeacherAvatar) TeacherAvatar.stop(); };
    speechSynthesis.speak(u);
  }catch{
    if(TeacherAvatar) TeacherAvatar.stop();
  }
}
function speakEnglish(text){ speak(text, "en-US"); }
function speakTurkish(text){ speak(text, "tr-TR"); }
// Verilen kapsayıcı elementi ekrandan okur: .en (yeşil) = İngilizce, gerisi = Türkçe.
// Ekranda görünen renk ayrımıyla okuma BİREBİR aynı olur.
function speakFromScreen(boxEl){
  if(!boxEl) return false;
  // Toggle: konuşuyorsa duraklat, duraklatılmışsa kaldığı yerden devam ettir.
  try{
    if(window.speechSynthesis){
      if(speechSynthesis.paused && speechSynthesis.speaking){
        // Duraklatılmış: devam ettir
        window.__dhUserPaused = false;
        speechSynthesis.resume();
        return false;
      }
      if(speechSynthesis.speaking){
        // Konuşuyor: duraklat (keep-alive'ın tekrar başlatmaması için işaret bırak)
        window.__dhUserPaused = true;
        speechSynthesis.pause();
        return false;
      }
    }
  }catch(e){}
  window.__dhUserPaused = false;
  var segs=[];
  (function walk(node){
    // childNodes canlı liste; sarmalama yapacağımız için kopya üzerinde gez
    var kids=Array.prototype.slice.call(node.childNodes);
    kids.forEach(function(ch){
      if(ch.nodeType===3){
        var t=ch.textContent;
        if(t && t.trim()){
          // Türkçe metin düğümünü span'e sar ki tek başına vurgulanabilsin
          var sp=document.createElement("span");
          sp.className="dh-seg";
          sp.textContent=t;
          if(ch.parentNode){ ch.parentNode.replaceChild(sp, ch); }
          segs.push({text:t, lang:"tr-TR", el:sp});
        }
      } else if(ch.nodeType===1){
        if(ch.classList && ch.classList.contains("en")){
          var et=ch.textContent;
          if(et && et.trim()) segs.push({text:et, lang:"en-US", el:ch});
        } else {
          walk(ch);
        }
      }
    });
  })(boxEl);
  if(segs.length && window.DH_speakSegments){ window.DH_speakSegments(segs); return true; }
  // Yedek
  if(window.DH_speakMixed){ window.DH_speakMixed(boxEl.textContent||""); return true; }
  speakTurkish(boxEl.textContent||"");
  return true;
}
// Okunan parçayı vurgular (öncekini temizler).
window.__dhHighlight = function(el){
  try{
    document.querySelectorAll(".dh-reading").forEach(function(n){ n.classList.remove("dh-reading"); });
    if(el && el.classList){ el.classList.add("dh-reading"); }
  }catch(e){}
};

/* ---------- yardımcılar ---------- */
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
// açıklamadaki tırnak-içi İngilizce -> koyu yeşil; **kalın** -> strong
function renderRich(text){
  let html = esc(text);
  // [[....]] -> koyu yeşil (çift köşeli parantez içi İngilizce). Parantezler kaldırılır.
  html = html.replace(/\[\[([\s\S]*?)\]\]/g, '<span class="en">$1</span>');
  // **kalın**
  html = html.replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
  return html;
}

const root = document.getElementById("root");
const State = { en:"", tr:"", history:[], explanation:"" };

/* ---------- URL parametreleri ---------- */
function parseParams(){
  const p = new URLSearchParams(location.search);
  State.en = (p.get("s")||"").trim();
  State.tr = (p.get("t")||"").trim();
}

/* ============================================================
   EKRAN
   ============================================================ */
function render(){
  root.innerHTML = `
  <div class="top">
    <a href="./index.html" class="back" id="teacherBack" title="Geri">←</a>
    <div class="ava" title="Fotoğraflı öğretmen"><img id="teacherAvaImg" alt="Öğretmen avatarı"></div>
    <div class="tinfo"><h1>İngilizce Öğretmeni</h1><p>Türkçe anlatımlı İngilizce öğretmeni</p></div>
    <button class="keybtn" id="teacherKeyBtn" title="API anahtarları">🔑</button>
  </div>
  <div class="body">
    <div class="teacher-hero"><img class="teacher-photo" id="teacherHeroImg" alt="Fotoğraflı öğretmen avatarı"></div>
    <div class="subject">
      <div class="subject-en" id="subEn">${renderRich('[['+esc(State.en)+']]')}</div>
      ${State.tr ? `<div class="subject-tr">${esc(State.tr)}</div>` : ""}
      <button class="subject-play" id="playBtn">🔊 Cümleyi dinle</button>
    </div>
    <div id="out"></div>
  </div>`;
  mountTeacherAvatar();
  // Geri düğmesi davranışı
  var keyBtn = document.getElementById("teacherKeyBtn");
  if (keyBtn) keyBtn.onclick = () => openKeySheet();
  var backEl = document.getElementById("teacherBack");
  if (backEl){
    var p2 = new URLSearchParams(location.search);
    var isEmbed = p2.get("embed") === "1";
    if (isEmbed){
      // iframe katmanı içinde: üst pencereye "kapat" sinyali gönder.
      // Çalışma sayfası arkada açık kaldığı için aynı cümleden devam edilir.
      backEl.setAttribute("href", "#");
      backEl.textContent = "←";
      backEl.title = "Çalışmaya dön";
      backEl.onclick = function(ev){
        ev.preventDefault();
        try{ parent.postMessage("dh-teacher-close", "*"); }catch(e){}
      };
    } else {
      // Ayrı sayfa olarak açıldıysa: kayıtlı dönüş sayfasına git (yoksa ana menü)
      var ret = "";
      try{ ret = localStorage.getItem("teacherReturnURL") || ""; }catch(e){}
      if (!ret){ ret = p2.get("return") || ""; }
      if (ret){
        backEl.setAttribute("href", ret);
        backEl.onclick = function(ev){
          ev.preventDefault();
          try{ localStorage.removeItem("teacherReturnURL"); }catch(e){}
          location.href = ret;
        };
      }
    }
  }
  document.getElementById("playBtn").onclick = () => speakEnglish(State.en);
  explain();
}

function setOut(html){ document.getElementById("out").innerHTML = html; }

async function explain(){
  if (!State.en){
    setOut(`<div class="state">
      <h2>Bir cümle yaz</h2>
      <p>İncelemesini istediğin İngilizce (veya Türkçe) cümleyi yaz, öğretmen açıklasın.</p>
      <div class="manual-entry">
        <input id="manualSentence" type="text" placeholder="Örn: She has been working all day." autocomplete="off" />
        <button id="manualGo">Açıkla</button>
      </div>
    </div>`);
    var inp = document.getElementById("manualSentence");
    var go = function(){
      var v = (inp.value||"").trim();
      if(!v) return;
      State.en = v;
      State.tr = "";
      explain();
    };
    if(inp){ inp.focus(); inp.onkeydown = function(e){ if(e.key==="Enter") go(); }; }
    var gb = document.getElementById("manualGo");
    if(gb) gb.onclick = go;
    return;
  }
  // storage-bridge (IndexedDB) henüz belleğe yüklenmediyse, hazır olmasını bekle.
  // Böylece anahtarlar IndexedDB'deyken yanlışlıkla "anahtar yok" kutusu açılmaz.
  if (typeof window.__dhStorageReady !== "undefined" && !window.__dhStorageReady && !getKeys().length){
    setOut(`<div class="loading"><div class="spinner"></div> Hazırlanıyor…</div>`);
    await new Promise(function(resolve){
      var done=false;
      function go(){ if(done) return; done=true; resolve(); }
      window.addEventListener("dh-storage-ready", go, {once:true});
      setTimeout(go, 1500); // güvenlik: en fazla 1.5 sn bekle
    });
  }
  if (!getKeys().length){ openKeySheet(); setOut(""); return; }
  setOut(`<div class="loading"><div class="spinner"></div> Öğretmen cümleyi inceliyor…</div>`);
  const userMsg = `İngilizce cümle: "${State.en}"` + (State.tr ? `\nTürkçe çevirisi: ${State.tr}` : "");
  State.history = [{ role:"system", content:getPrompt() }, { role:"user", content:userMsg }];
  try{
    const reply = await groqChat(State.history);
    State.history.push({ role:"assistant", content:reply });
    renderExplanation(reply);
  }catch(e){ handleError(e); }
}

function renderExplanation(reply){
  State.explanation = reply || "";
  setOut(`
    <div class="explain">${renderRich(reply)}</div>
    <div class="explain-actions">
      <button class="explain-play" id="explainListenBtn">🔊 Oku</button>
      <button class="explain-play" id="sentenceListenBtn">🔊 Cümleyi dinle</button>
    </div>
    <div class="followup">
      <input id="fuInput" type="text" placeholder="Bir sorun mu var? Öğretmene sor…" />
      <button id="fuSend">Sor</button>
    </div>
    <button class="regen" id="regenBtn">↻ Yeniden açıkla</button>`);
  const fu = document.getElementById("fuInput");
  fu.onkeydown = e => { if (e.key==="Enter") askFollowup(fu.value); };
  document.getElementById("fuSend").onclick = () => askFollowup(fu.value);
  document.getElementById("regenBtn").onclick = () => explain();
  document.getElementById("explainListenBtn").onclick = () => speakFromScreen(document.querySelector(".explain"));
  document.getElementById("sentenceListenBtn").onclick = () => speakEnglish(State.en);
}

async function askFollowup(q){
  q = (q||"").trim();
  if (!q) return;
  const out = document.getElementById("out");
  // mevcut açıklamanın altına soru + cevap alanı
  const qa = document.createElement("div");
  qa.innerHTML = `<div class="qa-q">❓ ${esc(q)}</div><div class="loading"><div class="spinner"></div> Yanıtlanıyor…</div>`;
  out.appendChild(qa);
  State.history.push({ role:"user", content:q });
  try{
    const reply = await groqChat(State.history);
    State.history.push({ role:"assistant", content:reply });
    qa.innerHTML = `<div class="qa-q">❓ ${esc(q)}</div><div class="explain qaExplain">${renderRich(reply)}</div><div class="explain-actions"><button class="explain-play qaListen">🔊 Oku</button></div>`;
    const btn = qa.querySelector(".qaListen");
    if(btn) btn.onclick = () => speakFromScreen(qa.querySelector(".qaExplain"));
  }catch(e){
    qa.querySelector(".loading").outerHTML = `<div class="note bad">Yanıt alınamadı.</div>`;
    handleError(e, true);
  }
}

function handleError(e, silent){
  const code = e && e.code;
  if (code==="no-key" || code==="bad-key"){ openKeySheet(code==="bad-key"); if(!silent) setOut(""); return; }
  let msg="Bir sorun oluştu, tekrar dene.";
  if (code==="rate"){
    var t = e && e.tried ? e.tried : 1;
    var w = e && e.waitMs ? Math.ceil(e.waitMs/1000) : 0;
    if (t > 1) msg = t + " API anahtarının hepsi şu an limitte" + (w?(" (~"+w+" sn sonra açılır)"):"") + ". Farklı Groq hesaplarından anahtar eklersen kesinti azalır.";
    else msg = "API limiti doldu (tek anahtar). Birkaç dakika bekle veya '🔑 Anahtarlar'dan ek anahtar gir.";
  }
  else if (code==="network") msg="İnternet bağlantısı yok gibi görünüyor.";
  if (!silent) setOut(`<div class="state"><h2>Olmadı</h2><p>${msg}</p><button class="btn btn-primary" onclick="location.reload()">Tekrar dene</button></div>`);
}

/* ---------- prompt editörü ---------- */
function openPromptSheet(){
  const sheet=document.createElement("div"); sheet.className="sheet-overlay";
  sheet.innerHTML=`
    <div class="sheet">
      <h3>Öğretmen promptu</h3>
      <p>Yapay zekanın nasıl öğreteceğini buradan değiştirebilirsin. Değişiklik cihazında saklanır. İstediğinde varsayılana dönebilirsin.</p>
      <textarea id="promptArea">${esc(getPrompt())}</textarea>
      <div class="note" id="promptNote"></div>
      <button class="btn btn-primary" id="promptSave">Kaydet ve yeniden açıkla</button>
      <div class="row2">
        <button class="btn" id="promptReset">Varsayılana dön</button>
        <button class="btn" id="promptCancel">Kapat</button>
      </div>
    </div>`;
  document.body.appendChild(sheet);
  const close=()=>sheet.remove();
  sheet.onclick=e=>{ if(e.target===sheet) close(); };
  sheet.querySelector("#promptCancel").onclick=close;
  sheet.querySelector("#promptSave").onclick=()=>{
    const v=sheet.querySelector("#promptArea").value.trim();
    if(!v){ sheet.querySelector("#promptNote").textContent="Prompt boş olamaz."; sheet.querySelector("#promptNote").className="note bad"; return; }
    setPrompt(v); close(); explain();
  };
  sheet.querySelector("#promptReset").onclick=()=>{
    sheet.querySelector("#promptArea").value=DEFAULT_PROMPT;
  };
}

/* ---------- API anahtarları (çoklu, okunur) ---------- */
function removeKey(k){
  let ks=getKeys().filter(x=>x!==k);
  try{ localStorage.setItem(KEYS_LS, JSON.stringify(ks)); }catch{}
}
function keyListHTML(){
  const ks=getKeys();
  if(!ks.length) return `<div class="keylist-empty">Henüz anahtar yok.</div>`;
  return ks.map((k,i)=>`
    <div class="keyrow">
      <span class="keynum">${i+1}</span>
      <input class="keyval" type="text" readonly value="${esc(k)}" />
      <button class="keydel" data-k="${esc(k)}" title="Sil">🗑️</button>
    </div>`).join("");
}
function openKeySheet(invalid){
  const sheet=document.createElement("div"); sheet.className="sheet-overlay";
  sheet.innerHTML=`
    <div class="sheet">
      <h3>Öğretmen için API anahtarları</h3>
      <p>Öğretmen, ücretsiz <b>Groq</b> yapay zekasını kullanır. Birden fazla anahtar ekleyebilirsin; biri limite takılırsa diğerine geçilir. <a href="https://console.groq.com/keys" target="_blank" rel="noopener">console.groq.com/keys</a> adresinden ücretsiz alabilirsin.</p>
      <div class="keylist" id="keyList">${keyListHTML()}</div>
      <input id="keyInput" type="text" placeholder="Yeni anahtar: gsk_..." autocomplete="off" spellcheck="false" />
      <div class="note ${invalid?"bad":""}" id="keyNote">${invalid?"Önceki anahtar geçersizdi.":""}</div>
      <button class="btn btn-primary" id="keyAdd">+ Anahtar ekle</button>
      <button class="btn btn-primary" id="keyDone">Bitti</button>
      <button class="btn" id="keyCancel">Kapat</button>
    </div>`;
  document.body.appendChild(sheet);
  const close=()=>sheet.remove();
  const refresh=()=>{ sheet.querySelector("#keyList").innerHTML=keyListHTML(); bindDel(); };
  const bindDel=()=>{
    sheet.querySelectorAll(".keydel").forEach(btn=>{
      btn.onclick=()=>{ removeKey(btn.getAttribute("data-k")); refresh(); };
    });
  };
  bindDel();
  sheet.onclick=e=>{ if(e.target===sheet) close(); };
  sheet.querySelector("#keyCancel").onclick=close;
  sheet.querySelector("#keyInput").focus();
  const addKey=()=>{
    const inp=sheet.querySelector("#keyInput");
    const k=inp.value.trim();
    if(!k||!k.startsWith("gsk_")){ sheet.querySelector("#keyNote").textContent="Anahtar 'gsk_' ile başlamalı."; sheet.querySelector("#keyNote").className="note bad"; return; }
    saveKey(k); inp.value=""; sheet.querySelector("#keyNote").textContent="✓ Eklendi."; sheet.querySelector("#keyNote").className="note ok"; refresh();
  };
  sheet.querySelector("#keyAdd").onclick=addKey;
  sheet.querySelector("#keyInput").onkeydown=e=>{ if(e.key==="Enter") addKey(); };
  sheet.querySelector("#keyDone").onclick=()=>{
    if(!getKeys().length){ sheet.querySelector("#keyNote").textContent="En az bir anahtar gerekli."; sheet.querySelector("#keyNote").className="note bad"; return; }
    close(); explain();
  };
}

parseParams();
render();
