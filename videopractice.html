<title>Video Practice · Sentence Mode</title>
<style>
:root{
  --bg:#0b1120; --surface:#131c30; --surface-2:#1a2540; --border:#ffffff18;
  --text:#e8eef7; --muted:#93a4bd; --accent:#60a5fa; --accent-strong:#2563eb;
  --ok:#22c55e; --warn:#f59e0b; --bad:#ef4444; --shadow:0 22px 70px rgba(0,0,0,.45);
}
*{box-sizing:border-box}
html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:Nunito,system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
button,input{font-family:inherit}
.hidden{display:none!important}
#root{min-height:100%}
.state{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;text-align:center;padding:22px;color:var(--muted)}
.spinner{width:36px;height:36px;border-radius:50%;border:3px solid #ffffff24;border-top-color:var(--accent);animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
.btn{border:1px solid var(--border);background:var(--surface-2);color:var(--text);border-radius:14px;padding:12px 16px;font-weight:900;font-size:15px;cursor:pointer}.btn:active{transform:scale(.97)}.btn.primary{background:var(--accent-strong);border-color:transparent;color:#fff}.btn.green{background:#16a34a;border-color:transparent;color:#fff}.btn.red{background:#dc2626;border-color:transparent;color:#fff}.btn.ghost{background:#00000040}
/* picker */
.picker{max-width:760px;margin:0 auto;min-height:100vh;padding:18px;display:flex;flex-direction:column;gap:20px}.picker-top{display:flex;align-items:center;justify-content:space-between;gap:10px}.home-link{color:var(--muted);text-decoration:none;font-weight:800}.api-mini{font-size:13px;padding:8px 12px;border-radius:999px}.pick-intro{text-align:center;padding:22px 6px 8px}.pick-intro h1{font-family:Fraunces,serif;font-weight:600;font-size:34px;margin:0;background:linear-gradient(120deg,#60a5fa,#a78bfa,#34d399);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}.pick-intro p{color:var(--muted);line-height:1.55;margin:10px auto 0;max-width:560px}.lv-head{display:flex;align-items:center;gap:10px;margin:0 0 10px;color:var(--muted);font-size:14px;font-weight:800}.lv-badge{background:var(--accent-strong);color:#fff;border-radius:9px;padding:4px 10px}.mod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}.mod-tile{text-align:left;background:var(--surface);border:1px solid var(--border);border-radius:18px;color:var(--text);padding:15px;cursor:pointer;display:flex;flex-direction:column;gap:7px}.mod-tile:hover{background:var(--surface-2);border-color:#60a5fa80}.mod-name{font-weight:900;line-height:1.25}.mod-count{font-size:12px;color:var(--muted)}.mod-prog{height:6px;background:#ffffff12;border-radius:999px;overflow:hidden;margin-top:4px}.mod-prog span{display:block;height:100%;background:linear-gradient(90deg,#60a5fa,#34d399)}
/* video screen */
.video-page{min-height:100vh;position:relative;background:#020617;overflow:hidden}.video-bg{position:fixed;inset:0;background:#020617}.video-bg video{width:100%;height:100%;object-fit:cover;display:block;background:#020617}.video-bg::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(2,6,23,.38),rgba(2,6,23,.12) 35%,rgba(2,6,23,.35) 72%,rgba(2,6,23,.82));pointer-events:none}.video-loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:#dbeafe;background:radial-gradient(circle at 50% 35%,#1e3a8a66,transparent 42%),#020617;z-index:0}.vp-top{position:relative;z-index:3;display:flex;align-items:center;gap:12px;padding:14px max(16px,env(safe-area-inset-left)) 8px}.back{width:44px;height:44px;border-radius:14px;background:#02061799;color:#fff;border:1px solid #ffffff22;font-size:20px;cursor:pointer}.vp-title{flex:1;min-width:0;text-shadow:0 2px 14px rgba(0,0,0,.55)}.vp-title h1{font-family:Fraunces,serif;margin:0;font-size:21px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.vp-title p{margin:2px 0 0;color:#cbd5e1;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.queue-pill{background:#020617a8;border:1px solid #ffffff22;border-radius:999px;color:#bfdbfe;font-weight:900;padding:7px 13px}.subtitle-wrap{position:relative;z-index:2;min-height:calc(100vh - 210px);display:flex;align-items:center;justify-content:center;padding:40px 18px 120px}.en-subtitle{max-width:min(900px,90vw);background:rgba(17,24,39,.66);border:1px solid #ffffff22;border-radius:15px;padding:12px 18px;color:white;font-size:clamp(23px,4.2vw,46px);font-weight:950;line-height:1.15;text-align:center;text-shadow:0 3px 14px rgba(0,0,0,.7);box-shadow:0 10px 34px rgba(0,0,0,.35)}.tr-panel{position:fixed;left:50%;bottom:126px;transform:translateX(-50%);z-index:5;width:min(820px,calc(100vw - 32px));background:rgba(2,6,23,.82);border:1px solid #ffffff24;border-radius:18px;padding:13px 16px;color:#f8fafc;box-shadow:var(--shadow);text-align:center}.tr-label{font-size:11px;color:#93c5fd;font-weight:900;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}.tr-text{font-size:clamp(18px,3vw,30px);font-family:Fraunces,serif;line-height:1.35}.controls{position:fixed;left:0;right:0;bottom:16px;z-index:6;display:grid;grid-template-columns:1fr auto 1fr;align-items:end;gap:10px;width:min(760px,calc(100vw - 24px));margin:auto}.ctrl{background:transparent;border:0;color:white;text-shadow:0 2px 10px rgba(0,0,0,.75);font-weight:950;font-size:15px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:7px}.ctrl-ico{width:46px;height:46px;border-radius:999px;display:flex;align-items:center;justify-content:center;background:rgba(2,6,23,.5);border:1px solid #ffffff22;font-size:25px}.mic-main{width:98px;height:98px;border-radius:999px;border:4px solid #3b82f6;background:white;color:#2563eb;font-size:38px;box-shadow:0 12px 34px rgba(0,0,0,.34);cursor:pointer;display:flex;align-items:center;justify-content:center}.mic-main.listening{background:#ef4444;color:white;border-color:white;animation:pulseMic 1s infinite}@keyframes pulseMic{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}.mic-caption{text-align:center;color:white;font-weight:950;margin-top:8px;text-shadow:0 2px 10px #000}.next-float{position:fixed;right:16px;top:72px;z-index:6;border:0;border-radius:999px;background:#16a34a;color:#fff;font-weight:950;padding:12px 16px;box-shadow:var(--shadow);cursor:pointer}.api-float{position:fixed;left:16px;top:72px;z-index:6;border:1px solid #ffffff22;border-radius:999px;background:#02061799;color:#fff;font-weight:950;padding:10px 14px;cursor:pointer}.feedback{position:fixed;left:50%;top:84px;transform:translateX(-50%);z-index:9;width:min(720px,calc(100vw - 28px));background:rgba(2,6,23,.9);border:1px solid #ffffff24;border-radius:18px;padding:14px 16px;box-shadow:var(--shadow);color:#e5e7eb}.feedback.ok{border-color:#22c55e88}.feedback.bad{border-color:#ef444488}.fb-title{font-weight:950;font-size:19px;margin-bottom:6px}.fb-line{font-size:13px;color:#cbd5e1;line-height:1.5}.fb-line b{color:white}.score{font-size:28px;font-weight:950}.video-status{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:4;background:rgba(2,6,23,.76);border:1px solid #ffffff22;border-radius:18px;padding:14px 18px;color:#dbeafe;font-weight:900;text-align:center;max-width:86vw}.api-sheet{position:fixed;inset:0;background:rgba(0,0,0,.68);z-index:20;display:flex;align-items:center;justify-content:center;padding:18px}.api-card{width:min(480px,100%);background:#fff;color:#111827;border-radius:24px;padding:22px;box-shadow:var(--shadow)}.api-card h2{margin:0 0 8px;font-family:Fraunces,serif}.api-card p{margin:0 0 14px;color:#4b5563;line-height:1.5}.api-card input{width:100%;border:1px solid #d1d5db;border-radius:14px;padding:13px;font-weight:800;font-size:15px}.api-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}.api-actions .btn{color:#111827}.api-actions .primary{color:#fff}.fallback-input{position:fixed;left:50%;bottom:122px;transform:translateX(-50%);z-index:7;width:min(680px,calc(100vw - 32px));display:flex;gap:8px}.fallback-input input{flex:1;border:1px solid #ffffff33;background:#020617d8;color:white;border-radius:14px;padding:13px;font-weight:800}.fallback-input button{border:0;border-radius:14px;background:#2563eb;color:#fff;padding:13px 16px;font-weight:950}.small-note{position:fixed;left:50%;bottom:4px;transform:translateX(-50%);z-index:6;color:#bfdbfe;font-size:11px;text-align:center;width:100%;pointer-events:none}@media(max-width:640px){.vp-top{padding-top:10px}.subtitle-wrap{min-height:calc(100vh - 185px);padding-bottom:126px}.controls{bottom:18px;grid-template-columns:1fr 106px 1fr}.mic-main{width:88px;height:88px}.tr-panel{bottom:126px}.next-float{top:auto;right:12px;bottom:126px}.api-float{top:auto;left:12px;bottom:126px}.ctrl{font-size:13px}.ctrl-ico{width:42px;height:42px}.feedback{top:72px}}
</style>
</head>
<body>
<div id="root"></div>
<script>
(function(){
"use strict";
const DATA_PATHS=["data/sentences.json","sentences.json","./data/sentences.json"];
const DB_NAME="sentence-mode", STORE="kv", SRS_PREFIX="video-srs:", POS_PREFIX="video-pos:", API_KEY="pexels-api-key", VIDEO_PREFIX="video-practice-video:";
const DAY=1440*60*1000;
const LEVEL_ORDER=["A1","A2","B1","B2","C1","C2"];
const STT=window.SpeechRecognition||window.webkitSpeechRecognition;
const root=document.getElementById("root");
let _db=null;
const State={sentences:[],byModule:new Map(),byLevel:new Map(),srs:{},queue:[],idx:0,activeModule:null,sessionTitle:"",currentVideoPayload:null,showTR:false,listening:false};
function openDB(){if(_db)return Promise.resolve(_db);return new Promise((res,rej)=>{if(!indexedDB)return rej(new Error("IndexedDB yok"));const r=indexedDB.open(DB_NAME,1);r.onupgradeneeded=()=>{const db=r.result;if(!db.objectStoreNames.contains(STORE))db.createObjectStore(STORE)};r.onsuccess=()=>{_db=r.result;res(_db)};r.onerror=()=>rej(r.error)});}
async function kvGet(k){try{const db=await openDB();return await new Promise((res,rej)=>{const rq=db.transaction(STORE,"readonly").objectStore(STORE).get(k);rq.onsuccess=()=>res(rq.result||"");rq.onerror=()=>rej(rq.error)})}catch(e){try{return localStorage.getItem(k)||""}catch{return ""}}}
async function kvSet(k,v){try{const db=await openDB();await new Promise((res,rej)=>{const rq=db.transaction(STORE,"readwrite").objectStore(STORE).put(String(v||""),k);rq.onsuccess=res;rq.onerror=()=>rej(rq.error)});return true}catch(e){try{localStorage.setItem(k,String(v||""));return true}catch{return false}}}
async function kvDel(k){try{const db=await openDB();await new Promise((res,rej)=>{const rq=db.transaction(STORE,"readwrite").objectStore(STORE).delete(k);rq.onsuccess=res;rq.onerror=()=>rej(rq.error)})}catch(e){try{localStorage.removeItem(k)}catch{}}}
async function srsGet(id){const raw=await kvGet(SRS_PREFIX+id);try{return raw?JSON.parse(raw):null}catch{return null}}
async function srsSet(id,val){await kvSet(SRS_PREFIX+id,JSON.stringify(val))}
async function srsAll(){const out={};try{const db=await openDB();return await new Promise((res,rej)=>{const rq=db.transaction(STORE,"readonly").objectStore(STORE).openCursor();rq.onsuccess=()=>{const c=rq.result;if(c){if(typeof c.key==="string"&&c.key.startsWith(SRS_PREFIX)){try{out[c.key.slice(SRS_PREFIX.length)]=typeof c.value==="string"?JSON.parse(c.value):c.value}catch{}}c.continue()}else res(out)};rq.onerror=()=>rej(rq.error)})}catch{return out}}
function srsDefault(){return{rep:0,ef:2.5,interval:0,due:0,last:0}}
function srsGrade(prev,grade){const n=Object.assign(srsDefault(),prev||{});const r=Date.now();if(grade==="hard"){n.rep=0;n.interval=0;n.ef=Math.max(1.3,n.ef-.2)}else{const q=grade==="easy"?5:4;n.ef=Math.max(1.3,n.ef+(0.1-(5-q)*(0.08+(5-q)*0.02)));n.rep++;if(n.rep===1)n.interval=grade==="easy"?3:1;else if(n.rep===2)n.interval=grade==="easy"?7:4;else n.interval=Math.round(n.interval*n.ef*(grade==="easy"?1.3:1))}n.last=r;n.due=r+n.interval*DAY;return n}
function esc(s){return String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
function cleanText(t){return String(t||"").replace(/\s+/g," ").trim()}
function normalizeTR(t){return cleanText(t).toLocaleLowerCase("tr-TR").replace(/[’']/g," ").replace(/[^a-zA-ZçğıöşüÇĞİÖŞÜ0-9\s]/g," ").replace(/\s+/g," ").trim()}
function wordsTR(t){return normalizeTR(t).split(/\s+/).filter(Boolean)}
function similarity(a,b){const A=wordsTR(a),B=wordsTR(b);if(!A.length||!B.length)return 0;const m=A.length,n=B.length;const dp=Array.from({length:m+1},()=>new Int16Array(n+1));for(let i=m-1;i>=0;i--)for(let j=n-1;j>=0;j--)dp[i][j]=A[i]===B[j]?dp[i+1][j+1]+1:Math.max(dp[i+1][j],dp[i][j+1]);const lcs=dp[0][0];return Math.round((lcs/Math.max(n,1))*100)}
async function fetchFirst(paths){for(const p of paths){try{const r=await fetch(p);if(r.ok)return await r.json()}catch{}}throw new Error("data/sentences.json bulunamadı")}
async function loadData(){const sentences=await fetchFirst(DATA_PATHS);State.sentences=sentences;State.byModule=new Map();State.byLevel=new Map();for(const s of sentences){if(!State.byModule.has(s.module))State.byModule.set(s.module,[]);State.byModule.get(s.module).push(s)}for(const [mod,arr] of State.byModule){arr.sort((a,b)=>(a.order||0)-(b.order||0));const lv=arr[0]?.level||"A1";if(!State.byLevel.has(lv))State.byLevel.set(lv,[]);State.byLevel.get(lv).push(mod)}State.srs=await srsAll()}
function posKey(mod){return POS_PREFIX+mod}async function savePos(){if(!State.activeModule)return;await kvSet(posKey(State.activeModule),JSON.stringify({idx:State.idx,total:State.queue.length,at:Date.now()}))}async function loadPos(mod){try{return JSON.parse(await kvGet(posKey(mod))||"null")}catch{return null}}async function clearPos(mod){await kvDel(posKey(mod))}
function moduleProgress(mod){const arr=State.byModule.get(mod)||[];let learned=0;for(const s of arr){const r=State.srs[s.id];if(r&&r.rep>0)learned++}return{learned,total:arr.length,pct:arr.length?Math.round(learned/arr.length*100):0}}
function renderLoading(){root.innerHTML=`<div class="state"><div class="spinner"></div><p>Video practice hazırlanıyor…</p></div>`}
function renderError(msg){root.innerHTML=`<div class="state"><h2>Veri yüklenemedi</h2><p>${esc(msg)}</p><button class="btn primary" onclick="location.reload()">Yeniden dene</button></div>`}
async function renderPicker(){State.srs=await srsAll();const levels=LEVEL_ORDER.filter(l=>State.byLevel.has(l));let html=`<div class="picker"><div class="picker-top"><a href="./index.html" class="home-link">← Ana uygulama</a><button class="btn api-mini" id="apiBtn">🔑 Pexels API</button></div><div class="pick-intro"><h1>Video Practice</h1><p>Bu ekranda kelime sıralama yok. Video otomatik gelir; ortada İngilizce cümle görünür. Sen <b>Türkçe çeviriyi</b> mikrofona okuyorsun, sistem <b>SentenceTR</b> ile karşılaştırıyor.</p></div>`;for(const lv of levels){const mods=State.byLevel.get(lv);html+=`<div class="lv-group"><div class="lv-head"><span class="lv-badge">${esc(lv)}</span><span>${mods.length} modül</span></div><div class="mod-grid">`;for(const mod of mods){const p=moduleProgress(mod);const name=mod.replace(/^[A-C]\d-M\d+\s*/,"");const pos=await loadPos(mod);html+=`<button class="mod-tile" data-mod="${esc(mod)}"><span class="mod-name">${esc(name)}</span><span class="mod-count">${p.total} cümle${pos?` · ${pos.idx+1}. cümlede kaldın`:""}</span><span class="mod-prog"><span style="width:${p.pct}%"></span></span></button>`}html+=`</div></div>`}html+=`</div>`;root.innerHTML=html;document.getElementById("apiBtn").onclick=()=>openApiSheet(false);root.querySelectorAll(".mod-tile").forEach(b=>b.onclick=async()=>{const mod=b.dataset.mod;const pos=await loadPos(mod);startModule(mod,pos?.idx||0)})}
async function startModule(mod,idx){State.srs=await srsAll();const arr=(State.byModule.get(mod)||[]).slice();const now=Date.now();function bucket(s){const r=State.srs[s.id];if(!r||!r.rep)return 1;if((r.due||0)<=now)return 0;return 2}arr.sort((a,b)=>{const ba=bucket(a),bb=bucket(b);if(ba!==bb)return ba-bb;if(ba===0)return(State.srs[a.id].due||0)-(State.srs[b.id].due||0);if(ba===1)return(a.order||0)-(b.order||0);return(State.srs[a.id].due||0)-(State.srs[b.id].due||0)});State.queue=arr;State.idx=Math.min(Math.max(0,idx||0),Math.max(0,arr.length-1));State.activeModule=mod;State.sessionTitle=mod.replace(/^[A-C]\d-M\d+\s*/,"");renderVideoCard()}
function currentSentence(){return State.queue[State.idx]}
function renderVideoCard(){if(State.idx>=State.queue.length)return renderDone();const s=currentSentence();State.showTR=false;State.currentVideoPayload=null;const pct=Math.round(State.idx/State.queue.length*100);const name=(s.module||"").replace(/^[A-C]\d-M\d+\s*/,"");root.innerHTML=`<div class="video-page"><div class="video-bg"><video id="mainVideo" muted playsinline loop></video></div><div class="video-loading" id="videoLoading"><div class="spinner"></div><div>Video aranıyor…</div></div><button class="api-float" id="apiFloat">🔑 API</button><button class="next-float" id="nextBtn">Sıradaki →</button><div class="vp-top"><button class="back" id="backBtn">←</button><div class="vp-title"><h1>${esc(State.sessionTitle)}</h1><p>${esc(name)} · ${esc(s.topic||"")} · ${esc(s.level||"")}</p></div><div class="queue-pill"><b>${State.idx+1}</b>/${State.queue.length}</div></div><div class="subtitle-wrap"><div class="en-subtitle" id="enSubtitle">${esc(s.en)}</div></div><div class="tr-panel hidden" id="trPanel"><div class="tr-label">Türkçesi / SentenceTR</div><div class="tr-text">${esc(s.tr)}</div></div><div class="feedback hidden" id="feedback"></div><div class="video-status hidden" id="videoStatus"></div><div class="fallback-input hidden" id="fallbackInput"><input id="typedTR" placeholder="Mikrofon yoksa Türkçe cümleyi buraya yaz"/><button id="typedCheck">Kontrol</button></div><div class="controls"><button class="ctrl" id="replayBtn"><span class="ctrl-ico">↻</span><span>Tekrar oynat</span></button><div><button class="mic-main" id="micBtn">🎙️</button><div class="mic-caption" id="micCaption">Tıkla ve Türkçeyi oku</div></div><button class="ctrl" id="translateBtn"><span class="ctrl-ico">🌐</span><span>Tercüme Et</span></button></div><div class="small-note" id="smallNote">Arama: speaking video : ${esc(s.en)}</div></div>`;document.getElementById("backBtn").onclick=()=>renderPicker();document.getElementById("apiFloat").onclick=()=>openApiSheet(false);document.getElementById("nextBtn").onclick=nextCard;document.getElementById("replayBtn").onclick=()=>replayCurrent(true);document.getElementById("translateBtn").onclick=toggleTranslation;document.getElementById("micBtn").onclick=startTurkishCheck;document.getElementById("typedCheck").onclick=()=>checkTurkish(document.getElementById("typedTR").value,"typed");if(!STT)document.getElementById("fallbackInput").classList.remove("hidden");autoLoadVideo(s);setTimeout(()=>speakEnglish(s.en),800)}
async function nextCard(){await savePos();State.idx++;if(State.idx>=State.queue.length){if(State.activeModule)await clearPos(State.activeModule);renderDone()}else{await savePos();renderVideoCard()}}
function renderDone(){root.innerHTML=`<div class="state"><div style="font-size:56px">✅</div><h2>Video oturumu tamam</h2><p>${State.queue.length} cümleyi video ile çalıştın.</p><button class="btn primary" id="homeBtn">Ana sayfa</button></div>`;document.getElementById("homeBtn").onclick=renderPicker}
function showStatus(msg){const el=document.getElementById("videoStatus");if(!el)return;el.textContent=msg||"";el.classList.toggle("hidden",!msg)}
function setLoading(on,msg){const el=document.getElementById("videoLoading");if(!el)return;el.classList.toggle("hidden",!on);if(msg)el.querySelector("div:last-child").textContent=msg}
function videoKey(s){return VIDEO_PREFIX+(s.id||hash(s.en||s.tr))}
function buildQuery(s){return "speaking video : "+cleanText(s.en)}
async function autoLoadVideo(s){const saved=await kvGet(videoKey(s));if(saved){try{const p=JSON.parse(saved);if(p&&p.videoUrl){applyVideo(p,false);return}}catch{}}const direct=s.VideoURL||s.video_url||s.videoUrl||s.video||"";if(direct){applyVideo({videoUrl:direct,posterUrl:s.VideoPoster||s.video_poster||"",sentence:s.en,query:buildQuery(s)},false);return}const key=await kvGet(API_KEY);if(!key){setLoading(false);showStatus("Pexels API key yok. API düğmesine basıp bir defa kaydet; sonra video otomatik gelecek.");openApiSheet(true);return}await searchPexelsAndUse(s,key)}
async function searchPexelsAndUse(s,key){setLoading(true,"Video aranıyor…");showStatus("Aranıyor: "+buildQuery(s));const url=new URL("https://api.pexels.com/videos/search");url.searchParams.set("query",buildQuery(s));url.searchParams.set("per_page","8");url.searchParams.set("orientation","landscape");try{const res=await fetch(url.toString(),{headers:{Authorization:key}});if(!res.ok){if(res.status===401)throw new Error("API key hatalı.");if(res.status===429)throw new Error("Pexels limit doldu.");throw new Error("Pexels API hatası: "+res.status)}const data=await res.json();const videos=Array.isArray(data.videos)?data.videos:[];if(!videos.length){setLoading(false);showStatus("Video bulunamadı: "+buildQuery(s));return}const first=videos[0];const file=pickVideo(first);if(!file||!file.link){setLoading(false);showStatus("İlk videoda MP4 linki yok.");return}const payload={source:"pexels",id:first.id||"",pageUrl:first.url||"",videoUrl:file.link,posterUrl:first.image||"",query:buildQuery(s),sentence:s.en,savedAt:new Date().toISOString()};await kvSet(videoKey(s),JSON.stringify(payload));applyVideo(payload,true)}catch(e){setLoading(false);showStatus("Video hatası: "+e.message)}}
function pickVideo(video){const files=Array.isArray(video.video_files)?video.video_files:[];const mp4s=files.filter(f=>f.file_type==="video/mp4"&&f.link).sort((a,b)=>Math.abs(1280-(a.width||0))-Math.abs(1280-(b.width||0)));return mp4s[0]||files.find(f=>f.link)||null}
function applyVideo(payload,autoSpoken){State.currentVideoPayload=payload;const v=document.getElementById("mainVideo");if(!v)return;v.src=payload.videoUrl;if(payload.posterUrl)v.poster=payload.posterUrl;v.muted=true;v.volume=0;v.loop=true;v.playsInline=true;v.load();v.play().catch(()=>{});setLoading(false);showStatus("");if(autoSpoken)setTimeout(()=>speakEnglish(payload.sentence),550)}
function replayCurrent(withSpeech){const v=document.getElementById("mainVideo");if(v&&v.src){try{v.currentTime=0;v.play().catch(()=>{})}catch{}}if(withSpeech)speakEnglish(currentSentence().en)}
function toggleTranslation(){State.showTR=!State.showTR;const p=document.getElementById("trPanel");if(p)p.classList.toggle("hidden",!State.showTR);if(State.showTR)try{p.animate([{transform:"translateX(-50%) translateY(10px)",opacity:.2},{transform:"translateX(-50%)",opacity:1}],{duration:180})}catch{}}
function speakEnglish(text){try{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang="en-US";u.rate=.92;u.pitch=1;u.volume=1;const voice=pickVoice("en");if(voice)u.voice=voice;speechSynthesis.speak(u)}catch{}}
function speakTurkish(text){try{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang="tr-TR";u.rate=.95;u.volume=1;const voice=pickVoice("tr");if(voice)u.voice=voice;speechSynthesis.speak(u)}catch{}}
function pickVoice(lang){const voices=speechSynthesis.getVoices()||[];if(lang==="tr")return voices.find(v=>/^tr/i.test(v.lang))||null;return voices.find(v=>/^en-US/i.test(v.lang)&&/Google|Jenny|Aria|Zira|Samantha|Natural/i.test(v.name))||voices.find(v=>/^en/i.test(v.lang))||null}
function startTurkishCheck(){const s=currentSentence();if(!State.showTR)toggleTranslation();speakTurkish(s.tr);if(!STT){showFeedback("Mikrofon desteklenmiyor",`Tarayıcı ses tanımayı desteklemiyor. Alttaki kutuya Türkçe cümleyi yazıp kontrol edebilirsin.`,0,false);document.getElementById("fallbackInput").classList.remove("hidden");return}if(State.listening)return;let rec;try{rec=new STT()}catch{return}rec.lang="tr-TR";rec.interimResults=false;rec.maxAlternatives=1;const mic=document.getElementById("micBtn"),cap=document.getElementById("micCaption");rec.onstart=()=>{State.listening=true;mic.classList.add("listening");mic.textContent="●";cap.textContent="Dinleniyor… Türkçeyi oku";showStatus("SentenceTR okunuyor, seni dinliyorum…")};rec.onresult=e=>{const heard=e.results[0][0].transcript||"";checkTurkish(heard,"voice")};rec.onerror=()=>{showStatus("Mikrofon hatası. İzinleri kontrol et veya yazı kutusunu kullan.");document.getElementById("fallbackInput").classList.remove("hidden")};rec.onend=()=>{State.listening=false;mic.classList.remove("listening");mic.textContent="🎙️";cap.textContent="Tıkla ve Türkçeyi oku"};try{rec.start()}catch{}}
async function checkTurkish(heard,mode){const s=currentSentence();heard=cleanText(heard);if(!heard){showFeedback("Cümle alınamadı","Ses veya yazı algılanamadı.",0,false);return}const score=similarity(heard,s.tr);let grade="hard";if(score>=92)grade="easy";else if(score>=72)grade="good";const next=srsGrade(await srsGet(s.id),grade);await srsSet(s.id,next);State.srs[s.id]=next;showFeedback(score>=72?"Güzel okudun":"Tekrar deneyelim",`<div class="fb-line"><b>Senin okuduğun:</b> ${esc(heard)}</div><div class="fb-line"><b>SentenceTR:</b> ${esc(s.tr)}</div>`,score,score>=72)}
function showFeedback(title,html,score,ok){const fb=document.getElementById("feedback");if(!fb)return;fb.className="feedback "+(ok?"ok":"bad");fb.innerHTML=`<div class="fb-title">${ok?"✅":"🎯"} ${esc(title)} <span class="score">${score||0}%</span></div>${html}<div class="fb-line" style="margin-top:8px">İstersen tekrar mikrofonla oku veya <b>Sıradaki</b> cümleye geç.</div>`;fb.classList.remove("hidden");setTimeout(()=>fb.classList.add("hidden"),ok?7000:9000)}
function openApiSheet(force){const old=document.getElementById("apiSheet");if(old)old.remove();const sheet=document.createElement("div");sheet.className="api-sheet";sheet.id="apiSheet";sheet.innerHTML=`<div class="api-card"><h2>Pexels API Key</h2><p>Video otomatik gelsin diye Pexels API anahtarını bir defa kaydet. Anahtar IndexedDB'de tutulur; HTML içine yazılmaz.</p><input id="apiInput" type="password" placeholder="Pexels API anahtarını yaz"/><div class="api-actions"><button class="btn primary" id="apiSave">Kaydet ve videoyu getir</button><button class="btn" id="apiClose">Kapat</button><button class="btn red" id="apiDelete">Sil</button></div><p id="apiMsg" style="min-height:20px;font-weight:800;color:#2563eb"></p></div>`;document.body.appendChild(sheet);kvGet(API_KEY).then(k=>{if(k)document.getElementById("apiInput").value=k});document.getElementById("apiClose").onclick=()=>{if(!force)sheet.remove();else sheet.remove()};document.getElementById("apiDelete").onclick=async()=>{await kvDel(API_KEY);document.getElementById("apiInput").value="";document.getElementById("apiMsg").textContent="API key silindi."};document.getElementById("apiSave").onclick=async()=>{const key=document.getElementById("apiInput").value.trim();if(!key){document.getElementById("apiMsg").textContent="API key boş.";return}await kvSet(API_KEY,key);document.getElementById("apiMsg").textContent="Kaydedildi.";sheet.remove();if(currentSentence())autoLoadVideo(currentSentence())};sheet.onclick=e=>{if(e.target===sheet&&!force)sheet.remove()}}
function hash(str){let h=0;str=String(str||"");for(let i=0;i<str.length;i++){h=((h<<5)-h)+str.charCodeAt(i);h|=0}return Math.abs(h).toString(36)}
async function boot(){renderLoading();try{await loadData();renderPicker()}catch(e){renderError(e.message||String(e))}}
if(speechSynthesis)speechSynthesis.onvoiceschanged=()=>{};
boot();
})();
</script>
