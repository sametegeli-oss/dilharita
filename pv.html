<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akın Dil YDS Phrasal Verbs Kartları</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f1f5f9;
            --text-muted: #94a3b8;
            --accent-color: #38bdf8;
            --accent-hover: #0284c7;
            --border-color: #334155;
            --success-color: #4ade80;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header {
            text-align: center;
        }

        h1 {
            color: var(--accent-color);
            margin: 0 0 5px 0;
            font-size: 1.6rem;
        }

        h2 {
            color: var(--text-muted);
            margin: 0 0 15px 0;
            font-size: 1rem;
            font-weight: 400;
        }

        .search-box {
            width: 100%;
            padding: 12px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            min-height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .phrasal-verb {
            font-size: 2.2rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 15px;
        }

        .meaning {
            font-size: 1.3rem;
            color: var(--accent-color);
            font-weight: 600;
            margin-bottom: 15px;
        }

        .example {
            font-style: italic;
            color: var(--success-color);
            margin-bottom: 8px;
            font-size: 1.1rem;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 10px;
            width: 100%;
        }

        button {
            background-color: var(--accent-color);
            color: #0f172a;
            border: none;
            padding: 12px 15px;
            font-size: 0.95rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.2s;
        }

        button:hover {
            background-color: var(--accent-hover);
            color: white;
        }

        button.secondary {
            background-color: #1e293b;
            color: var(--text-color);
            border: 1px solid var(--border-color);
        }

        button.secondary:hover {
            background-color: #334155;
        }

        .progress {
            text-align: center;
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .list-section {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            margin-top: 10px;
        }

        summary {
            cursor: pointer;
            color: var(--accent-color);
            font-weight: 600;
            padding: 5px;
            user-select: none;
        }

        .pv-table-wrapper {
            max-height: 400px;
            overflow-y: auto;
            margin-top: 10px;
            border-top: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.9rem;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            color: var(--text-muted);
            font-weight: 600;
            position: sticky;
            top: 0;
            background-color: var(--card-bg);
        }

        tr.clickable-row {
            cursor: pointer;
            transition: background-color 0.1s;
        }

        tr.clickable-row:hover {
            background-color: #334155;
        }

        tr.active-row {
            background-color: #1e3a8a;
        }
    </style>
</head>

<div class="container">
    <header>
        <h1>Phrasal Verbs Öğrenme İstasyonu</h1>
        <h2>Akın Dil Eğitim Merkezi Referans Listesi</h2>
        <div class="progress" id="progressText">0 / 0</div>
    </header>

    <input type="text" class="search-box" id="searchBox" placeholder="Kelime veya anlam ara..." oninput="searchWord()">

        <div class="example" id="exampleText" style="display: none;">Example sentence.</div>

            <div class="pv-table-wrapper">

                            <th>Anlamı</th>
                        </tr>
                    </thead>
                    <tbody id="pvTableBody">
                    </tbody>
                </table>
            </div>
        </details>
    </div>
</div>

    let dataItems = [];
    let currentPool = [];
    let currentIndex = 0;
    let isRevealed = false;

    function parseTSV(tsvText) {
        const lines = tsvText.trim().split('\n');
        const result = [];
        lines.forEach(line => {
            if (line.trim() === '') return;
            const columns = line.split('\t');
            if (columns.length >= 2) {
                result.push({
                    phrasalVerb: columns[0] ? columns[0].trim() : '',
                    meaning: columns[1] ? columns[1].trim() : '',
                    example: columns[2] ? columns[2].trim() : ''
                });
            }
        });
        return result;
    }

    function initApp(tsvData) {
        dataItems = parseTSV(tsvData);
        currentPool = [...dataItems];
        currentIndex = 0;
        
        document.getElementById('totalCountText').innerText = dataItems.length;
        
        buildTable(currentPool);
        showCard();
    }

    function showCard() {
        if (currentPool.length === 0) {
            document.getElementById('pvText').innerText = "Sonuç Bulunamadı";
            document.getElementById('meaningText').innerText = "";
            document.getElementById('exampleText').innerText = "";
            document.getElementById('progressText').innerText = "0 / 0";
            return;
        }
        
        const item = currentPool[currentIndex];
        document.getElementById('pvText').innerText = item.phrasalVerb;
        document.getElementById('meaningText').innerText = item.meaning;
        document.getElementById('exampleText').innerText = item.example || '';

        isRevealed = false;
        document.getElementById('meaningText').style.display = 'none';
        document.getElementById('exampleText').style.display = 'none';

        document.getElementById('progressText').innerText = `${currentIndex + 1} / ${currentPool.length}`;
        updateActiveRow();
    }

    function toggleReveal() {
        if (currentPool.length === 0) return;
        isRevealed = !isRevealed;
        const displayMode = isRevealed ? 'block' : 'none';
        
        document.getElementById('meaningText').style.display = displayMode;
        if (currentPool[currentIndex].example) document.getElementById('exampleText').style.display = displayMode;
    }

    function nextCard() {
        if (currentPool.length === 0) return;
        currentIndex++;
        if (currentIndex >= currentPool.length) {
            currentIndex = 0;
        }
        showCard();
    }

    function prevCard() {
        if (currentPool.length === 0) return;
        currentIndex--;
        if (currentIndex < 0) {
            currentPool.length - 1;
            currentIndex = currentPool.length - 1;
        }
        showCard();
    }

    function selectWord(index) {
        currentIndex = index;
        showCard();
        document.getElementById('flashcard').scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function buildTable(list) {
        const tbody = document.getElementById('pvTableBody');
        tbody.innerHTML = '';
        
        list.forEach((item, index) => {
            const tr = document.createElement('tr');
            tr.className = 'clickable-row';
            tr.id = `row-${index}`;
            tr.onclick = () => selectWord(index);
            
            tr.innerHTML = `
                <td style="font-weight:bold; color:#fff;">${item.phrasalVerb}</td>
                <td>${item.meaning}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function updateActiveRow() {
        document.querySelectorAll('.clickable-row').forEach(row => row.classList.remove('active-row'));
        const activeRow = document.getElementById(`row-${currentIndex}`);
        if (activeRow) {
            activeRow.classList.add('active-row');
        }
    }

    function searchWord() {
        const query = document.getElementById('searchBox').value.toLowerCase().trim();
        if (query === "") {
            currentPool = [...dataItems];
        } else {
            currentPool = dataItems.filter(item => 
                item.phrasalVerb.toLowerCase().includes(query) || 
                item.meaning.toLowerCase().includes(query)
            );
        }
        currentIndex = 0;
        buildTable(currentPool);
        showCard();
    }

    window.onload = function() {
        initApp(masterTSV);
    };
</script>
