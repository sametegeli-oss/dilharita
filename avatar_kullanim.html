<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>DilAvatar Kullanım Örneği</title>
  <style>
    body{margin:0;min-height:100vh;background:#020617;color:#e5e7eb;font-family:system-ui;display:grid;place-items:center}
    .card{width:min(92vw,360px);background:#0b1120;border:1px solid rgba(148,163,184,.25);border-radius:22px;padding:20px;text-align:center}
    button{border:0;border-radius:16px;background:#2563eb;color:white;font-weight:900;padding:12px 16px;margin:6px;cursor:pointer}
  </style>
</head>
<body>
  <div class="card">
    <div id="avatarHost"></div>
    <button onclick="DilAvatar.speakText('Merhaba, bugün İngilizce çalışıyoruz.', 3200)">Konuş</button>
    <button onclick="DilAvatar.fixHair(true)">Saç düzelt</button>
  </div>

  <script src="./avatar.js"></script>
  <script>
    DilAvatar.mount("avatarHost", { size: 300 });
  </script>
</body>
</html>
