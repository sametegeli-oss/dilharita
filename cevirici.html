<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phrasal Verbs Türkçe Çevirici</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; padding: 2rem; }
  .container { max-width: 800px; margin: 0 auto; }
  h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; }
  .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 2rem; }
  .card { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; border: 1px solid #e5e5e5; }
  .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; color: #333; }
  .upload-area { border: 2px dashed #ccc; border-radius: 8px; padding: 2rem; text-align: center; cursor: pointer; transition: all 0.2s; }
  .upload-area:hover { border-color: #888; background: #fafafa; }
  .upload-area.dragover { border-color: #4a9eff; background: #f0f7ff; }
  .upload-area p { color: #666; font-size: 0.9rem; margin-top: 0.5rem; }
  input[type="file"] { display: none; }
  .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.6rem 1.2rem; border-radius: 8px; border: 1px solid #d0d0d0; background: white; cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: all 0.15s; }
  .btn:hover { background: #f5f5f5; }
  .btn-primary { background: #1a1a1a; color: white; border-color: #1a1a1a; }
  .btn-primary:hover { background: #333; }
  .btn-primary:disabled { background: #999; border-color: #999; cursor: not-allowed; }
  .btn-success { background: #16a34a; color: white; border-color: #16a34a; }
  .btn-success:hover { background: #15803d; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
  .stat { background: #f9f9f7; border-radius: 8px; padding: 1rem; text-align: center; border: 1px solid #eee; }
  .stat-value { font-size: 1.8rem; font-weight: 700; color: #1a1a1a; }
  .stat-label { font-size: 0.8rem; color: #888; margin-top: 0.25rem; }
  .progress-wrap { margin: 1rem 0; }
  .progress-bar { height: 8px; background: #eee; border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: #16a34a; transition: width 0.3s; border-radius: 4px; }
  .progress-text { font-size: 0.85rem; color: #666; margin-top: 0.5rem; }
  .log { background: #f5f5f0; border-radius: 8px; padding: 1rem; max-height: 200px; overflow-y: auto; font-family: monospace; font-size: 0.8rem; }
  .log-line { padding: 2px 0; color: #444; }
  .log-line.ok { color: #16a34a; }
  .log-line.err { color: #dc2626; }
  .preview { margin-top: 1rem; }
  .preview-item { border: 1px solid #eee; border-radius: 8px; padding: 1rem; margin-bottom: 0.75rem; }
  .preview-pv { font-weight: 600; font-size: 1rem; color: #1a1a1a; }
  .preview-tr { color: #4a9eff; font-size: 0.9rem; margin-top: 0.25rem; }
  .preview-meanings { margin-top: 0.5rem; }
  .preview-meaning { font-size: 0.85rem; padding: 0.25rem 0; border-bottom: 1px solid #f5f5f5; }
  .preview-meaning:last-child { border: none; }
  .en { color: #888; }
  .tr { color: #16a34a; margin-top: 0.1rem; }
  .actions { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 1rem; }
  #statusMsg { padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.9rem; margin-top: 1rem; display: none; }
  #statusMsg.info { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; display: block; }
  #statusMsg.success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; display: block; }
  #statusMsg.error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; display: block; }
</style>
</head>
<body>
<div class="container">
  <h1>Phrasal Verbs Türkçe Çevirici</h1>
  <p class="subtitle">JSON dosyanızı yükleyin — meanings ve examples alanları Claude API ile Türkçeye çevrilir.</p>

  <div class="card" id="uploadCard">
    <h2>📂 JSON Dosyası Yükle</h2>
    <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <div style="font-size:2.5rem;">⬆️</div>
      <strong>phrasal-verbs.json dosyasını seçin</strong>
      <p>veya buraya sürükleyip bırakın</p>
    </div>
    <input type="file" id="fileInput" accept=".json">
    <div id="statusMsg"></div>
  </div>

  <div class="card" id="controlCard" style="display:none">
    <h2>📊 Durum</h2>
    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="statTotal">0</div>
        <div class="stat-label">Toplam kayıt</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statDone" style="color:#16a34a">0</div>
        <div class="stat-label">Çevrilen</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statErr" style="color:#dc2626">0</div>
        <div class="stat-label">Hata</div>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-text" id="progressText">Hazır</div>
    </div>
    <div class="log" id="logBox"></div>
    <div class="actions">
      <button class="btn btn-primary" id="startBtn" onclick="startTranslation()">▶ Çeviriyi Başlat</button>
      <button class="btn btn-success" id="downloadBtn" onclick="downloadResult()" style="display:none">⬇ Sonucu İndir</button>
    </div>
  </div>

  <div class="card" id="previewCard" style="display:none">
    <h2>👁 Önizleme (ilk 3 kayıt)</h2>
    <div class="preview" id="previewContent"></div>
  </div>
</div>

<script>
let allData = [];
let processedData = [];
let isRunning = false;
let doneCount = 0;
let errCount = 0;

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('dragover');
  const f = e.dataTransfer.files[0];
  if (f) handleFile(f);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

function handleFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      allData = JSON.parse(e.target.result);
      processedData = JSON.parse(JSON.stringify(allData));
      showStatus(`✓ ${allData.length} kayıt yüklendi: ${file.name}`, 'success');
      document.getElementById('controlCard').style.display = 'block';
      document.getElementById('statTotal').textContent = allData.length.toLocaleString();
      updateProgress(0);
      log(`Dosya yüklendi: ${file.name} — ${allData.length} phrasal verb`, 'ok');
    } catch(err) {
      showStatus('❌ Geçersiz JSON dosyası: ' + err.message, 'error');
    }
  };
  reader.readAsText(file, 'utf-8');
}

function showStatus(msg, type) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = type;
}

function log(msg, cls='') {
  const box = document.getElementById('logBox');
  const line = document.createElement('div');
  line.className = 'log-line ' + cls;
  line.textContent = new Date().toLocaleTimeString('tr') + ' — ' + msg;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}

function updateProgress(done) {
  const total = allData.length;
  const pct = total > 0 ? Math.round(100 * done / total) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done} / ${total} kayıt işlendi (%${pct})`;
  document.getElementById('statDone').textContent = doneCount.toLocaleString();
  document.getElementById('statErr').textContent = errCount;
}

async function callClaude(items) {
  const prompt = `Aşağıdaki İngilizce phrasal verb verilerini Türkçeye çevir.
Her madde için şunları döndür:
- "idx": verilen indeks (değiştirme)
- "pv_tr": phrasal verb kısa Türkçe karşılığı
- "meanings_tr": meanings listesinin Türkçe çevirisi (aynı sıra, aynı eleman sayısı)
- "examples_tr": examples listesinin Türkçe çevirisi (aynı sıra, aynı eleman sayısı)

SADECE JSON array döndür, başka metin ekleme.

Veri:
${JSON.stringify(items, null, 0)}`;

  const resp = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 4000,
      messages: [{ role: "user", content: prompt }]
    })
  });

  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const data = await resp.json();
  let text = data.content[0].text.trim();
  if (text.startsWith("```")) { text = text.split("```")[1]; if (text.startsWith("json")) text = text.slice(4); }
  return JSON.parse(text.trim());
}

async function startTranslation() {
  if (isRunning) return;
  isRunning = true;
  doneCount = 0;
  errCount = 0;
  document.getElementById('startBtn').disabled = true;
  document.getElementById('downloadBtn').style.display = 'none';
  log('Çeviri başlatıldı...', 'ok');

  const BATCH = 8;
  for (let i = 0; i < allData.length; i += BATCH) {
    const slice = allData.slice(i, i + BATCH);
    const items = slice.map((item, j) => ({
      idx: i + j,
      pv: item.pv,
      meanings: item.meanings || [],
      examples: item.examples || []
    }));

    let attempt = 0;
    while (attempt < 3) {
      try {
        const results = await callClaude(items);
        for (const r of results) {
          if (r.idx != null) {
            if (r.pv_tr) processedData[r.idx].tr = r.pv_tr;
            if (r.meanings_tr) processedData[r.idx].meanings_tr = r.meanings_tr;
            if (r.examples_tr) processedData[r.idx].examples_tr = r.examples_tr;
          }
        }
        doneCount += slice.length;
        if ((i / BATCH) % 5 === 0) log(`${doneCount} kayıt çevrildi`, 'ok');
        break;
      } catch (err) {
        attempt++;
        if (attempt >= 3) {
          errCount += slice.length;
          log(`Hata (${i}-${i+BATCH}): ${err.message}`, 'err');
        } else {
          await new Promise(r => setTimeout(r, 2000 * attempt));
        }
      }
    }

    updateProgress(doneCount + errCount);

    // Her 50 kayıtta önizlemeyi güncelle
    if ((i / BATCH) % 6 === 0) showPreview();
    await new Promise(r => setTimeout(r, 400));
  }

  log(`✓ Tamamlandı! ${doneCount} çevrildi, ${errCount} hata.`, 'ok');
  showPreview();
  document.getElementById('downloadBtn').style.display = 'inline-flex';
  document.getElementById('startBtn').disabled = false;
  isRunning = false;
}

function showPreview() {
  const card = document.getElementById('previewCard');
  const content = document.getElementById('previewContent');
  card.style.display = 'block';

  const sample = processedData.slice(0, 3);
  content.innerHTML = sample.map(item => `
    <div class="preview-item">
      <div class="preview-pv">${item.pv} <span style="color:#888;font-weight:400;font-size:0.85rem">→</span> <span style="color:#4a9eff">${item.tr || '—'}</span></div>
      <div class="preview-meanings">
        ${(item.meanings || []).map((m, i) => `
          <div class="preview-meaning">
            <div class="en">🇬🇧 ${m}</div>
            <div class="tr">🇹🇷 ${(item.meanings_tr || [])[i] || '<em style="color:#ccc">çevirilmedi</em>'}</div>
          </div>
        `).join('')}
        ${(item.examples || []).map((ex, i) => `
          <div class="preview-meaning">
            <div class="en" style="font-style:italic">💬 ${ex}</div>
            <div class="tr">🇹🇷 ${(item.examples_tr || [])[i] || '<em style="color:#ccc">çevirilmedi</em>'}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function downloadResult() {
  const blob = new Blob([JSON.stringify(processedData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'phrasal-verbs-turkish.json';
  a.click();
  URL.revokeObjectURL(url);
  log('Dosya indirildi: phrasal-verbs-turkish.json', 'ok');
}
</script>
</body>
</html>
