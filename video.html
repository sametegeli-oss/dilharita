<!-- SAHNE VIDEO BULUCU - DOÄžRU SĂśRĂśM / IndexedDB KayÄ±tlÄ± -->
<script>
(function () {
  "use strict";

  /*
    Bu sĂĽrĂĽm:
    - API key'i localStorage yerine Ă¶ncelikle IndexedDB'ye kaydeder.
    - localStorage dolu olsa bile QuotaExceededError vermez.
    - Eski Sahne Videosu Bul panelini otomatik temizler.
    - Pexels API ile video arar.
    - SeĂ§ilen videoyu mevcut cĂĽmleye baÄźlar.
  */

  const DB_NAME = "scene_video_finder_db_v2";
  const DB_STORE = "kv";
  const API_KEY_KEY = "scene_video_finder_pexels_key_v2";
  const SELECTED_VIDEO_PREFIX = "scene_video_selected_v2_";

  /* Eski UI kalÄ±ntÄ±larÄ±nÄ± temizle */
  document.querySelectorAll(
    "#sceneVideoFab, #sceneVideoPanel, #sceneVideoFinderStyle, #autoSceneVideoWrap"
  ).forEach(el => el.remove());

  /* ---------- IndexedDB GĂĽvenli KayÄ±t Sistemi ---------- */

  function openDB() {
    return new Promise((resolve, reject) => {
      if (!window.indexedDB) {
        reject(new Error("IndexedDB desteklenmiyor."));
        return;
      }

      const req = indexedDB.open(DB_NAME, 1);

      req.onupgradeneeded = function () {
        const db = req.result;
        if (!db.objectStoreNames.contains(DB_STORE)) {
          db.createObjectStore(DB_STORE);
        }
      };

      req.onsuccess = function () {
        resolve(req.result);
      };

      req.onerror = function () {
        reject(req.error || new Error("IndexedDB aĂ§Ä±lamadÄ±."));
      };
    });
  }

  async function dbSet(key, value) {
    const val = String(value ?? "");

    try {
      const db = await openDB();

      await new Promise((resolve, reject) => {
        const tx = db.transaction(DB_STORE, "readwrite");
        tx.objectStore(DB_STORE).put(val, key);
        tx.oncomplete = resolve;
        tx.onerror = () => reject(tx.error || new Error("IndexedDB yazma hatasÄ±."));
      });

      db.close();
      return true;
    } catch (err) {
      console.warn("IndexedDB kayÄ±t hatasÄ±:", err);
    }

    /*
      localStorage sadece yedek olarak denenir.
      Doluysa hata bastÄ±rÄ±lÄ±r, program Ă§Ă¶kmez.
    */
    try {
      localStorage.setItem(key, val);
      return true;
    } catch (err) {
      console.warn("localStorage dolu veya kapalÄ±:", err);
      return false;
    }
  }

  async function dbGet(key) {
    try {
      const db = await openDB();

      const result = await new Promise((resolve, reject) => {
        const tx = db.transaction(DB_STORE, "readonly");
        const req = tx.objectStore(DB_STORE).get(key);

        req.onsuccess = () => resolve(req.result || "");
        req.onerror = () => reject(req.error || new Error("IndexedDB okuma hatasÄ±."));
      });

      db.close();

      if (result) return result;
    } catch (err) {
      console.warn("IndexedDB okuma hatasÄ±:", err);
    }

    try {
      return localStorage.getItem(key) || "";
    } catch (err) {
      console.warn("localStorage okunamadÄ±:", err);
      return "";
    }
  }

  async function dbDelete(key) {
    try {
      const db = await openDB();

      await new Promise((resolve, reject) => {
        const tx = db.transaction(DB_STORE, "readwrite");
        tx.objectStore(DB_STORE).delete(key);
        tx.oncomplete = resolve;
        tx.onerror = () => reject(tx.error || new Error("IndexedDB silme hatasÄ±."));
      });

      db.close();
    } catch (err) {
      console.warn("IndexedDB silme hatasÄ±:", err);
    }

    try {
      localStorage.removeItem(key);
    } catch (err) {
      console.warn("localStorage silinemedi:", err);
    }
  }

  /* ---------- CSS ---------- */

  const style = document.createElement("style");
  style.id = "sceneVideoFinderStyle";
  style.textContent = `
    #sceneVideoFab {
      position: fixed;
      right: 22px;
      bottom: 28px;
      z-index: 999999;
      border: none;
      border-radius: 999px;
      padding: 15px 22px;
      font-weight: 900;
      font-size: 15px;
      background: #020617;
      color: #fff;
      box-shadow: 0 14px 34px rgba(0,0,0,.30);

    }

    #sceneVideoFab:hover {
      transform: translateY(-1px);
    }

    #sceneVideoPanel {
      position: fixed;
      right: 22px;
      bottom: 92px;
      width: min(470px, calc(100vw - 32px));
      max-height: 82vh;
      overflow: auto;

      border-radius: 22px;

      z-index: 999999;
      display: none;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #111827;
    }

    #sceneVideoPanel.open {
      display: block;
    }

    .sv-head {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #fff;
      padding: 16px 18px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .sv-title {
      font-size: 18px;
      font-weight: 950;
      color: #111827;
    }

    .sv-close {
      border: none;
      border-radius: 12px;
      background: #f3f4f6;
      color: #111827;
      padding: 9px 13px;
      font-weight: 900;
      cursor: pointer;
    }

    .sv-body {
      padding: 16px 18px 18px;
    }

    .sv-warning {
      background: #fff7ed;
      color: #9a3412;
      border: 1px solid #fed7aa;
      border-radius: 14px;
      padding: 12px;
      font-size: 13px;
      line-height: 1.45;
      margin-bottom: 14px;
    }

    .sv-field {
      margin-bottom: 12px;
    }

    .sv-label {
      display: block;
      font-size: 13px;
      font-weight: 900;
      color: #374151;
      margin-bottom: 6px;
    }

    .sv-input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      padding: 12px 13px;
      font-size: 15px;
      outline: none;
      background: #fff;
    }

    .sv-input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }

    .sv-row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .sv-btn {
      border: none;
      border-radius: 14px;
      padding: 12px 14px;
      font-weight: 950;
      font-size: 14px;
      cursor: pointer;
    }

    .sv-btn.primary {
      background: #2563eb;
      color: #fff;
      flex: 1;
      min-width: 150px;
    }

    .sv-btn.secondary {
      background: #eef2ff;
      color: #1e3a8a;
    }

    .sv-btn.danger {
      background: #fee2e2;
      color: #991b1b;
    }

    .sv-status {
      min-height: 20px;
      margin: 13px 0;
      color: #4b5563;
      font-size: 13px;
      line-height: 1.45;
      font-weight: 650;
    }

    .sv-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .sv-card {
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      overflow: hidden;
      background: #f9fafb;
    }

    .sv-card video {
      width: 100%;
      height: 205px;
      object-fit: cover;
      display: block;
      background: #111;
    }

    .sv-card-inner {
      padding: 11px;
    }

    .sv-meta {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 9px;
      line-height: 1.35;
    }

    .sv-actions {
      display: flex;
      gap: 8px;
    }

    .sv-actions button {
      flex: 1;
      border: none;
      border-radius: 12px;
      padding: 10px;
      font-weight: 900;
      cursor: pointer;
    }

    .sv-use {
      background: #16a34a;
      color: #fff;
    }

    .sv-open {
      background: #e5e7eb;
      color: #111827;
    }

    #autoSceneVideoWrap {
      width: min(980px, calc(100vw - 24px));
      margin: 18px auto;
      border-radius: 24px;
      overflow: hidden;
      background: #111;
      box-shadow: 0 14px 42px rgba(0,0,0,.22);
    }

    #sceneMainVideo {
      display: block;
      width: 100%;
      max-height: 60vh;
      object-fit: cover;
      background: #111;
    }

    @media (max-width: 640px) {
      #sceneVideoFab {
        right: 12px;
        bottom: 18px;
        padding: 13px 16px;
        font-size: 13px;
      }

      #sceneVideoPanel {
        left: 10px;
        right: 10px;
        bottom: 78px;
        width: auto;
        max-height: 78vh;
        border-radius: 18px;
      }

      .sv-card video {
        height: 175px;
      }

      .sv-row {
        flex-direction: column;
      }

      .sv-btn.primary,
      .sv-btn.secondary,
      .sv-btn.danger {
        width: 100%;
      }
    }
  `;
  document.head.appendChild(style);

  /* ---------- HTML ---------- */

  const fab = document.createElement("button");
  fab.id = "sceneVideoFab";
  fab.type = "button";
  fab.textContent = "đźŽ¬ Sahne Videosu Bul";

  const panel = document.createElement("div");
  panel.id = "sceneVideoPanel";
  panel.setAttribute("aria-hidden", "true");

  panel.innerHTML = `
    <div class="sv-head">
      <div class="sv-title">Sahne Videosu Bul</div>
      <button class="sv-close" id="sceneVideoClose" type="button">Kapat</button>
    </div>

    <div class="sv-body">
      <div class="sv-warning">
        Pexels API anahtarÄ±nÄ± bir defa gir. Anahtar tarayÄ±cÄ±da IndexedDB'ye kaydedilir.
        localStorage dolu olsa bile kayÄ±t hatasÄ± vermez.
      </div>

      <div class="sv-field">
        <label class="sv-label" for="svApiKey">Pexels API Key</label>
        <input id="svApiKey" class="sv-input" type="password" placeholder="Pexels API anahtarÄ±nÄ± yaz">
      </div>

      <div class="sv-row">
        <button id="svSaveKey" class="sv-btn secondary" type="button">API Key Kaydet</button>
        <button id="svDeleteKey" class="sv-btn danger" type="button">API Key Sil</button>
      </div>

      <div class="sv-field" style="margin-top:14px;">
        <label class="sv-label" for="svQuery">Arama kelimesi</label>
        <input id="svQuery" class="sv-input" type="text" placeholder="Ă–rn: hospital conversations, office meeting, restaurant order">
      </div>

      <div class="sv-row">
        <button id="svAutoQuery" class="sv-btn secondary" type="button">CĂĽmleden Ăśret</button>
        <button id="svSearch" class="sv-btn primary" type="button">Video Ara</button>
      </div>

      <div id="svStatus" class="sv-status"></div>
      <div id="svResults" class="sv-grid"></div>
    </div>
  `;

  document.body.appendChild(panel);
  document.body.appendChild(fab);

  const closeBtn = document.getElementById("sceneVideoClose");
  const apiInput = document.getElementById("svApiKey");
  const saveKeyBtn = document.getElementById("svSaveKey");
  const deleteKeyBtn = document.getElementById("svDeleteKey");
  const queryInput = document.getElementById("svQuery");
  const autoQueryBtn = document.getElementById("svAutoQuery");
  const searchBtn = document.getElementById("svSearch");
  const statusEl = document.getElementById("svStatus");
  const resultsEl = document.getElementById("svResults");

  function setStatus(msg) {
    statusEl.textContent = msg || "";
  }

  /* ---------- BaĹźlangÄ±Ă§ta API Key oku ---------- */

  dbGet(API_KEY_KEY).then(value => {
    if (value) {
      apiInput.value = value;
      setStatus("KayÄ±tlÄ± API key yĂĽklendi.");
    }
  });

  /* ---------- Panel AĂ§/Kapat ---------- */

  fab.addEventListener("click", async () => {
    panel.classList.toggle("open");
    panel.setAttribute("aria-hidden", panel.classList.contains("open") ? "false" : "true");

    if (panel.classList.contains("open")) {
      const savedKey = await dbGet(API_KEY_KEY);
      if (savedKey && !apiInput.value.trim()) apiInput.value = savedKey;

      const q = buildQueryFromCurrentSentence();
      if (q && !queryInput.value.trim()) queryInput.value = q;
    }
  });

  closeBtn.addEventListener("click", () => {
    panel.classList.remove("open");
    panel.setAttribute("aria-hidden", "true");
  });

  /* ---------- API Key Kaydet/Sil ---------- */

  saveKeyBtn.addEventListener("click", async () => {
    const key = apiInput.value.trim();

    if (!key) {
      setStatus("API key boĹź. Ă–nce Pexels API key gir.");
      return;
    }

    const ok = await dbSet(API_KEY_KEY, key);

    if (ok) {
      setStatus("API key kaydedildi.");
    } else {
      setStatus("API key kalÄ±cÄ± kaydedilemedi. TarayÄ±cÄ± izinlerini kontrol et.");
    }
  });

  deleteKeyBtn.addEventListener("click", async () => {
    await dbDelete(API_KEY_KEY);
    apiInput.value = "";
    setStatus("API key silindi.");
  });

  apiInput.addEventListener("change", async () => {
    const key = apiInput.value.trim();
    if (key) {
      await dbSet(API_KEY_KEY, key);
      setStatus("API key kaydedildi.");
    }
  });

  /* ---------- Aktif CĂĽmleyi Bul ---------- */

  function getCurrentSentenceObject() {
    const candidates = [
      window.currentSentence,
      window.activeSentence,
      window.currentRow,
      window.activeRow,
      window.selectedSentence,
      window.currentItem,
      window.activeItem,
      window.currentCard,
      window.activeCard
    ];

    for (const item of candidates) {
      if (item && typeof item === "object") return item;
    }

    return null;
  }

  function readTextFromDom(selectors) {
    for (const sel of selectors) {
      const el = document.querySelector(sel);

      if (!el) continue;

      if (el.value && String(el.value).trim()) {
        return String(el.value).trim();
      }

      if (el.textContent && String(el.textContent).trim()) {
        return String(el.textContent).trim();
      }

      const dataValue =
        el.getAttribute("data-sentence-en") ||
        el.getAttribute("data-sentence-tr") ||
        el.getAttribute("data-scene") ||
        el.getAttribute("data-category");

      if (dataValue && dataValue.trim()) return dataValue.trim();
    }

    return "";
  }

  function getCurrentEnglishSentence() {
    const row = getCurrentSentenceObject();

    if (row) {
      return (
        row.video_query ||
        row.VideoQuery ||
        row.VIDEOQUERY ||
        row.sentence_en ||
        row.SentenceEN ||
        row.SENTENCEEN ||
        row.EnglishSentence ||
        row.english_sentence ||
        row.English ||
        row.english ||
        row.sentence ||
        row.Sentence ||
        ""
      );
    }

    return readTextFromDom([
      "#sentenceEn",
      "#currentSentenceEn",
      "#englishSentence",
      "#mainSentence",
      "#sentenceText",
      ".sentence-en",
      ".english-sentence",
      ".main-sentence",
      "[data-sentence-en]"
    ]);
  }

  function getCurrentTurkishSentence() {
    const row = getCurrentSentenceObject();

    if (row) {
      return (
        row.sentence_tr ||
        row.SentenceTR ||
        row.SENTENCETR ||
        row.TurkishSentence ||
        row.turkish_sentence ||
        row.Turkish ||
        row.turkish ||
        ""
      );
    }

    return readTextFromDom([
      "#sentenceTr",
      "#currentSentenceTr",
      "#turkishSentence",
      ".sentence-tr",
      ".turkish-sentence",
      "[data-sentence-tr]"
    ]);
  }

  function getCurrentScene() {
    const row = getCurrentSentenceObject();

    if (row) {
      return (
        row.scene ||
        row.Scene ||
        row.Sahne ||
        row.category ||
        row.Category ||
        row.Kategori ||
        row.topic ||
        row.Topic ||
        row.Konu ||
        row.context ||
        row.Context ||
        ""
      );
    }

    return readTextFromDom([
      "#sceneName",
      "#categoryName",
      "#topicName",
      ".scene-name",
      ".category-name",
      ".topic-name",
      "[data-scene]",
      "[data-category]"
    ]);
  }

  function buildQueryFromCurrentSentence() {
    const row = getCurrentSentenceObject();

    if (row) {
      const manualQuery =
        row.video_query ||
        row.VideoQuery ||
        row.VIDEOQUERY ||
        row.pexels_query ||
        row.PexelsQuery ||
        row.SearchQuery ||
        row.search_query ||
        "";

      if (manualQuery && String(manualQuery).trim()) {
        return String(manualQuery).trim();
      }
    }

    const en = getCurrentEnglishSentence();
    const tr = getCurrentTurkishSentence();
    const scene = getCurrentScene();

    const text = `${scene} ${en} ${tr}`.toLowerCase();

    const rules = [
      {
        test: /loss|condolence|sorry for your loss|funeral|grief|baĹźsaÄźlÄ±ÄźÄ±|vefat|kayÄ±p|Ă¶lĂĽm|cenaze/,
        query: "sad woman condolence sympathy grief"
      },
      {
        test: /hospital|doctor|patient|medicine|pain|clinic|hastane|doktor|hasta|ilaĂ§|aÄźrÄ±|klinik/,
        query: "doctor patient hospital conversation"
      },
      {
        test: /restaurant|menu|waiter|waitress|order food|restoran|garson|sipariĹź|menĂĽ|yemek/,
        query: "restaurant customer waiter ordering food"
      },
      {
        test: /airport|flight|passport|luggage|plane|uĂ§ak|havaalanÄ±|pasaport|valiz|bagaj/,
        query: "airport traveler passport luggage"
      },
      {
        test: /hotel|reservation|check in|check-in|reception|otel|rezervasyon|resepsiyon/,
        query: "hotel reception check in guest"
      },
      {
        test: /meeting|office|manager|presentation|business|toplantÄ±|ofis|mĂĽdĂĽr|sunum|iĹź/,
        query: "office meeting business conversation"
      },
      {
        test: /shopping|price|buy|store|expensive|alÄ±ĹźveriĹź|fiyat|satÄ±n|maÄźaza|pahalÄ±/,
        query: "shopping customer store conversation"
      },
      {
        test: /phone|call|message|telefon|arama|mesaj/,
        query: "person talking on phone conversation"
      },
      {
        test: /school|teacher|student|classroom|okul|Ă¶Äźretmen|Ă¶Äźrenci|sÄ±nÄ±f/,
        query: "teacher student classroom conversation"
      },
      {
        test: /apologize|apology|sorry|Ă¶zĂĽr/,
        query: "person apologizing conversation"
      },
      {
        test: /thank|thanks|appreciate|teĹźekkĂĽr/,
        query: "person saying thank you conversation"
      },
      {
        test: /family|mother|father|child|home|aile|anne|baba|Ă§ocuk|ev/,
        query: "family conversation at home"
      },
      {
        test: /job|interview|cv|resume|career|iĹź gĂ¶rĂĽĹźmesi|mĂĽlakat|kariyer/,
        query: "job interview office conversation"
      }
    ];

    for (const rule of rules) {
      if (rule.test.test(text)) return rule.query;
    }

    const cleaned = String(en || "")
      .replace(/[^\w\s']/g, " ")
      .replace(/\b(i|i'm|am|is|are|was|were|do|does|did|the|a|an|to|for|of|in|on|at|you|your|my|we|they|he|she|it|this|that|with|and|or|but|so)\b/gi, " ")
      .replace(/\s+/g, " ")
      .trim();

    if (scene && cleaned) return `${scene} ${cleaned} conversation`;
    if (cleaned) return `${cleaned} conversation`;
    if (scene) return `${scene} conversation`;

    return "english conversation real life";
  }

  autoQueryBtn.addEventListener("click", () => {
    queryInput.value = buildQueryFromCurrentSentence();
    setStatus("Arama kelimesi cĂĽmleden ĂĽretildi.");
  });

  /* ---------- Pexels Video Arama ---------- */

  searchBtn.addEventListener("click", async () => {
    let apiKey = apiInput.value.trim();

    if (!apiKey) {
      apiKey = await dbGet(API_KEY_KEY);
      if (apiKey) apiInput.value = apiKey;
    }

    const query = queryInput.value.trim() || buildQueryFromCurrentSentence();

    if (!apiKey) {
      setStatus("Pexels API key eksik. Ă–nce API key girip kaydet.");
      return;
    }

    if (!query) {
      setStatus("Arama kelimesi boĹź.");
      return;
    }

    queryInput.value = query;

    await dbSet(API_KEY_KEY, apiKey);
    await searchPexelsVideos(apiKey, query);
  });

  async function searchPexelsVideos(apiKey, query) {
    setStatus("Videolar aranÄ±yor...");
    resultsEl.innerHTML = "";

    const url = new URL("https://api.pexels.com/videos/search");
    url.searchParams.set("query", query);
    url.searchParams.set("per_page", "8");
    url.searchParams.set("orientation", "landscape");

    try {
      const res = await fetch(url.toString(), {
        method: "GET",
        headers: {
          "Authorization": apiKey
        }
      });

      if (!res.ok) {
        let errorText = "";
        try {
          errorText = await res.text();
        } catch (e) {}

        if (res.status === 401) {
          throw new Error("API key hatalÄ± veya geĂ§ersiz.");
        }

        if (res.status === 429) {
          throw new Error("Pexels istek limiti dolmuĹź.");
        }

        throw new Error("Pexels API hatasÄ±: " + res.status + " " + errorText);
      }

      const data = await res.json();
      const videos = Array.isArray(data.videos) ? data.videos : [];

      if (!videos.length) {
        setStatus("Uygun video bulunamadÄ±. Daha genel bir arama kelimesi dene.");
        return;
      }

      setStatus(videos.length + " video bulundu. BeÄźendiÄźini seĂ§ebilirsin.");
      renderVideos(videos);

    } catch (err) {
      console.error(err);
      setStatus("Video arama hatasÄ±: " + err.message);
    }
  }

  function pickBestVideoFile(video) {
    const files = Array.isArray(video.video_files) ? video.video_files : [];

    const mp4s = files
      .filter(f => f.file_type === "video/mp4" && f.link)
      .sort((a, b) => {
        const aw = a.width || 0;
        const bw = b.width || 0;
        return Math.abs(1280 - aw) - Math.abs(1280 - bw);
      });

    return mp4s[0] || files.find(f => f.link) || null;
  }

  function renderVideos(videos) {
    resultsEl.innerHTML = "";

    videos.forEach(video => {
      const file = pickBestVideoFile(video);
      if (!file || !file.link) return;

      const card = document.createElement("div");
      card.className = "sv-card";

      const vid = document.createElement("video");
      vid.src = file.link;
      vid.controls = true;
      vid.muted = true;
      vid.playsInline = true;
      vid.preload = "metadata";
      if (video.image) vid.poster = video.image;

      const inner = document.createElement("div");
      inner.className = "sv-card-inner";

      const meta = document.createElement("div");
      meta.className = "sv-meta";
      meta.textContent = `Pexels video #${video.id || ""} â€” ${file.width || video.width || ""}x${file.height || video.height || ""}`;

      const actions = document.createElement("div");
      actions.className = "sv-actions";

      const useBtn = document.createElement("button");
      useBtn.className = "sv-use";
      useBtn.type = "button";
      useBtn.textContent = "Bu Videoyu Kullan";
      useBtn.addEventListener("click", async () => {
        await useVideoForCurrentSentence({
          source: "pexels",
          id: video.id || "",
          pageUrl: video.url || "",
          videoUrl: file.link,
          posterUrl: video.image || "",
          width: file.width || video.width || "",
          height: file.height || video.height || "",
          query: queryInput.value.trim(),
          savedAt: new Date().toISOString()
        });
      });

      const openBtn = document.createElement("button");
      openBtn.className = "sv-open";
      openBtn.type = "button";
      openBtn.textContent = "KaynaÄźÄ± AĂ§";
      openBtn.addEventListener("click", () => {
        if (video.url) {
          window.open(video.url, "_blank", "noopener,noreferrer");
        }
      });

      actions.appendChild(useBtn);
      actions.appendChild(openBtn);

      inner.appendChild(meta);
      inner.appendChild(actions);

      card.appendChild(vid);
      card.appendChild(inner);

      resultsEl.appendChild(card);
    });
  }

  /* ---------- Video CĂĽmleye BaÄźlama ---------- */

  function getCurrentSentenceId() {
    const row = getCurrentSentenceObject();

    if (row) {
      const id =
        row.id ||
        row.ID ||
        row.sentence_id ||
        row.SentenceID ||
        row.No ||
        row.no ||
        row.Index ||
        row.index ||
        "";

      if (id) return String(id);
    }

    const el = document.querySelector("[data-sentence-id]");
    if (el) {
      const id = el.getAttribute("data-sentence-id");
      if (id) return String(id);
    }

    const en = getCurrentEnglishSentence();
    return en ? "sentence_" + simpleHash(en) : "unknown";
  }

  function simpleHash(str) {
    let h = 0;
    const s = String(str || "");

    for (let i = 0; i < s.length; i++) {
      h = ((h << 5) - h) + s.charCodeAt(i);
      h |= 0;
    }

    return Math.abs(h).toString(36);
  }

  async function useVideoForCurrentSentence(payload) {
    const sentenceId = getCurrentSentenceId();
    const key = SELECTED_VIDEO_PREFIX + sentenceId;

    await dbSet(key, JSON.stringify(payload));

    const row = getCurrentSentenceObject();

    if (row) {
      row.video_url = payload.videoUrl;
      row.videoUrl = payload.videoUrl;
      row.VideoURL = payload.videoUrl;
      row.video_source = payload.source;
      row.video_poster = payload.posterUrl;
      row.video_page_url = payload.pageUrl;
      row.video_query = payload.query;
    }

    applyVideoToScreen(payload.videoUrl, payload.posterUrl);

    if (typeof window.saveCurrentSentence === "function") {
      try {
        window.saveCurrentSentence(row);
      } catch (e) {
        console.warn("saveCurrentSentence hatasÄ±:", e);
      }
    }

    if (typeof window.persistCurrentData === "function") {
      try {
        window.persistCurrentData();
      } catch (e) {
        console.warn("persistCurrentData hatasÄ±:", e);
      }
    }

    if (typeof window.saveToIndexedDB === "function") {
      try {
        window.saveToIndexedDB();
      } catch (e) {
        console.warn("saveToIndexedDB hatasÄ±:", e);
      }
    }

    if (typeof window.renderCurrentSentence === "function") {
      try {
        window.renderCurrentSentence();
      } catch (e) {
        console.warn("renderCurrentSentence hatasÄ±:", e);
      }
    }

    setStatus("Video bu cĂĽmleye baÄźlandÄ± ve kaydedildi.");
  }

  function applyVideoToScreen(videoUrl, posterUrl) {
    if (!videoUrl) return;

    let video =
      document.querySelector("#sceneMainVideo") ||
      document.querySelector("#mainSceneVideo") ||
      document.querySelector(".scene-video video") ||
      document.querySelector("[data-main-video]");

    if (!video) {
      const host =
        document.querySelector("#sceneMedia") ||
        document.querySelector("#mediaArea") ||
        document.querySelector("#videoArea") ||
        document.querySelector(".scene-media") ||
        document.querySelector(".media-area") ||
        document.querySelector(".main-card") ||
        document.querySelector("main") ||
        document.body;

      const wrap = document.createElement("div");
      wrap.id = "autoSceneVideoWrap";

      video = document.createElement("video");
      video.id = "sceneMainVideo";
      video.controls = true;
      video.playsInline = true;

      wrap.appendChild(video);

      if (host === document.body) {
        document.body.insertBefore(wrap, document.body.firstChild);
      } else {
        host.prepend(wrap);
      }
    }

    video.src = videoUrl;
    if (posterUrl) video.poster = posterUrl;
    video.load();
  }

  async function loadSelectedVideoForCurrentSentence() {
    const sentenceId = getCurrentSentenceId();
    const key = SELECTED_VIDEO_PREFIX + sentenceId;
    const raw = await dbGet(key);

    if (!raw) return;

    try {
      const payload = JSON.parse(raw);

      if (payload && payload.videoUrl) {
        applyVideoToScreen(payload.videoUrl, payload.posterUrl || "");
      }
    } catch (e) {
      console.warn("KayÄ±tlÄ± video okunamadÄ±:", e);
    }
  }

  /* DÄ±ĹźarÄ±dan kullanmak iĂ§in */
  window.SceneVideoFinder = {
    open: async function () {
      panel.classList.add("open");
      panel.setAttribute("aria-hidden", "false");

      const savedKey = await dbGet(API_KEY_KEY);
      if (savedKey) apiInput.value = savedKey;

      queryInput.value = buildQueryFromCurrentSentence();
    },
    close: function () {
      panel.classList.remove("open");
      panel.setAttribute("aria-hidden", "true");
    },
    buildQuery: buildQueryFromCurrentSentence,
    applyVideo: applyVideoToScreen,
    loadSelected: loadSelectedVideoForCurrentSentence,
    saveKey: async function (key) {
      return dbSet(API_KEY_KEY, key);
    },
    getKey: async function () {
      return dbGet(API_KEY_KEY);
    },
    deleteKey: async function () {
      return dbDelete(API_KEY_KEY);
    }
  };

  setTimeout(() => {
    loadSelectedVideoForCurrentSentence();
  }, 700);

})();
</script>
