<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DilAvatar Ayarlama Sayfası</title>
  <style>
    :root{--bg:#0b1120;--card:#111827;--text:#e5e7eb;--muted:#94a3b8;--blue:#2563eb;--cyan:#2dd4bf;}
    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at top,#172554 0,#0b1120 46%,#020617 100%);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;}
    .page{max-width:1120px;margin:0 auto;padding:22px;display:grid;grid-template-columns:300px 1fr;gap:20px;align-items:start;}
    .left{position:sticky;top:18px;background:rgba(15,23,42,.78);border:1px solid rgba(148,163,184,.2);border-radius:22px;padding:18px;box-shadow:0 18px 50px rgba(0,0,0,.25)}
    h1{font-size:24px;margin:0 0 8px}.note{font-size:13px;color:var(--muted);line-height:1.45;margin:0 0 16px}.buttons{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:14px}.buttons button{border:0;background:var(--blue);color:white;border-radius:14px;padding:10px 14px;font-weight:900;cursor:pointer}.buttons button:nth-child(2){background:#0e7490}.buttons button:nth-child(3){background:#334155}
    @media(max-width:900px){.page{grid-template-columns:1fr}.left{position:static;max-width:360px;margin:0 auto}}
  </style>
</head>
<body>
  <main class="page">
    <section class="left">
      <h1>Avatar ayarlama</h1>
      <p class="note">Ağız, göz kırpma ve kaş katmanları kayarsa sliderlarla canlı ayarla. Ayarlar otomatik kaydedilir.</p>
      <div id="avatarHost"></div>
      <div class="buttons">
        <button onclick="DilAvatar.speakText('merhaba bugün İngilizce çalışıyoruz',3200)">Konuş</button>
        <button onclick="DilAvatar.blink()">Göz kırp</button>
        <button onclick="DilAvatar.stop()">Dur</button>
      </div>
    </section>
    <section>
      <div id="avatarControls"></div>
    </section>
  </main>
  <script src="./avatar.js"></script>
  <script>
    DilAvatar.mount('avatarHost');
    DilAvatar.mountControlPanel('avatarControls');
  </script>
</body>
</html>
