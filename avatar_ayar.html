<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>DilAvatar Ayarlama Sayfası</title>
  <style>
    body{margin:0;background:#020617;color:#e5e7eb;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
    .page{max-width:1180px;margin:0 auto;padding:22px;display:grid;grid-template-columns:minmax(240px,340px) 1fr;gap:20px;align-items:start;}
    .preview{position:sticky;top:16px;background:#0b1120;border:1px solid rgba(148,163,184,.25);border-radius:22px;padding:18px;text-align:center;}
    .preview h1{font-size:20px;margin:0 0 14px;}
    #avatarHost{width:280px;max-width:100%;margin:0 auto;}
    .actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:14px;}
    .actions button{border:0;border-radius:14px;background:#2563eb;color:white;font-weight:800;padding:11px 14px;cursor:pointer;}
    .err{display:none;margin:12px 0;padding:10px;border-radius:12px;background:#7f1d1d;color:#fff;font-weight:700;}
    @media(max-width:820px){.page{grid-template-columns:1fr}.preview{position:relative;top:auto}}
  </style>
</head>
<body>
  <main class="page">
    <section class="preview">
      <h1>DilAvatar Önizleme</h1>
      <div id="avatarHost"></div>
      <div id="err" class="err">avatar.js yüklenemedi. HTML ile avatar.js aynı klasörde olmalı.</div>
      <div class="actions">
        <button onclick="DilAvatar.speakText('merhaba bugün İngilizce çalışıyoruz', 3200)">Konuş</button>
        <button onclick="DilAvatar.blink()">Göz kırp</button>
        <button onclick="DilAvatar.stop()">Dur</button>
      </div>
    </section>
    <section><div id="avatarControls"></div></section>
  </main>
  <script src="./avatar.js"></script>
  <script>
    if (!window.DilAvatar) {
      document.getElementById('err').style.display = 'block';
    } else {
      DilAvatar.mount('avatarHost');
      DilAvatar.setGender('erkek');
      DilAvatar.mountControlPanel('avatarControls');
    }
  </script>
</body>
</html>
