<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>DilAvatar v12 Ayarlama Sayfası</title>
  <style>
    body{margin:0;background:#020617;color:#e5e7eb;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .page{max-width:1180px;margin:0 auto;padding:22px;display:grid;grid-template-columns:minmax(240px,360px) 1fr;gap:20px;align-items:start}
    .preview{position:sticky;top:16px;background:#0b1120;border:1px solid rgba(148,163,184,.25);border-radius:22px;padding:18px;text-align:center}
    .preview h1{font-size:20px;margin:0 0 14px}
    .note{color:#93c5fd;line-height:1.45;font-size:14px;margin:0 0 14px}
    .actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:14px}
    .actions button{border:0;border-radius:14px;background:#2563eb;color:white;font-weight:800;padding:11px 14px;cursor:pointer}
    .error{display:none;margin:14px 0;padding:12px;border-radius:14px;background:#7f1d1d;color:#fee2e2;text-align:left;font-size:14px;line-height:1.45}
    @media(max-width:820px){.page{grid-template-columns:1fr}.preview{position:relative;top:auto}}
  </style>
</head>
<body>
  <main class="page">
    <section class="preview">
      <h1>DilAvatar Önizleme</h1>
      <p class="note">
        v12: Kaliteli portre görseli zemin olarak korunur. Sadece dudak, göz kapağı, kaş ve çene katmanları hareket eder.
      </p>
      <div id="loadError" class="error"></div>
      <div id="avatarHost"></div>
      <div class="actions">
        <button id="btnSpeak" type="button">Konuş</button>
        <button id="btnBlink" type="button">Göz kırp</button>
        <button id="btnStop" type="button">Dur</button>
      </div>
    </section>

    <section>
      <div id="avatarControls"></div>
    </section>
  </main>

  <script src="./avatar.js"></script>
  <script>
    (function(){
      function showError(msg){
        var box = document.getElementById("loadError");
        box.style.display = "block";
        box.innerHTML = msg;
      }

      if (!window.DilAvatar) {
        showError("<b>avatar.js yüklenemedi.</b><br>avatar_ayar.html ve avatar.js aynı klasörde olmalı.");
        return;
      }

      DilAvatar.mount("avatarHost");
      DilAvatar.setGender("erkek");
      DilAvatar.mountControlPanel("avatarControls");

      document.getElementById("btnSpeak").addEventListener("click", function(){
        DilAvatar.speakText("merhaba bugün ingilizce çalışıyoruz", 3200);
      });

      document.getElementById("btnBlink").addEventListener("click", function(){
        DilAvatar.blink();
      });

      document.getElementById("btnStop").addEventListener("click", function(){
        DilAvatar.stop();
      });
    })();
  </script>
</body>
</html>
